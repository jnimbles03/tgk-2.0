@font-face {

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  --ds-cobalt:#4C00FF;
  --ds-inkwell:#130032;
  --ds-deep-violet:#26065D;
  --ds-mist:#CBC2FF;
  --ds-poppy:#FF5252;
  --ds-ecru:#F8F3F0;
  --ds-white:#FFFFFF;
  --line:rgba(19,0,50,0.10);
  --line-strong:rgba(19,0,50,0.18);
  --ink-mid:#4A3E6B;
  --ink-soft:#6E6189;
  --brand:"DSIndigo","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}

*,*::before,*::after { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  font-family:var(--brand);
  background:var(--ds-ecru);
  color:var(--ds-inkwell);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex; flex-direction:column;
}

/* Top bar */
.topbar {
  display:flex; align-items:center; gap:16px;
  padding:14px 24px; border-bottom:1px solid var(--line);
  background:var(--ds-white);
}
.topbar a.back {
  color:var(--ink-mid); text-decoration:none; font-size:13px; font-weight:500;
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 10px; border-radius:6px; border:1px solid var(--line);
}
.topbar a.back:hover { background:var(--ds-ecru); color:var(--ds-inkwell); }
.topbar .iris {
  display:inline-flex; align-items:center; gap:8px;
  font-weight:600; color:var(--ds-deep-violet); font-size:14px;
}
.topbar .iris svg { width:24px; height:24px; }
.topbar .pill {
  margin-left:auto;
  padding:4px 10px; border-radius:999px;
  background:rgba(203,194,255,0.32);
  color:var(--ds-deep-violet);
  font-size:11px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase;
  border:1px solid rgba(76,0,255,0.18);
}

/* Title block */
.title-block {
  padding:28px 24px 12px; max-width:1100px; margin:0 auto; width:100%;
}
.title-block h1 {
  margin:0 0 6px; font-size:28px; font-weight:600; letter-spacing:-0.01em;
  color:var(--ds-inkwell);
}
.title-block p {
  margin:0; color:var(--ink-mid); font-size:15px; line-height:1.55;
  max-width:760px;
}

/* Stage */
.stage-wrap {
  flex:1 1 auto;
  display:flex; align-items:center; justify-content:center;
  padding:8px 24px 0;
}
.stage {
  width:100%; max-width:1100px;
  aspect-ratio:16/9;
  background:var(--ds-inkwell);
  border-radius:14px;
  border:1px solid var(--line-strong);
  box-shadow:0 18px 40px -28px rgba(19,0,50,0.45);
  overflow:hidden;
  position:relative;
}
.stage img {
  width:100%; height:100%; object-fit:contain; display:block;
  background:#000;
  user-select:none; -webkit-user-drag:none;
}

/* Controls */
.controls {
  max-width:1100px; margin:14px auto 0; width:100%;
  padding:0 24px;
  display:grid;
  grid-template-columns:auto auto 1fr auto auto;
  gap:14px; align-items:center;
}
.controls button {
  font-family:inherit; font-size:13px; font-weight:500;
  background:var(--ds-white); color:var(--ds-inkwell);
  border:1px solid var(--line-strong); border-radius:8px;
  padding:8px 12px; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px;
  transition:background 120ms ease, border-color 120ms ease;
}
.controls button:hover { background:var(--ds-ecru); border-color:var(--ds-cobalt); }
.controls button.primary {
  background:var(--ds-cobalt); color:var(--ds-white); border-color:var(--ds-cobalt);
  min-width:100px; justify-content:center;
}
.controls button.primary:hover { background:var(--ds-deep-violet); border-color:var(--ds-deep-violet); }
.controls button svg { width:14px; height:14px; }
.controls .scrub { position:relative; }
.controls input[type=range] {
  width:100%; -webkit-appearance:none; appearance:none;
  background:transparent; height:24px; cursor:pointer;
}
.controls input[type=range]::-webkit-slider-runnable-track {
  height:4px; background:linear-gradient(to right,var(--ds-cobalt) var(--pct,0%),var(--line-strong) var(--pct,0%));
  border-radius:999px;
}
.controls input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:16px; height:16px; border-radius:50%;
  background:var(--ds-cobalt); border:2px solid var(--ds-white);
  margin-top:-6px; box-shadow:0 1px 3px rgba(19,0,50,0.3);
}
.controls input[type=range]::-moz-range-track { height:4px; background:var(--line-strong); border-radius:999px; }
.controls input[type=range]::-moz-range-thumb {
  width:16px; height:16px; border-radius:50%; background:var(--ds-cobalt); border:2px solid var(--ds-white);
}
.frame-counter {
  font-variant-numeric:tabular-nums; font-size:13px; color:var(--ink-mid);
  min-width:64px; text-align:right;
}
.controls select {
  font-family:inherit; font-size:13px;
  background:var(--ds-white); color:var(--ds-inkwell);
  border:1px solid var(--line-strong); border-radius:8px;
  padding:7px 8px; cursor:pointer;
}

/* Footer */
footer.foot {
  margin-top:auto;
  padding:18px 24px 24px;
  text-align:center; color:var(--ink-soft); font-size:12px;
}
footer.foot a { color:var(--ds-deep-violet); text-decoration:none; }
footer.foot a:hover { text-decoration:underline; }

/* Hidden frame preloader */
.preload { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }

/* ============================================================
   EMBED MODE — ?embed=1
   Strip chrome so this flipbook renders cleanly inside an
   iframe drill-down inside a story-shell scene/vignette.
   ============================================================ */
body.embed { background:transparent; }
body.embed .topbar,
body.embed .title-block,
body.embed footer.foot { display:none; }
body.embed .stage-wrap { padding:0; }
body.embed .stage { border-radius:0; border:none; box-shadow:none; }
body.embed .controls { padding:8px 16px 12px; margin-top:6px; }

@media (max-width:680px) {
  .controls { grid-template-columns:auto auto 1fr; row-gap:10px; }
  .controls .frame-counter { grid-column:1 / -1; text-align:center; }
  .controls select { grid-column:1 / -1; }
  .title-block h1 { font-size:22px; }
  .title-block p { font-size:14px; }
}
</style>

  const total = frames.length;
  const stage = document.getElementById('frame');
  const scrub = document.getElementById('scrub');
  const counter = document.getElementById('counter');
  const playBtn = document.getElementById('play');
  const playIcon = document.getElementById('playIcon');
  const playLabel = document.getElementById('playLabel');
  const speedSel = document.getElementById('speed');
  const preload = document.getElementById('preload');

  // --- Embed / kiosk URL params --------------------------------------------
  // ?embed=1     -> strip chrome (use inside an iframe drill-down)
  // ?autoplay=1  -> start playing on load
  // ?loop=1      -> don't stop at the last frame; cycle forever
  // ?start=N     -> jump to frame N (1-based)
  // ?speed=ms    -> set inter-frame delay in ms (default 1000)
  const params = new URLSearchParams(location.search);
  const isEmbed   = params.get('embed') === '1';
  const wantsAutoplay = params.get('autoplay') === '1';
  const wantsLoop = params.get('loop') === '1';
  const startAt = parseInt(params.get('start') || '1', 10);
  const speedOverride = parseInt(params.get('speed') || '0', 10);
  if (isEmbed) document.body.classList.add('embed');
  if (speedOverride > 0) speedSel.value = String(speedOverride);

  let idx = Math.max(0, Math.min(total - 1, (Number.isFinite(startAt) ? startAt : 1) - 1));
  let timer = null;

  // Preload all frames so playback is smooth
  frames.forEach(src => {
    const img = new Image();
    img.src = src;
    preload.appendChild(img);
  });

  function paint() {
    stage.src = frames[idx];
    scrub.value = String(idx + 1);
    counter.textContent = (idx + 1) + ' / ' + total;
    const pct = total > 1 ? (idx / (total - 1)) * 100 : 0;
    scrub.style.setProperty('--pct', pct + '%');
  }

  function step(d) {
    idx = (idx + d + total) % total;
    paint();
  }

  function play() {
    if (timer) return;
    const ms = parseInt(speedSel.value, 10);
    timer = setInterval(() => {
      idx = (idx + 1) % total;
      // Stop at the end instead of looping forever, unless ?loop=1.
      if (idx === 0 && !wantsLoop) { stop(); paint(); return; }
      paint();
    }, ms);
    playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
    playLabel.textContent = 'Pause';
  }

  function stop() {
    if (!timer) return;
    clearInterval(timer); timer = null;
    playIcon.innerHTML = '<polygon points="6 4 20 12 6 20 6 4"></polygon>';
    playLabel.textContent = 'Play';
  }

  function toggle() { timer ? stop() : play(); }

  document.getElementById('prev').addEventListener('click', () => { stop(); step(-1); });
  document.getElementById('next').addEventListener('click', () => { stop(); step(1); });
  playBtn.addEventListener('click', toggle);
  scrub.addEventListener('input', e => { stop(); idx = parseInt(e.target.value, 10) - 1; paint(); });
  speedSel.addEventListener('change', () => { if (timer) { stop(); play(); } });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft')  { stop(); step(-1); e.preventDefault(); }
    else if (e.key === 'ArrowRight') { stop(); step(1); e.preventDefault(); }
    else if (e.key === ' ' || e.key === 'Spacebar') { toggle(); e.preventDefault(); }
  });

  paint();
  if (wantsAutoplay) play();
})();
