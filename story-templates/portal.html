<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal</title>
  <link rel="stylesheet" href="portal-engine.css" />
</head>
<body>
  <!-- Engine mounts the full portal here -->
  <div id="portal-root"></div>

  <!-- Error panel shown when recipe can't be loaded or step is invalid -->
  <div id="portal-error" class="portal-error" style="display:none;">
    <div class="portal-error-card">
      <h2>Couldn't load portal</h2>
      <p>Recipe URL:</p>
      <pre><code></code></pre>
      <p class="portal-error-hint">
        If you opened this via <code>file://</code>, the browser is blocking
        fetch of local JSON. Serve the project over HTTP:
      </p>
      <pre><code>cd "TGK 2.0" &amp;&amp; python3 -m http.server 8000</code></pre>
    </div>
  </div>

  <script src="portal-engine.js"></script>
</body>
</html>
