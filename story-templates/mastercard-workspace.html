<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene 4 — MasterCard splash → Workspace</title>
<meta name="description" content="Convenience entry point for Scene 4. Redirects to the canonical docusign-workspace.html template with ?splash=1 so the MasterCard homage plays before the Workspace appears. Any ?preset=<vertical> or ?preset=<vertical>-<subvertical>-<process> param is preserved.">
<!--
  ============================================================
  Scene 4 · MasterCard → Workspace (redirect)
  ============================================================
  This file is a thin convenience URL. The canonical Scene 4 is:

      /story-templates/docusign-workspace.html?splash=1

  Why it exists:
    - Historically mastercard-workspace.html was a self-contained
      demo with the MasterCard splash + an inline Harbor Medical
      loan-mod workspace underneath. That inline workspace was
      a dead end. Scene 4 should always lead to the canonical,
      preset-driven docusign-workspace.html template.
    - Keeping the filename working means any existing link or
      doc reference (e.g. recipe.json entries) still resolves.

  Any query params pass through:
    mastercard-workspace.html                     → docusign-workspace.html?splash=1
    mastercard-workspace.html?preset=banking      → docusign-workspace.html?splash=1&preset=banking
    mastercard-workspace.html?preset=fedgov-grant → docusign-workspace.html?splash=1&preset=fedgov-grant

  The <meta refresh> fallback covers browsers with JS disabled;
  the <script> runs synchronously for normal cases.
  ============================================================
-->
<script>
  (function () {
    const params = new URLSearchParams(location.search);
    params.set('splash', '1');
    location.replace('docusign-workspace.html?' + params.toString());
  })();
</script>
<meta http-equiv="refresh" content="0;url=docusign-workspace.html?splash=1">
<style>
  html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#F8F3F0;color:#130032;}
  body{display:flex;align-items:center;justify-content:center;}
  p{font-size:14px;color:#4A3E6B;}
  a{color:#4C00FF;}
</style>
</head>
<body>
  <p>Redirecting to <a href="docusign-workspace.html?splash=1">the canonical Workspace with the MasterCard intro</a>…</p>
</body>
</html>
