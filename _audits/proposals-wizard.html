<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sales + Procurement vertical proposals — wizard</title>
<style>
  :root {
    --ink:#130032; --ink-mid:#4a4a5e; --ink-soft:#6b6b80; --ink-faint:#9a9aae;
    --hair:#e6e6ee; --hair-soft:#f0f0f6; --cream:#faf6ee; --bg:#ffffff;
    --ds-purple:#4b00e9; --step-blue:#1e60ff;
    --ok:#2f7d5b; --warn:#c89236; --err:#c84c1f;
    --ui-font:-apple-system,BlinkMacSystemFont,"Inter","Helvetica Neue",sans-serif;
    --serif:"Fraunces","Iowan Old Style",Georgia,serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:var(--ui-font);font-size:15px;line-height:1.55;min-height:100vh;}
  body{display:flex;flex-direction:column;align-items:center;}

  /* Top progress strip */
  .progress-strip{
    width:100%;background:#fff;border-bottom:1px solid var(--hair);
    padding:14px 36px;display:flex;align-items:center;gap:16px;
    position:sticky;top:0;z-index:5;
  }
  .progress-strip .meta{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-faint);}
  .progress-strip .dots{display:flex;gap:6px;margin-left:auto;align-items:center;}
  .progress-strip .dot{
    width:24px;height:24px;border-radius:50%;border:1px solid var(--hair);
    background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;color:var(--ink-faint);
    transition:all 0.15s;
  }
  .progress-strip .dot.current{outline:2px solid var(--ds-purple);outline-offset:2px;color:var(--ds-purple);}
  .progress-strip .dot.approved{background:rgba(47,125,91,0.12);color:var(--ok);border-color:rgba(47,125,91,0.3);}
  .progress-strip .dot.edits{background:rgba(75,0,233,0.10);color:var(--ds-purple);border-color:rgba(75,0,233,0.3);}
  .progress-strip .dot.held{background:rgba(200,76,31,0.10);color:var(--err);border-color:rgba(200,76,31,0.3);}
  .progress-strip .dot:hover{transform:translateY(-1px);}

  /* Section divider in dot strip — visual gap between sales and procurement */
  .progress-strip .divider{width:1px;height:18px;background:var(--hair);margin:0 4px;}

  /* Card */
  .stage{padding:48px 24px 80px;width:100%;max-width:780px;}
  .card{
    background:#fff;border:1px solid var(--hair);border-radius:14px;
    box-shadow:0 1px 6px rgba(19,0,50,0.04);
    overflow:hidden;
  }
  .card .top{padding:22px 32px 16px;border-bottom:1px solid var(--hair);background:linear-gradient(to bottom,#fcfafc,#fff);}
  .card .vertical-tag{
    display:inline-block;font-family:var(--mono);font-size:11px;font-weight:600;
    letter-spacing:0.04em;color:var(--ds-purple);
    background:rgba(75,0,233,0.08);padding:3px 9px;border-radius:11px;
  }
  .card .vertical-tag.proc{color:#6B4FAF;background:rgba(107,79,175,0.10);}
  .card .step{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);margin-top:14px;font-weight:700;}
  .card h1{font-family:var(--serif);font-style:italic;font-weight:500;font-size:28px;margin:6px 0 0;line-height:1.2;letter-spacing:-0.012em;}

  .card .body{padding:24px 32px 8px;}
  .card .lede{font-size:14px;color:var(--ink-mid);margin-bottom:22px;line-height:1.6;}

  /* Per-card content blocks */
  .preview{
    background:#fafafd;border:1px solid var(--hair);border-radius:8px;
    padding:18px 22px;margin-bottom:22px;
  }
  .preview .label{font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:8px;}
  .preview .head-text{font-family:var(--serif);font-style:italic;font-weight:500;font-size:18px;color:var(--ink);line-height:1.3;margin-bottom:10px;}
  .preview .lede-text{font-size:13.5px;color:var(--ink-mid);line-height:1.55;}
  .preview .lede-text strong{color:var(--ink);font-weight:600;}

  .color-row{display:flex;gap:14px;align-items:center;margin-bottom:18px;padding:14px 18px;background:#fafafd;border-radius:8px;border:1px solid var(--hair);}
  .swatch{width:48px;height:48px;border-radius:8px;border:1px solid rgba(0,0,0,0.08);flex-shrink:0;}
  .color-info code{font-family:var(--mono);font-size:12px;color:var(--ink-mid);background:#fff;padding:2px 6px;border-radius:3px;border:1px solid var(--hair);}
  .color-info .desc{font-size:13px;color:var(--ink-mid);margin-top:4px;}

  .iframe-row{display:flex;gap:14px;padding:14px 18px;background:#fafafd;border-radius:8px;border:1px solid var(--hair);margin-bottom:18px;}
  .iframe-row .icon{
    width:40px;height:40px;border-radius:6px;background:rgba(75,0,233,0.08);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .iframe-row .icon svg{width:20px;height:20px;color:var(--ds-purple);}
  .iframe-row code{font-family:var(--mono);font-size:11.5px;color:var(--ink-mid);background:#fff;padding:2px 6px;border-radius:3px;border:1px solid var(--hair);}
  .iframe-row .frames{font-size:12px;color:var(--ink-faint);margin-top:4px;}

  .summary-list{margin:0;padding:0;list-style:none;}
  .summary-list li{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--hair);font-size:13.5px;}
  .summary-list li:last-child{border-bottom:none;}
  .summary-list .key{flex-shrink:0;width:130px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;padding-top:2px;}
  .summary-list .val{color:var(--ink);}
  .summary-list .val code{font-family:var(--mono);font-size:12px;background:var(--hair-soft);padding:1px 6px;border-radius:3px;}

  /* Actions */
  .actions{padding:18px 32px 22px;border-top:1px solid var(--hair);background:#fafafa;display:flex;gap:10px;flex-wrap:wrap;}
  .actions button{
    border:1px solid var(--hair);background:#fff;cursor:pointer;
    padding:10px 18px;border-radius:7px;font-size:13.5px;font-weight:600;font-family:inherit;color:var(--ink-mid);
    transition:all 0.12s;display:flex;align-items:center;gap:7px;
  }
  .actions button:hover{border-color:var(--ink-soft);color:var(--ink);}
  .actions button.approve.on{border-color:var(--ok);color:var(--ok);background:rgba(47,125,91,0.08);}
  .actions button.edits.on{border-color:var(--ds-purple);color:var(--ds-purple);background:rgba(75,0,233,0.06);}
  .actions button.hold.on{border-color:var(--err);color:var(--err);background:rgba(200,76,31,0.06);}
  .actions kbd{font-family:var(--mono);font-size:9.5px;padding:1px 5px;border:1px solid var(--hair);border-radius:3px;background:#fff;color:var(--ink-faint);font-weight:600;margin-left:4px;}
  .actions .nav{margin-left:auto;display:flex;gap:8px;}
  .actions .nav button{padding:10px 14px;}

  .edits-area{padding:0 32px 22px;}
  .edits-area textarea{
    width:100%;min-height:80px;border:1px solid var(--hair);border-radius:7px;
    padding:10px 14px;font-size:13.5px;font-family:inherit;line-height:1.55;resize:vertical;
  }
  .edits-area textarea:focus{outline:none;border-color:var(--ds-purple);}
  .edits-area .lbl{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:6px;}

  /* Done state */
  .done{text-align:center;padding:60px 32px;}
  .done h2{font-family:var(--serif);font-style:italic;font-size:32px;margin:0 0 12px;}
  .done .stats{display:flex;justify-content:center;gap:18px;margin:24px 0 32px;flex-wrap:wrap;}
  .done .stat{padding:10px 18px;border:1px solid var(--hair);border-radius:8px;background:#fff;}
  .done .stat .n{font-size:24px;font-weight:700;}
  .done .stat .l{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-faint);}
  .done button{margin:6px;padding:11px 22px;border-radius:7px;font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--ink);background:var(--ink);color:#fff;}
  .done button.secondary{background:#fff;color:var(--ink);}

  /* Keyboard hint */
  .hint{position:fixed;bottom:18px;right:24px;font-size:11px;color:var(--ink-faint);background:rgba(255,255,255,0.95);border:1px solid var(--hair);border-radius:6px;padding:8px 12px;line-height:1.6;}
  .hint kbd{font-family:var(--mono);font-size:10px;padding:1px 5px;border:1px solid var(--hair);border-radius:3px;background:var(--hair-soft);color:var(--ink-mid);}

  /* Scene preview cards (for the full vertical summary) */
  .scenes-grid{display:grid;grid-template-columns:1fr;gap:8px;}
  .scene-card{padding:12px 16px;background:#fafafd;border:1px solid var(--hair);border-radius:7px;font-size:13px;}
  .scene-card .scene-no{font-family:var(--mono);font-size:11px;color:var(--ink-faint);font-weight:700;}
  .scene-card .scene-head{font-weight:600;color:var(--ink);margin-top:2px;}
  .scene-card .scene-persona{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
</style>
</head>
<body>

<div class="progress-strip">
  <div>
    <div class="meta">Sales + Procurement Vertical Proposals</div>
  </div>
  <div class="dots" id="dots"></div>
</div>

<div class="stage" id="stage"></div>

<div class="hint">
  <kbd>A</kbd> Approve · <kbd>E</kbd> Edits · <kbd>H</kbd> Hold · <kbd>←</kbd>/<kbd>→</kbd> Nav
</div>

<script>
const DECISIONS = [
  // ============ SALES ============
  {
    id: "sales-color",
    vertical: "sales",
    step: "Step 1 of 4 · Sales",
    title: "Approve the Sales tenant brand color?",
    lede: "The agent picked Salesforce blue to match the Salesforce + Agentforce framing. This is the accent color used in the persona card avatar, scene tags, and brand chrome.",
    type: "color",
    color: "#0066CC",
    colorName: "Salesforce blue"
  },
  {
    id: "sales-s1",
    vertical: "sales",
    step: "Step 2 of 4 · Sales",
    title: "Approve the Scene 1 (Sender) framing?",
    lede: "Marc Benoff at TGK kicks off the deal in Salesforce. Agentforce auto-launches the Docusign agreement when the opportunity hits Proposal stage.",
    type: "scene",
    head: "Marc Benoff opens a new opportunity for Black Mesa Energy in Salesforce.",
    body: "Marc Benoff, Sales Rep at TGK, creates a new opportunity in Salesforce for Black Mesa Energy's SaaS subscription contract. Opportunity stage, amount, and contact (Diego Castaneda, Procurement) are entered. When Marc moves the opportunity to \"Proposal,\" Agentforce detects the stage gate and auto-launches the agreement generation — pre-filled from CRM data."
  },
  {
    id: "sales-s3",
    vertical: "sales",
    step: "Step 3 of 4 · Sales",
    title: "Approve embedding the existing Sales flipbook as Scene 3?",
    lede: "The existing flipbook becomes the iframe content for the Signing scene. The flipbook keeps its own player chrome inside the iframe; the shell wraps it with persona card and beat narration.",
    type: "iframe",
    iframeSrc: "/flipbooks/IAM_for_Sales_and_Agentforce_Demo.html",
    frames: "53 JPEG frames",
    head: "Diego reviews and signs the MSA + Order Form."
  },
  {
    id: "sales-overall",
    vertical: "sales",
    step: "Step 4 of 4 · Sales",
    title: "Approve the full Sales vertical?",
    lede: "Final review. If yes, the apply pass adds the sales: block to story-shell.html VERTICALS and the demo becomes available at /stories/_shared/story-shell.html?vertical=sales.",
    type: "summary",
    summary: {
      key: "sales",
      tenant: "TGK",
      subtitle: "× Black Mesa Energy — Closed Won",
      tenantColor: "#0066CC",
      cast: ["Marc Benoff · Sales Rep · TGK · advisor", "Diego Castaneda · Procurement Manager · Black Mesa Energy · client"],
      docs: ["MSA", "Order Form", "Service Rider"],
      scenes: [
        ["S1 · Opportunity", "Marc opens Salesforce opportunity for Black Mesa", "Marc Benoff · advisor"],
        ["S2 · Identity", "Diego completes identity verification", "Diego Castaneda · client"],
        ["S3 · Signing", "Diego signs MSA + Order Form (flipbook plays)", "Diego Castaneda · client"],
        ["S4 · Data", "Executed agreement lands back in Salesforce", "Marc Benoff · advisor"],
        ["S5 · Workspace", "Marc + Diego continue in shared customer Workspace", "Marc Benoff · advisor"]
      ]
    }
  },
  // ============ PROCUREMENT ============
  {
    id: "proc-color",
    vertical: "procurement",
    step: "Step 1 of 4 · Procurement",
    title: "Approve the Procurement tenant brand color?",
    lede: "The agent picked deep purple to feel corporate-procurement and distinct from the Salesforce blue used by Sales.",
    type: "color",
    color: "#6B4FAF",
    colorName: "Deep purple"
  },
  {
    id: "proc-s1",
    vertical: "procurement",
    step: "Step 2 of 4 · Procurement",
    title: "Approve the Scene 1 (Sender) framing?",
    lede: "David Reyes at TGK initiates vendor onboarding. CLM auto-assembles the MSA + Vendor Onboarding Form package.",
    type: "scene",
    head: "David Reyes configures Fontara as a new supplier in TGK's CLM system.",
    body: "David Reyes, Procurement Officer at TGK, initiates a new vendor onboarding workflow in CLM for Fontara, Inc. Vendor profile, category, contract terms, and primary contact (Sarah Mitchell, Sales Rep) are entered. When David submits the configuration, CLM detects the vendor type and auto-assembles the MSA + Vendor Onboarding Form + Insurance Certificate Acknowledgement — pre-populated from TGK's standard templates and sourcing data."
  },
  {
    id: "proc-s3",
    vertical: "procurement",
    step: "Step 3 of 4 · Procurement",
    title: "Approve embedding the existing Procurement flipbook as Scene 3?",
    lede: "The existing CLM Procurement flipbook becomes the iframe content for the Signing scene.",
    type: "iframe",
    iframeSrc: "/flipbooks/DocuSign_CLM_Procurement_Demo_Video.html",
    frames: "JPEG frame sequence",
    head: "Sarah reviews and signs the MSA + Vendor Onboarding Form + Insurance Certificate Acknowledgement."
  },
  {
    id: "proc-overall",
    vertical: "procurement",
    step: "Step 4 of 4 · Procurement",
    title: "Approve the full Procurement vertical?",
    lede: "Final review. If yes, the apply pass adds the procurement: block to story-shell.html VERTICALS and the demo becomes available at /stories/_shared/story-shell.html?vertical=procurement.",
    type: "summary",
    summary: {
      key: "procurement",
      tenant: "TGK",
      subtitle: "× Fontara, Inc. — New Supplier Onboarding",
      tenantColor: "#6B4FAF",
      cast: ["David Reyes · Procurement Officer · TGK · advisor", "Sarah Mitchell · Vendor Sales Rep · Fontara, Inc. · client"],
      docs: ["MSA", "Vendor Onboarding Form", "Insurance Certificate Acknowledgement"],
      scenes: [
        ["S1 · Intake", "David configures Fontara as supplier in CLM", "David Reyes · advisor"],
        ["S2 · Identity", "Sarah completes identity verification", "Sarah Mitchell · client"],
        ["S3 · Signing", "Sarah signs MSA package (flipbook plays)", "Sarah Mitchell · client"],
        ["S4 · Data", "Executed agreement lands in CLM, vendor master updates", "David Reyes · advisor"],
        ["S5 · Workspace", "David + Sarah continue in shared supplier Workspace", "David Reyes · advisor"]
      ]
    }
  }
];

const STORAGE_KEY = "tgk.sales-proc-proposals.v1";
let state = {};
try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}") || {}; } catch(e){}
let cursor = 0;

function getDec(d) { return state[d.id] || {}; }
function setDec(d, action) {
  state[d.id] = state[d.id] || {};
  state[d.id].action = action;
  state[d.id].at = new Date().toISOString();
  saveState();
}
function setEdits(d, edits) {
  state[d.id] = state[d.id] || {};
  state[d.id].edits = edits;
  saveState();
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}

function escapeHTML(s) {
  return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function renderDots() {
  const wrap = document.getElementById("dots");
  wrap.innerHTML = "";
  DECISIONS.forEach((d, i) => {
    if (i === 4) {
      const div = document.createElement("div");
      div.className = "divider";
      wrap.appendChild(div);
    }
    const a = (state[d.id] || {}).action || "unset";
    const dot = document.createElement("div");
    dot.className = "dot " + a + (i === cursor ? " current" : "");
    dot.textContent = i + 1;
    dot.title = `${d.step}: ${d.title}`;
    dot.addEventListener("click", () => { cursor = i; render(); });
    wrap.appendChild(dot);
  });
}

function renderCard(d) {
  const dec = getDec(d);
  const action = dec.action || "";
  const edits = dec.edits || "";
  const isProc = d.vertical === "procurement";

  let bodyHTML = "";

  if (d.type === "color") {
    bodyHTML = `
      <div class="color-row">
        <div class="swatch" style="background:${d.color}"></div>
        <div class="color-info">
          <div><strong>${escapeHTML(d.colorName)}</strong></div>
          <code>${escapeHTML(d.color)}</code>
          <div class="desc">${d.lede}</div>
        </div>
      </div>`;
  } else if (d.type === "scene") {
    bodyHTML = `
      <p class="lede">${escapeHTML(d.lede)}</p>
      <div class="preview">
        <div class="label">Headline</div>
        <div class="head-text">${escapeHTML(d.head)}</div>
        <div class="label" style="margin-top:14px">Lede (first ~80 words)</div>
        <div class="lede-text">${escapeHTML(d.body)}</div>
      </div>`;
  } else if (d.type === "iframe") {
    bodyHTML = `
      <p class="lede">${escapeHTML(d.lede)}</p>
      <div class="iframe-row">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="14" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        </div>
        <div>
          <code>${escapeHTML(d.iframeSrc)}</code>
          <div class="frames">${escapeHTML(d.frames)} · plays as Scene 3 (Signing)</div>
        </div>
      </div>
      <div class="preview">
        <div class="label">Scene 3 head</div>
        <div class="head-text">${escapeHTML(d.head)}</div>
      </div>`;
  } else if (d.type === "summary") {
    const s = d.summary;
    bodyHTML = `
      <p class="lede">${escapeHTML(d.lede)}</p>
      <ul class="summary-list">
        <li><span class="key">VERTICALS key</span><span class="val"><code>${s.key}</code></span></li>
        <li><span class="key">Tenant</span><span class="val">${escapeHTML(s.tenant)}</span></li>
        <li><span class="key">Subtitle</span><span class="val">${escapeHTML(s.subtitle)}</span></li>
        <li><span class="key">Brand color</span><span class="val"><span class="swatch" style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${s.tenantColor};vertical-align:middle;margin-right:6px"></span><code>${s.tenantColor}</code></span></li>
        <li><span class="key">Cast</span><span class="val">${s.cast.map(c => escapeHTML(c)).join("<br>")}</span></li>
        <li><span class="key">Documents</span><span class="val">${s.docs.map(escapeHTML).join(" · ")}</span></li>
      </ul>
      <div style="margin-top:18px"><div class="label" style="font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:8px">5 scenes</div>
      <div class="scenes-grid">
        ${s.scenes.map(([no, head, persona]) => `
          <div class="scene-card">
            <div class="scene-no">${escapeHTML(no)}</div>
            <div class="scene-head">${escapeHTML(head)}</div>
            <div class="scene-persona">${escapeHTML(persona)}</div>
          </div>`).join("")}
      </div></div>`;
  }

  const tagClass = isProc ? "vertical-tag proc" : "vertical-tag";

  document.getElementById("stage").innerHTML = `
    <div class="card">
      <div class="top">
        <span class="${tagClass}">${escapeHTML(d.vertical)}</span>
        <div class="step">${escapeHTML(d.step)}</div>
        <h1>${escapeHTML(d.title)}</h1>
      </div>
      <div class="body">${bodyHTML}</div>
      <div class="actions">
        <button class="approve ${action === "approve" ? "on" : ""}" data-act="approve">Approve <kbd>A</kbd></button>
        <button class="edits ${action === "edits" ? "on" : ""}" data-act="edits">Approve with edits <kbd>E</kbd></button>
        <button class="hold ${action === "hold" ? "on" : ""}" data-act="hold">Hold <kbd>H</kbd></button>
        <div class="nav">
          <button data-nav="prev" ${cursor === 0 ? "disabled" : ""}>← Prev</button>
          <button data-nav="next">${cursor === DECISIONS.length - 1 ? "Done" : "Next →"}</button>
        </div>
      </div>
      <div class="edits-area" id="edits-area" style="${action === "edits" ? "" : "display:none"}">
        <div class="lbl">Override notes</div>
        <textarea placeholder="What to change — e.g. 'use #4B00E9 instead' or 'rename Marc to Liz Whitaker'">${escapeHTML(edits)}</textarea>
      </div>
    </div>`;

  document.getElementById("stage").querySelectorAll("button[data-act]").forEach(b => {
    b.addEventListener("click", () => {
      setDec(d, b.dataset.act);
      if (b.dataset.act === "edits") {
        document.getElementById("edits-area").style.display = "";
        document.querySelector("textarea").focus();
      } else {
        if (cursor < DECISIONS.length - 1) {
          setTimeout(() => { cursor++; render(); }, 180);
        } else { render(); }
      }
    });
  });
  document.getElementById("stage").querySelectorAll("button[data-nav]").forEach(b => {
    b.addEventListener("click", () => {
      if (b.dataset.nav === "prev" && cursor > 0) { cursor--; render(); }
      else if (b.dataset.nav === "next" && cursor < DECISIONS.length - 1) { cursor++; render(); }
      else if (b.dataset.nav === "next") { renderDone(); }
    });
  });
  const ta = document.querySelector("textarea");
  if (ta) {
    ta.addEventListener("input", e => setEdits(d, e.target.value));
  }
}

function renderDone() {
  const counts = { approve: 0, edits: 0, hold: 0, unset: 0 };
  DECISIONS.forEach(d => {
    counts[(state[d.id] || {}).action || "unset"]++;
  });
  document.getElementById("stage").innerHTML = `
    <div class="card"><div class="done">
      <h2>All ${DECISIONS.length} decisions reviewed</h2>
      <p style="color:var(--ink-mid)">Export the decisions JSON to feed to the apply pass.</p>
      <div class="stats">
        <div class="stat"><div class="n" style="color:var(--ok)">${counts.approve}</div><div class="l">Approved</div></div>
        <div class="stat"><div class="n" style="color:var(--ds-purple)">${counts.edits}</div><div class="l">With edits</div></div>
        <div class="stat"><div class="n" style="color:var(--err)">${counts.hold}</div><div class="l">Hold</div></div>
        <div class="stat"><div class="n" style="color:var(--ink-faint)">${counts.unset}</div><div class="l">Unset</div></div>
      </div>
      <button id="export-btn">Export decisions JSON</button>
      <button class="secondary" id="back-btn">← Go back to review</button>
    </div></div>`;
  document.getElementById("export-btn").addEventListener("click", () => {
    const out = DECISIONS.map(d => ({
      id: d.id,
      vertical: d.vertical,
      title: d.title,
      action: (state[d.id] || {}).action || "unset",
      edits: (state[d.id] || {}).edits || ""
    }));
    const blob = new Blob([JSON.stringify({generated: new Date().toISOString(), decisions: out}, null, 2)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "sales-procurement-decisions.json";
    a.click();
  });
  document.getElementById("back-btn").addEventListener("click", () => { cursor = 0; render(); });
}

function render() {
  if (cursor >= DECISIONS.length) { renderDone(); return; }
  renderCard(DECISIONS[cursor]);
  renderDots();
  window.scrollTo({top: 0, behavior: "smooth"});
}

document.addEventListener("keydown", e => {
  if (e.target.tagName === "TEXTAREA") return;
  if (cursor >= DECISIONS.length) return;
  const d = DECISIONS[cursor];
  if (e.key === "a" || e.key === "A") { setDec(d, "approve"); if (cursor < DECISIONS.length - 1) { cursor++; render(); } else render(); }
  else if (e.key === "e" || e.key === "E") { setDec(d, "edits"); render(); }
  else if (e.key === "h" || e.key === "H") { setDec(d, "hold"); if (cursor < DECISIONS.length - 1) { cursor++; render(); } else render(); }
  else if (e.key === "ArrowLeft" && cursor > 0) { cursor--; render(); }
  else if (e.key === "ArrowRight" && cursor < DECISIONS.length - 1) { cursor++; render(); }
});

render();
</script>

</body>
</html>
