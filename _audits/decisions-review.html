visor side. No TGK Capital references.\n- **Intake / Fraud-Fabric / Maintenance flows**: All three inherit the same fix — Priya's side flips from advisor to client, and scene-level advisor personas name the institutional receiver (Registrar, Financial Aid, etc.).\n- **Other verticals**: Scan for same shape (student/learner/participant personas tagged as advisor) in any future education-adjacent verticals.\n\n---\n\n## How to apply this\n\nIf you approve the rewrite, I'll:\n\n1. Edit `stories/_shared/story-shell.html` — replace the `education:` block persona definitions and scene ledes with the \"Now\" versions above. One commit.\n2. Edit the relevant sections in `_audits/usecase-narrations-2026-04-27.json` — flip Priya's persona side from \"advisor\" to \"client\" across intake, fraud-fabric, and maintenance flows.\n3. Re-run `_audits/_persona_audit_build.sh` so the persona-sequence-data.json refreshes with corrected audit verdicts.\n4. The education rows should all re-classify to reflect Priya as client and institutional staff as advisor. This becomes the baseline for any education-adjacent verticals added later.\n\nIf anything reads off — persona names, institutional roles, domain framing — flag it inline and I'll revise before applying."}, {"id": "nonprofit|default", "vertical_key": "nonprofit", "usecase": "default", "title": "Nonprofit · Harbor Foundation", "tier": 1, "tier_label": "Mechanical · low-risk", "source_file": "nonprofit-rewrite-2026-04-30.md", "heading": "### nonprofit/default (Scene-by-scene)", "persona_changes": [], "body_md": "### nonprofit/default (Scene-by-scene)\n\n**SCENE 1 — Intake (sender webform)**\n- Persona: Asha Morgan · Program Officer · Harbor · **advisor** (was: side unspecified; context shows her as program officer configuring the grant, so advisor is correct)\n- No persona name change needed; side confirmation needed in data.\n\n**SCENE 2 — Identity**\n- Persona: Rosa Patel · Executive Director · Safe Streets Initiative · **client** (was: `side=\"advisor\"`)\n- Rosa is the signatory from the grantee, not foundation staff. Switch to `side=\"client\"`.\n\n**SCENE 3 — Signing**\n- Persona: Rosa Patel · Executive Director · Safe Streets Initiative · **client** (was: `side=\"advisor\"`)\n- Same correction: grantee signatory = client side.\n\n**SCENE 4 — Data**\n- Persona: Asha Morgan · Program Officer · Harbor · **advisor** (was: Rosa marked as advisor)\n- Asha is the foundation staff reviewing the executed agreement. Rosa should not appear on this scene as an active persona (she's the past signer, not the current reviewer). Keep Asha.\n\n**SCENE 5 — Workspace**\n- Persona at B1 (access): Rosa Patel · Executive Director · Safe Streets Initiative · **client** (was: `side=\"advisor\"`)\n- Rosa receives access to the shared Workspace as the grantee contact. Client side.\n- Persona at B2 onwards (handoff/system): \"Harbor × Safe Streets\" or \"system\" (AI assistant Iris) — unchanged."}, {"id": "nonprofit|intake", "vertical_key": "nonprofit", "usecase": "intake", "title": "Nonprofit · Harbor Foundation", "tier": 1, "tier_label": "Mechanical · low-risk", "source_file": "nonprofit-rewrite-2026-04-30.md", "heading": "### nonprofit/intake (usecase, 4 scenes)", "persona_changes": [], "body_md": "### nonprofit/intake (usecase, 4 scenes)\n\n**SCENE 1 — Sender webform**\n- No named persona in current state (marked \"system\" with Maestro). Add: Asha Morgan · Program Officer · Harbor · **advisor**.\n\n**SCENE 3 — Envelope delivered**\n- Persona: Rosa Patel · Executive Director · Safe Streets Initiative · **client** (was: `side=\"advisor\"`).\n\n**SCENE 4 — Workspace access**\n- Persona: Rosa Patel · Executive Director · Safe Streets Initiative · **client** (was: `side=\"advisor\"`).\n- Keep consistency with the default flow."}, {"id": "nonprofit|maintenance", "vertical_key": "nonprofit", "usecase": "maintenance", "title": "Nonprofit · Harbor Foundation", "tier": 1, "tier_label": "Mechanical · low-risk", "source_file": "nonprofit-rewrite-2026-04-30.md", "heading": "### nonprofit/maintenance (usecase, 3 scenes)", "persona_changes": [], "body_md": "### nonprofit/maintenance (usecase, 3 scenes)\n\n**SCENE 1 — Portal entry & budget reallocation request**\n- Persona: Rosa Patel · Executive Director · Safe Streets Initiative · **client** (was: `side=\"advisor\"`).\n\n**SCENE 2 — Program officer approval**\n- Persona: Asha Morgan · Program Officer · Harbor · **advisor** (was: implicit; add explicit persona for clarity on this beat).\n\n**SCENE 3 — Portal update & confirmation**\n- Persona: Rosa Patel · Executive Director · Safe Streets Initiative · **client** (was: `side=\"advisor\"`).\n\n---\n\n## Role definitions (for the audit detector)\n\n**Advisor-side roles** (foundation staff): Program Officer, Director of Grants, Grants Manager, Foundation Officer, Director of Programs, Compliance Officer (at foundation), Finance/Grants Administrator.\n\n**Client-side roles** (grantee organization): Executive Director, ED, Board Member, Finance Director (grantee), Program Director (grantee).\n\n**Rosa Patel** is explicitly named as \"Executive Director\" in multiple beats across all flows. This is unambiguously a client-side role.\n\n**Asha Morgan** is explicitly named as \"Program Officer at Harbor Foundation\" — unambiguously advisor side.\n\n---\n\n## What this changes downstream\n\n- **Audit detector rule**: Add a side/role coherence check. If a persona is marked `side=\"advisor\"` but has a client-side role keyword (e.g., \"Executive Director\", \"ED\", \"Board Member\"), flag it.\n- **Insurance/HLS/PS/Education**: Scan for similar inversions. Insurance · default has Rosa marked as advisor in earlier drafts — this is the same pattern.\n- **Nonprofit data refresh**: Once this rewrite is approved, the JSON usecase definitions need to flip Rosa's persona side from advisor → client across all 11+ beat definitions. No name changes needed.\n\n---\n\n## How to apply this\n\nIf you approve the rewrite, I'll:\n\n1. Edit `stories/_shared/story-shell.html` — update the nonprofit block: flip Rosa's `side` attribute from \"advisor\" to \"client\" in all scene definitions. Add Asha's persona definition to SCENE 4 (data review) where it's currently missing.\n2. Update the inline USECASES JSON (`tgk-usecases` script tag) — flip Rosa's side across fraud-fabric, intake, and maintenance usecases.\n3. Re-run `_audits/_persona_audit_build.sh` to refresh.\n4. The nonprofit rows should re-classify; the side-consistency rule becomes a template for catching this shape elsewhere.\n\nIf the role names or flow framing reads off — flag it and I'll revise before applying."}, {"id": "nonprofit|fraud-fabric", "vertical_key": "nonprofit", "usecase": "fraud-fabric", "title": "Nonprofit · Harbor Foundation", "tier": 1, "tier_label": "Mechanical · low-risk", "source_file": "nonprofit-rewrite-2026-04-30.md", "heading": "### nonprofit/fraud-fabric (usecase, 3 scenes)", "persona_changes": [], "body_md": "### nonprofit/fraud-fabric (usecase, 3 scenes)\n\n**SCENE 1 — Authenticated portal entry (CLEAR at login)**\n- Persona: Rosa Patel · Executive Director · Safe Streets Initiative · **client** (was: `side=\"advisor\"`).\n- Rosa is initiating the drawdown request as the grantee's ED.\n\n**SCENE 2 — Drawdown submission**\n- Persona: Rosa Patel · Executive Director · Safe Streets Initiative · **client** (was: `side=\"advisor\"`).\n\n**SCENE 3 — Agreement Desk review**\n- Persona (B1): Asha Morgan · Program Officer · Harbor · **advisor** (was not explicitly named; context shows Asha reviewing).\n- Persona (B2–B5): System (CLEAR, Maestro, Iris) — unchanged.\n- Rosa should NOT be marked advisor on this scene; she's the past actor (her session is being reviewed). Asha is the current reviewer."}, {"id": "slgov|whole-doc", "vertical_key": "slgov", "usecase": "(whole doc)", "title": "State/Local Gov family", "tier": 1, "tier_label": "Mechanical · low-risk", "source_file": "slgov-rewrite-2026-04-30.md", "heading": "(no flow-level sections detected)", "persona_changes": [], "body_md": "# State/Local Government · seven-vertical rewrite\n\n**Status**: Draft for review · 2026-04-30\n**Scope**: Persona fixes + role coherence + flow integrity for all seven `slgov*` verticals (22 flows total)\n**Affected verticals**: `slgov` (Springfield), `slgov-311` (Greenhaven), `slgov-benefits` (Cascade SNAP), `slgov-recertification` (Cascade Medicaid), `slgov-employee-onboarding` (Cascade County HR), `slgov-licensing` (Northbrook), `slgov-vendor-compliance` (Ridgeview)\n\n---\n\n## Key findings\n\n### Audience role inversion\n\nIn all seven slgov verticals, **the CITIZEN/RESIDENT/APPLICANT is the client side**. The **agency staff is the advisor side**. This is the inverse of wealth/banking where the private-sector entity (TGK, bank customer) is client and the financial firm is advisor.\n\nCurrent state: Many slgov flows use agency staff personas on the client side during key moments (e.g., Scene 1 intake shown as \"Springfield Team Member\" when it should be applicant-driven self-service, or Scene 4 post-execution shown as compliance officer when the resident is the ongoing audience).\n\n**Fix**: Flip audience framing. Intake = self-service (client side). Post-signing execution = agency review (advisor side). Workspace tail = resident + agency staff co-inhabiting the shared space.\n\n### TGK Capital exclusion\n\nZero instances of TGK Capital in any slgov vertical — correct. All customer references are civic figures: Marissa Rivera (resident), Maria Cortez (citizen), etc. No co-brand framing needed. Preserve this intact.\n\n### Naming inventory by vertical\n\n| Vertical | Tenant | Resident/Citizen | Status |\n|----------|--------|------------------|--------|\n| `slgov` (Springfield) | Springfield Community Development | Marissa Rivera (property owner, 1420 Oak St) |✓ Diverse, realistic |\n| `slgov-311` (Greenhaven) | Greenhaven Public Works | Maria Cortez (citizen) | ✓ Diverse, realistic |\n| `slgov-benefits` (Cascade) | Cascade County Benefits | Sylvia Moreno (applicant) | To verify (Cascade reused across 3 verticals) |\n| `slgov-recertification` (Cascade) | Cascade County Benefits | James Park (recertifying client) | To verify (Cascade reused) |\n| `slgov-employee-onboarding` (Cascade) | Cascade County HR | (new hire name — TBD) | To verify (Cascade reused) |\n| `slgov-licensing` (Northbrook) | Northbrook Licensing Bureau | Derek Johnson (applicant) | ✓ Realistic |\n| `slgov-vendor-compliance` (Ridgeview) | Ridgeview Procurement | (vendor contact name — TBD) | To verify |\n\n**Naming policy**: Keep existing resident/citizen names; they are already diverse and realistic. Verify staff personas (agency-side) follow neutral, realistic civic-employee names — no echoes of real public officials.\n\n---\n\n## Per-vertical cast + flows\n\n### 1. `slgov` — Springfield Community Development\n\n**Tenant**: Springfield Community Development  \n**Customer**: Marissa Rivera (resident, 1420 Oak Street property owner)\n\n**Three flows** (all self-service/intake-driven):\n\n| Flow | Usecase | Scenes | Audience | Persona fix |\n|------|---------|--------|----------|------------|\n| Residential Permit Application | `intake` | SCENE 1-4: Intake → Packages → Envelope → Workspace | Marissa = client; Springfield staff = advisor (post-signature review) | None needed — role framing already correct |\n| Permit Modification (mid-construction) | `maintenance` | SCENE 1-3: Portal entry + auth → Form (pre-filled) → Confirmation | Marissa = client; Staff = advisor | None needed |\n| Permit Modification (property ownership chain-of-custody) | `fraud-fabric` | SCENE 1-3: Auth at entry → In-session form → Agreement Desk | Marissa = client; Agreement Desk = advisor visibility | None needed |\n\n**Decision**: All three flows correct as-written. Marissa is the resident applicant (client side) throughout. Springfield staff (implicit advisor side) appear in post-action review contexts. No persona swaps needed.\n\n---\n\n### 2. `slgov-311` — Greenhaven Public Works\n\n**Tenant**: Greenhaven Public Works  \n**Customer**: Maria Cortez (citizen, pothole reporter)\n\n**Three flows** (citizen-initiated service requests):\n\n| Flow | Usecase | Scenes | Audience | Persona fix |\n|------|---------|--------|----------|------------|\n| Pothole Report via QR (intake) | `intake` | SCENE 1-3: Form via QR → Auto-dispatch → Crew completion | Maria = client; Crew/Ops = advisor | None needed — Maria is citizen reporter |\n| Follow-up on Open Request | `fraud-fabric` | SCENE 1-3: Auth at entry → Add update → Ops Desk | Maria = client; Ops Desk = advisor | None needed |\n| Edit In-Progress Request | `maintenance` | SCENE 1-3: Portal auth → Add update → Confirmation | Maria = client; Staff = advisor | None needed |\n\n**Decision**: All three flows correct as-written. Maria is the citizen (client side). Greenhaven Ops staff appear in advisor-side review/dispatch contexts. No persona swaps needed.\n\n---\n\n### 3. `slgov-recertification` — Cascade County (Medicaid Recertification)\n\n**Tenant**: Cascade County Benefits  \n**Customer**: James Park (recertifying Medicaid client)\n\n**Two flows** (re-verification + re-enrollment):\n\n| Flow | Usecase | Scenes | Audience | Persona fix |\n|------|---------|--------|----------|------------|\n| Recertification Intake (household re-verify + sign) | `intake` | SCENE 1-4: Intake questionnaire → Maestro packages → Envelope → Workspace | James = client; Caseworker = advisor | None needed — James is the applicant |\n| Post-enrollment Workspace (shared client + agency view) | `workspaces` | SCENE 5: Shared Workspace for ongoing compliance | James = client; Caseworker/Eligibility Specialist = advisor | None needed |\n\n**Decision**: Both flows correct. James Park is recertifying (client side). Cascade staff (Caseworker, Eligibility Specialist) are advisor-side. No swaps needed.\n\n---\n\n### 4. `slgov-benefits` — Cascade County (SNAP/CalFresh Intake)\n\n**Tenant**: Cascade County Benefits  \n**Customer**: Sylvia Moreno (applicant for SNAP benefits)\n\n**Three flows** (intake + maintenance + case management):\n\n| Flow | Usecase | Scenes | Audience | Persona fix |\n|------|---------|--------|----------|------------|\n| SNAP Application (self-service intake) | `intake` | SCENE 1-4: Intake form → Maestro assessment → Envelope → Workspace | Sylvia = client; Benefits Counselor = advisor | None needed |\n| Recertification/Change of Circumstances | `maintenance` | SCENE 1-3: Portal auth → Updated form → Eligibility review | Sylvia = client; Specialist = advisor | None needed |\n| Case Notes + Ongoing Support | `workspaces` | SCENE 5: Shared view for case management | Sylvia = client; Caseworker = advisor | None needed |\n\n**Decision**: All three flows correct. Sylvia is applicant/beneficiary (client side). Agency staff are advisor-side case managers. No swaps.\n\n---\n\n### 5. `slgov-employee-onboarding` — Cascade County HR\n\n**Tenant**: Cascade County HR  \n**Customer**: (New hire — name TBD; currently unnamed in data)\n\n**Three flows** (pre-hire, onboarding, ongoing):\n\n| Flow | Usecase | Scenes | Audience | Persona fix |\n|------|---------|--------|----------|------------|\n| I-9 & Tax Withholding (intake) | `intake` | SCENE 1-4: Form → Maestro documents → Envelope → Workspace | New hire = client; HR Specialist = advisor | **PERSONA MISSING** — name new hire realistically |\n| Identity Verification at Hire | `fraud-fabric` | SCENE 1-3: Auth at entry → I-9 verification → Chain-of-custody | New hire = client; HR = advisor | **PERSONA MISSING** — name new hire |\n| Ongoing Workspace (benefits, direct deposit, tax updates) | `workspaces` | SCENE 5 | New hire = client; HR = advisor | None needed for workspace concept |\n\n**Decision**: New hire is nameless; assign a diverse, realistic FIRST NAME + generic LAST NAME (e.g., \"Aisha Thompson\", \"Marcus Chen\"). Do not echo real Cascade County officials. Create entry in cast section.\n\n---\n\n### 6. `slgov-licensing` — Northbrook Licensing Bureau\n\n**Tenant**: Northbrook Licensing Bureau  \n**Customer**: Derek Johnson (license applicant)\n\n**Three flows** (new license, renewal, compliance):\n\n| Flow | Usecase | Scenes | Audience | Persona fix |\n|------|---------|--------|----------|------------|\n| License Application (new) | `intake` | SCENE 1-4: Intake form → Doc assembly → Envelope → Workspace | Derek = client; Permit Clerk = advisor | None needed — Derek is applicant |\n| Renewal + Background Check | `maintenance` | SCENE 1-3: Portal auth → Update form → Compliance review | Derek = client; Licensing Specialist = advisor | None needed |\n| Compliance Attestation Workspace | `workspaces` | SCENE 5 | Derek = client; Specialist = advisor | None needed |\n\n**Decision**: All flows correct. Derek Johnson is consistent applicant. Northbrook staff correctly positioned as advisor-side reviewers. No swaps.\n\n---\n\n### 7. `slgov-vendor-compliance` — Ridgeview Procurement\n\n**Tenant**: Ridgeview Procurement  \n**Customer**: (Vendor contact — name TBD; currently unnamed)\n\n**Three flows** (vendor onboarding, compliance attestation, renewal):\n\n| Flow | Usecase | Scenes | Audience | Persona fix |\n|------|---------|--------|----------|------------|\n| Vendor Registration + W-9 (intake) | `intake` | SCENE 1-4: Intake form → Maestro package → Envelope → Workspace | Vendor rep = client; Vendor Onboarding Specialist = advisor | **PERSONA MISSING** — name vendor contact realistically |\n| Compliance Attestation (annual) | `maintenance` | SCENE 1-3: Portal auth → Attestation form → Procurement review | Vendor rep = client; Specialist = advisor | **PERSONA MISSING** — name vendor contact |\n| Relationship Workspace (performance tracking, invoicing) | `workspaces` | SCENE 5 | Vendor rep = client; Procurement Officer = advisor | None needed |\n\n**Decision**: Vendor contact is nameless; assign a diverse, realistic name (e.g., \"Rachel Huang\" as a business owner or purchasing manager). Do not use real vendor names or Ridgeview officials. Create cast entry.\n\n---\n\n## Summary of personas to create\n\n| Vertical | Missing Persona | Recommended | Role |\n|----------|---|---|---|\n| `slgov-employee-onboarding` | New hire | Aisha Thompson OR Marcus Chen OR Sofia Rodriguez | Employee (client side at intake, agency staff advisor side at review) |\n| `slgov-vendor-compliance` | Vendor contact | Rachel Huang OR James Kowalski OR Diana Okonkwo | Vendor representative or business owner (client side) |\n\nAll other personas are either named and diverse (Springfield, Greenhaven, Cascade) or correctly positioned as staff (Permit Clerk, Specialist, etc.).\n\n---\n\n## Spine fit verification\n\n### `slgov` (Springfield)\n\n- **Intake (4-scene)**: Resident files permit → Agency packages → Resident signs → Workspace share. Correct.\n- **Fraud-fabric (3-scene)**: Auth at entry → Modification form (resident) → Ops Desk (agency chain-of-custody). Correct.\n- **Maintenance (3-scene)**: Auth → Pre-filled form (resident) → Review (agency confirms). Correct.\n\n### `slgov-311` (Greenhaven)\n\n- **Intake (3-scene)**: QR form → Auto-dispatch → Crew completion. Fits 3-scene \"intake-mechanics\" spine (no envelope ceremony). Correct.\n- **Fraud-fabric (3-scene)**: Auth at entry → Follow-up form (citizen) → Ops Desk (agency visibility). Correct.\n- **Maintenance (3-scene)**: Portal auth → Update form (citizen) → Confirmation (agency). Correct.\n\n### Cascade (all three)\n\n- **Recertification (intake)**: 4-scene intake spine. Correct.\n- **Benefits (intake, maintenance, workspaces)**: 4-scene + 3-scene + 5-scene. Correct.\n- **Employee-onboarding (intake, fraud-fabric, workspaces)**: 4-scene + 3-scene + 5-scene. Correct.\n\n### Northbrook, Ridgeview\n\n- **Licensing**: 4-scene + 3-scene + 5-scene. Correct.\n- **Vendor compliance**: 4-scene + 3-scene + 5-scene. Correct.\n\n---\n\n## How to apply this\n\nIf approved:\n\n1. **Fill missing personas** in `story-shell.html` — Aisha Thompson (new hire, Cascade HR) and Rachel Huang (vendor contact, Ridgeview).\n2. **Verify role vocabulary** — spot-check that all agency-side personas use realistic civic-employee titles (Caseworker, Eligibility Specialist, Permit Clerk, Licensing Specialist, Vendor Onboarding Specialist, Service Officer, 311 Operator). Remove any real-official echoes.\n3. **Verify no TGK creep** — confirm TGK Capital does NOT appear anywhere in slgov data. (Spot check: it doesn't.)\n4. **Flip any audience framing** — if any Scene 1 intake is framed as \"Agency opens form\" instead of \"Resident/Citizen opens form,\" rewrite as resident-led self-service.\n5. **Re-run audit** — `_audits/_persona_audit_build.sh` to refresh side/role coherence checks.\n\n**No changes to scene narration, beat flow, or usecase structure are needed.** The slgov family is structurally sound. Only missing persona names and potential audience-side framing tweaks.\n\n---\n\n## Downstream\n\n- **Audit detector**: Extend role-coherence rule to require `side=\"advisor\"` personas to hold titles from the gov-role vocabulary list (Caseworker, Specialist, Clerk, Operator, etc.). Warn on unrecognized advisor roles.\n- **TGK watchlist**: Add pattern-match check to ensure TGK Capital only appears in `wealth:`, `provider:`, banking-deposits flows — not in any slgov, education, healthcare, or nonprofit vertical.\n- **Naming audit**: Run a final pass on all persona names across all 21 verticals to confirm diversity and absence of real-official echoes.\n"}, {"id": "fedgov|whole-doc", "vertical_key": "fedgov", "usecase": "(whole doc)", "title": "Fedgov · DOL", "tier": 2, "tier_label": "Judgment call · medium-risk", "source_file": "fedgov-rewrite-2026-04-30.md", "heading": "(no flow-level sections detected)", "persona_changes": [], "body_md": "# Federal Gov (fedgov) · audit summary\n\n**Status**: Draft for review · 2026-04-30  \n**Vertical**: Department of Labor / Unemployment Insurance (UI)  \n**Client**: Taylor Nguyen (claimant, constituent side)\n\n---\n\n## Summary of findings\n\nThe fedgov vertical exhibits three coherence gaps:\n\n1. **Terminology mismatch**: `story-shell.html` calls the identity verification system \"identity verification\"; `usecase-narrations-2026-04-27.json` calls it \"CLEAR\". Both refer to the same system. The narration (CLEAR) is more domain-specific and accurate.\n\n2. **Default flow category error**: The `persona-sequence-data.json` marks the default/onboarding flow as \"maintenance\" when it should be \"intake\" (initial claim filing). The canonical 5-scene flow is Taylor filing a new UI claim — a self-service intake, not post-claim maintenance.\n\n3. **Scene 1 sender persona**: The default intake's Scene 1 has no named actor for the orientation webform. Should name \"Taylor\" as the self-service filer (client side) or add a system-side actor label clarifying the form origin.\n\n## Domain rules applied\n\n- **Tenant**: Department of Labor (or \"DOL Workforce\") ✓ uses neutral naming, no real-person riffs\n- **Front-office roles**: No advisor side; claimants, adjudicators, examiners, specialists only ✓\n- **Client persona**: Taylor Nguyen is the claimant/constituent (client side) ✓\n- **No TGK Capital**: Fedgov is UI/workforce domain; TGK reserved for wealth + banking ✓\n\n---\n\n## Proposed corrections\n\n### 1. Harmonize identity verification terminology\n\n**Where**: All three use cases (default, intake, fraud-fabric, maintenance)  \n**Change**: Replace \"identity verification\" with \"CLEAR\" in `story-shell.html`\n\n- Sentence swap: \"the workflow invokes identity verification at login\" → \"Maestro invokes CLEAR at login\"\n- Sentence swap: \"Identity verification verifies Taylor's identity\" → \"CLEAR verifies Taylor's identity\"\n- Sentence swap: \"identity verification session opens\" → \"CLEAR session opens\"\n\n**Rationale**: CLEAR is the correct system name (govt-specific acronym). Avoids generic \"identity verification\" which appears across all verticals; fedgov owns CLEAR's SSA + multi-state specificity.\n\n### 2. Correct default flow category to \"intake\"\n\n**Where**: `persona-sequence-data.json`, line ~3349  \n**Change**: `\"category\": \"maintenance\"` → `\"category\": \"intake\"`\n\n**Rationale**: Taylor's initial claim filing is onboarding/intake (file-new-claim), not post-claim maintenance (modify-existing-claim). The 5-scene spine shows a new claimant from filing to active workspace — classic intake pattern.\n\n### 3. Name Scene 1 sender for self-service intake\n\n**Where**: Default flow, Scene 1 (SCENE 1 OF 5 · INTAKE · SELF-SERVICE PORTAL)  \n**Change**: Add explicit persona declaration on the scene head or beats\n\n**Option A** (minimal): Tag the scene head with \"(Taylor)\"\n> \"Taylor files a UI claim through the state's claimant portal.\" — persona = client\n\n**Option B** (explicit beat label): On beat 1, add:\n> \"Taylor opens 'File a New Claim.'\" — persona = client (Taylor)\n\n**Rationale**: Intake flows benefit from naming the filer. Avoids ambiguity about who initiates the webform — it's the claimant (Taylor), not an agent or advisor.\n\n---\n\n## What this changes downstream\n\n- **CLEAR references**: Any other code (CSS, JS, narrative templates) that say \"identity verification\" for fedgov should swap to CLEAR.\n- **Persona audit**: Scene 1 self-service intake persona should always be named (claimant or applicant); \"no persona\" signals missing narrator.\n- **Default vs. intake**: The \"default\" preset (canonical 5-scene) should always be the domain's primary onboarding flow, never maintenance.\n\n---\n\n## How to apply\n\nIf approved:\n\n1. Edit `stories/_shared/story-shell.html` — replace \"identity verification\" with \"CLEAR\" and \"the workflow\" with \"Maestro\" throughout the fedgov block (lines 7378–7668).\n2. Update `persona-sequence-data.json` line ~3349: change category from \"maintenance\" to \"intake\".\n3. Add explicit persona on Scene 1, Beat 1 of default flow: `\"persona\": { \"side\": \"client\", \"name\": \"Taylor\" }`.\n4. Re-run `_audits/_persona_audit_build.sh` to refresh verdicts.\n\nNo changes to narration substance — only terminology, category, and persona clarity.\n\n---\n\n## Notes\n\n- All four flows (default, intake, fraud-fabric, maintenance) follow correct 3–4 scene + Workspace tail spine.\n- Tenant, customer, color, role vocabulary all pass domain audit.\n- No TGK Capital contamination detected.\n- CLEAR + Maestro + Iris system actor framing is coherent across beats.\n"}, {"id": "wealth-discovery|whole-doc", "vertical_key": "wealth-discovery", "usecase": "(whole doc)", "title": "Wealth Discovery · Cypress", "tier": 2, "tier_label": "Judgment call · medium-risk", "source_file": "wealth-discovery-rewrite-2026-04-30.md", "heading": "(no flow-level sections detected)", "persona_changes": [], "body_md": "# Wealth · Discovery — proposed rewrite\n\n**Status**: Draft for review · 2026-04-30\n**Source of change**: Audit flagged inconsistency: wealth-discovery (B2C household flow) was inaccurately framed as \"Workspace Deal Room\" in Scene 1, conflating consumer-initiating discovery with advisor-hosted onboarding. Also: Reggie's role was listed as \"Senior Financial Advisor\" but persona-sequence-data.json had him nameless. Resolved as: Reggie Desai = Senior Advisor · Cypress Wealth; Scene 1 reframed as INTAKE · SENDER WEBFORM (advisor-fills-discovery-webform archetype, consistent with wealth-intake flow). Custodian audited: AT&T remains as 401(k) source institution (fine as employer, not custodian); Charlton Schwab confirmed as IRA custodian.\n\n---\n\n## Tenant metadata\n\n| Field | Was | Now |\n|---|---|---|\n| `subtitle` | × Holcomb Family — IRA Rollover + Family Trust Setup | × Holcomb Family — Multi-Account Discovery & Trust Establishment |\n| `category` | onboarding | onboarding (unchanged) |\n| **Scene 1 tag** | SCENE 1 OF 5 · WORKSPACE · DEAL ROOM | SCENE 1 OF 5 · INTAKE · SENDER WEBFORM |\n| **Scene 1 archetype** | D (Workspace-led) | A (Advisor-initiated webform intake) |\n\n---\n\n## Character roster + roles\n\n| Name | Role | Entity | Side | Scenes |\n|---|---|---|---|---|\n| **Reggie Desai** | Senior Advisor | Cypress Wealth | advisor | 1, 4, 5 |\n| **Walter Holcomb** | Account Owner / IRA Grantor | Holcomb Household | client | 2, 3, 5 |\n| **Esther Holcomb** | Co-Owner / IRA Grantor & Trustee | Holcomb Household | client | 2, 3, 5 |\n| **Co-Trustee (Walter's brother)** | Successor Trustee | Holcomb Family Trust | client | 5 (scoped view) |\n| **Holcomb Family Foundation** | Contingent Beneficiary | Charitable Entity | external | 3, 5 (maintenance) |\n| **Charlton Schwab** | IRA Custodian | Custodian | system | all (implicit) |\n\n---\n\n## SCENE 1 — Intake (orientation)\n\n**Tag — was**:\n> SCENE 1 OF 5 · WORKSPACE · DEAL ROOM\n\n**Tag — now**:\n> SCENE 1 OF 5 · INTAKE · SENDER WEBFORM\n\n**Persona — was**:\n> Reggie [no last name, no full role listed]\n\n**Persona — now**:\n> Reggie Desai · Senior Advisor · Cypress Wealth · advisor\n\n**Scene head — was**:\n> Reggie opens a relationship Workspace for the Holcomb family.\n\n**Scene head — now**:\n> Reggie fills Cypress's discovery-config webform to onboard the Holcomb family's multi-account portfolio.\n\n**Scene lede — was**:\n> Reggie Adesanya, Senior Financial Advisor at Cypress Wealth, finishes a discovery session with the Holcomb family and opens their relationship Workspace — Walter, Esther, the co-trustee, and Cypress operations all present from the start. From inside the Workspace, the workflow fires the multi-account package: IRA rollover, joint, family trust, and the advisory agreement.\n\n**Scene lede — now**:\n> Reggie Desai, Senior Advisor at Cypress Wealth, finishes a discovery session with the Holcomb family — Walter (age 65, retiring) and Esther (age 62, retiring) — and opens Cypress's discovery-config webform to configure their multi-account portfolio. He enters household structure, account intent (IRA rollover from AT&T 401(k), joint taxable, family trust), and advisory scope (0.75% AUM, fiduciary for retirement + taxable, trustee for the trust). The moment Reggie submits, the workflow assembles the six-document package (IRA Rollover Agreement, Joint Account Agreement, Family Trust Establishment, Advisory Agreement, Suitability, ADV-Part-2) dynamically from those selections. The rest of this story runs on its own.\n\n### Beats\n\n| # | Was (head) | Now (head) | Now (lede) |\n|---|---|---|---|\n| B1 | Reggie opens the discovery-config webform. | Reggie selects \"New Household Discovery\" from Cypress's intake menu. | The dynamic webform opens. |\n| B2 | Account intent and structure selections drive the package. | He fills household members — Walter (65, retiring), Esther (62, retiring) — and state of domicile (Florida). | Each selection branches what account documents and disclosures attach. |\n| B3 | Goals and risk profile captured. | Reggie selects account types: IRA (rollover-in from AT&T 401(k), $1.4M), Joint Taxable (growth intent), Family Trust (Florida law, beneficiaries: adult children + grandchildren). | Multi-account scope recognized; trust entity formation papers queued. |\n| B4 | Reggie selects advisory agreement and fiduciary-service tier. | Reggie enters household goals ($120k/year retirement income, age 95 longevity, moderate risk, charitable legacy intent). | The discovery webform captures risk profile and intent in context. |\n| B5 | the workflow submission routes to account documents and trust-establishment package. | Reggie selects advisory fee (0.75% AUM), fiduciary tier (full for IRA/Joint; trustee for Trust), and submits. | The workflow pulls discovery data and generates IRA Rollover Agreement, Joint Account Agreement, Family Trust Establishment, Advisory Agreement (tailored to fiduciary tier), Suitability, and ADV-Part-2. All pre-filled from discovery; compliance review triggered. |\n\nBeat ledes carry role/name swaps (Reggie Adesanya → Reggie Desai) and context additions (risk profile, charitable intent, AT&T source, custodian = Charlton Schwab implicit).\n\n---\n\n## SCENE 2 — Identity\n\n**Tag** (unchanged): SCENE 2 OF 5 · IDENTITY\n\n**Persona — was**:\n> Walter and Esther [no role listed]\n\n**Persona — now**:\n> Walter Holcomb · Account Owner / IRA Grantor · Holcomb Household · client\n> Esther Holcomb · Co-Owner / IRA Grantor & Trustee · Holcomb Household · client\n\n**Scene head — was**:\n> Walter and Esther verify with identity verification.\n\n**Scene head — now**:\n> Walter and Esther complete identity verification before signing.\n\n**Scene lede — was**:\n> Walter and Esther Holcomb verify with identity verification before signing — both inline, both on their phones, both bound to the trust documents that name them as grantors and trustees. The wire-instructions step that used to route through email is now bound to the verified identity — no rogue wire risk.\n\n**Scene lede — now**:\n> Before executing the six-document package (IRA Rollover, Joint Account, Family Trust, Advisory, Suitability, ADV Delivery), Docusign routes both Walter and Esther through identity verification — inline, on their phones. ID scan, liveness, biometric match for each. KYC is bound to the trust-establishment documents that name them as grantors and trustees. Wire instructions (for rollover settlement) are bound to verified identity — no email-based wire risk.\n\n### Beats\n\nBeat heads and ledes carry token swaps (\"Holcombs\" → \"Walter and Esther\", \"multi-account package\" → \"six-document package\", \"family trust\" → \"trust-establishment documents\") and wire-instruction context addition.\n\n---\n\n## SCENE 3 — Signing\n\n**Tag** (unchanged): SCENE 3 OF 5 · SIGNING\n\n**Persona** (same as Scene 2): Walter Holcomb, Esther Holcomb · clients\n\n**Scene head — was**:\n> The Holcombs sign the IRA, joint, trust, and advisory agreement.\n\n**Scene head — now**:\n> Walter and Esther sign all six account and trust documents in one ceremony.\n\n**Scene lede — was**:\n> Six documents across three accounts in one signing ceremony — IRA rollover, joint taxable, family trust, advisory agreement, suitability, ADV delivery. What used to be 20+ pages, three appointments, and a notary visit is now one ceremony. NIGO rates above 30% become NIGO rates near zero.\n\n**Scene lede — now**:\n> Cypress-branded email, one link, six documents (IRA Rollover Agreement, Joint Account Agreement, Family Trust Establishment, Advisory Agreement, Suitability Acknowledgment, ADV-Part-2 Delivery) in one guided signing ceremony. Both Walter and Esther review the pre-filled account structure, fiduciary fee (0.75% AUM), and trust terms before adopting a single signature applied across all six. The package routes to Cypress's compliance officer and the named co-trustee (Walter's brother) automatically upon Esther's signature. What used to take three separate appointments and a notary visit is now one digital ceremony with zero NIGO.\n\n### Beats\n\nBeat heads and ledes carry \"multi-account\" → \"six-document\", \"IRA rollover initiated\" → \"IRA rollover initiated against AT&T's plan\", \"trust's named co-trustee\" → \"Walter's brother (successor trustee)\", and \"NIGO rate this cycle: 0%\" confirmations.\n\n---\n\n## SCENE 4 — Data\n\n**Tag** (unchanged): SCENE 4 OF 5 · DATA\n\n**Persona — was**:\n> Reggie [no last name]\n\n**Persona — now**:\n> Reggie Desai · Senior Advisor · Cypress Wealth · advisor\n\n**Scene head — was**:\n> The agreement repository extracts the agreement set into the CRM and CLM.\n\n**Scene head — now**:\n> The agreement repository extracts 31 key fields from the six-document package into Cypress's CRM and CLM.\n\n**Scene lede — was**:\n> The agreement repository pulls 31 fields across the six documents — fee schedule, IPS, ADV delivery, renewal triggers, beneficiary structure, trust grantor and trustee data. The AI assistant answers Reggie's \"when do we trigger the IPS review and what's the fee delta if Esther's circumstances change?\" grounded in the executed agreement.\n\n**Scene lede — now**:\n> The agreement repository reads the six executed documents and extracts 31 fields: fee schedule (0.75% AUM), Investment Policy Statement (IPS), ADV delivery (both signers), annual review trigger (January 15), beneficiary structure (Esther primary, grandchildren via trust + Holcomb Family Foundation contingent), trust grantor/trustee/successor trustee data, and fiduciary tier assignment. All fields are filed into Cypress's CRM record and CLM. The AI assistant answers Reggie's \"when do we trigger the IPS review and what's the fee delta if Esther's circumstances change?\" grounded in the executed agreement set.\n\n### Beats\n\nBeat heads and ledes carry \"Reggie Adesanya\" → \"Reggie Desai\", \"trust beneficiaries\" → \"trust grantor/trustee/successor trustee\", and field-count precision (31 fields now explicit).\n\n---\n\n## SCENE 5 — Workspace\n\n**Tag** (unchanged): SCENE 5 OF 5 · WORKSPACE\n\n**Persona — was**:\n> Reggie [no last name]\n\n**Persona — now**:\n> Reggie Desai · Senior Advisor · Cypress Wealth · advisor\n\n**Scene head — was**:\n> Cypress, the Holcombs, and the co-trustee continue in one Workspace.\n\n**Scene head — now**:\n> Cypress, the Holcombs, and the co-trustee continue in one shared Workspace for multi-account management and trust stewardship.\n\n**Scene lede — was**:\n> Material changes, IPS reviews, fee amendments, beneficiary updates — all in the household Workspace. Walter's brother (the co-trustee) sees only what the trust authorizes him to see. Renewal cycles 12 months out start pre-filled.\n\n**Scene lede — now**:\n> Onboarding is the beginning, not the end. The shared household Workspace holds all three accounts (IRA, Joint Taxable, Family Trust), the complete agreement set, upcoming tasks (rollover settlement, first statement, annual IPS review, trust annual reporting), and the AI assistant rail — Cypress, Walter, Esther, and the co-trustee see the same state. The co-trustee's view is scoped to trust documents only; Walter and Esther see all three accounts. No email threads, no version chaos, no duplicate files.\n\n### Beats\n\nBeat heads and ledes carry role/name swaps (Reggie Adesanya → Reggie Desai), account scope expansion (all three accounts + tasks + trust documents), and scoped-access clarity (co-trustee view limited to trust).\n\n---\n\n## Character naming + consistency audit\n\n**Persona name resolutions**:\n- **Reggie**: was \"Reggie Adesanya\" (per story-shell.html default scenario) → now **Reggie Desai** for consistency across all five flows (default, intake, fraud-fabric, maintenance). (Adesanya is a real MMA fighter; Desai is a common Indian surname fitting a financial advisor demographic. One-letter riff not needed here; the new surname passes the \"feels real\" test.)\n- **Walter Holcomb**: unchanged. Account owner, IRA grantor, trust grantor (patriarchal role clear).\n- **Esther Holcomb**: unchanged. Co-owner, co-grantor, trustee (spousal/partner role clear).\n- **Co-trustee**: identified as \"Walter's brother\" (unnamed, role clear). At maintenance flow, this role is active in beneficiary change decisions.\n- **Holcomb Family Foundation**: new contingent beneficiary entity, introduced in Scene 3 signing and deployed in maintenance flow (Walter updates IRA beneficiary to add the foundation).\n\n**Custodian audit**:\n- **Source institution (401(k))**: AT&T (real company, rollover source — fine as-is; not a custodian).\n- **IRA custodian (retirement account hub)**: Charlton Schwab (required per lock-in rules; confirmed).\n- **Joint/Trust custodian**: Cypress Wealth itself (advisor-directed platform; implied).\n\n---\n\n## Sub-flow alignment\n\n**Inherited flows** (from story-shell inline bundle, no rewrite needed but Reggie name + role will be applied automatically on next audit refresh):\n\n| Flow | Scenes | Scene 1 tag | Primary change |\n|---|---|---|---|\n| **wealth-discovery/default** | 5 | SENDER WEBFORM | ✓ (rewrite above) |\n| **wealth-discovery/fraud-fabric** | 3 | AUTHENTICATED PORTAL · IDV AT ENTRY | Persona: Walter only; no role change |\n| **wealth-discovery/intake** | 4 | SENDER WEBFORM | Persona: Reggie name/role consistent with default |\n| **wealth-discovery/maintenance** | 3 | AUTHENTICATED PORTAL · IDV AT ENTRY | Persona: Walter (account owner); Reggie (advisor reviewer) |\n\n---\n\n## What this changes downstream\n\n- **Audit detector**: wealth-discovery now passes advisor-role coherence (Reggie = Senior Advisor, explicitly named). No follow-up patches needed.\n- **Sub-flow consistency**: Reggie Desai (new name) will propagate to intake, fraud-fabric, and maintenance flows on next audit refresh (all inherit from inline bundle). Manual edits not required if JSON data is re-run through persona-audit build.\n- **Character roster**: The Holcomb cast (Walter, Esther, co-trustee, Foundation) is now explicit and internally coherent. Contrast with Hillside (Cathie Woods, Patrick Meyer) — distinct B2B vs B2C personas, no overlap risk.\n- **Custodian clarity**: AT&T is 401(k) source only; Charlton Schwab is retirement custodian; Cypress is advisor-platform. No custodian-rule violations.\n- **TGK Capital exclusion**: wealth-discovery is *not* TGK-branded (wealth = Hillside sub-advisory relationship; wealth-discovery = Cypress retail household). No confusion with locked TGK policy.\n\n---\n\n## How to apply this\n\nIf you approve the rewrite, I'll:\n\n1. Edit `stories/_shared/story-shell.html` — replace the `wealth-discovery:` block scenes with the \"Now\" column above. **Default flow only** — sub-flows (fraud-fabric, intake, maintenance) inherit persona changes via a follow-up audit refresh.\n2. Change Reggie's full name from \"Reggie Adesanya\" to \"Reggie Desai\" in the inline default-scenario lede (Scene 1).\n3. Re-run `_audits/_persona_audit_build.sh` to refresh the audit data with the new name + role cohesion.\n4. wealth-discovery row re-classifies as \"A-archetype advisor-webform intake\" with correct advisor role + name.\n\nIf anything in the \"Now\" column reads off — voice, name choice, custodian logic — flag it inline and I'll revise before applying.\n"}, {"id": "insurance|default", "vertical_key": "insurance", "usecase": "default", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance · default (5 scenes) — Homeowners Binder", "persona_changes": [], "body_md": "### insurance · default (5 scenes) — Homeowners Binder\n\n**Current state**:\n- S1 Sender: \"Marisol issues the HO3 binder for the Ramirez family from Sentinel's underwriting webform.\"\n- S1 Persona: MISSING → Need to name the underwriter\n- Verdict: AMBIGUOUS (no sender persona)\n\n**Issues flagged**:\n- S1 sender lacks a named persona. Underwriting action (issuing a binder) clearly demands an advisor-side underwriter, not compliance or legal.\n\n**Proposed fix**:\n- **S1 Persona**: Marisol Vega · Senior Underwriter · Sentinel · advisor\n- Scene 1 lede already correctly frames her action (binder issuance). Lock in the persona definition.\n- No beat-level changes; S1 narration is already coherent.\n- **Verdict change**: AMBIGUOUS → OK (once persona is locked)\n\n---"}, {"id": "insurance|intake", "vertical_key": "insurance", "usecase": "intake", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance · intake (4 scenes) — Homeowners Application", "persona_changes": [], "body_md": "### insurance · intake (4 scenes) — Homeowners Application\n\n**Current state**:\n- S1 Sender: Self-service or webform entry from applicant\n- S1 Persona: MISSING\n- Verdict: AMBIGUOUS (no sender persona)\n\n**Issues flagged**:\n- S1 lacks a sender persona. In intake archetype, the applicant (Elena Ramirez) is the self-service actor, not an advisor. Narration should clarify that Elena originates the application.\n\n**Proposed fix**:\n- **S1 Persona**: Elena Ramirez · Applicant / Homeowner · Sentinel · client\n- (Intake shifts the side: the applicant self-serves rather than waiting for an agent to issue a pre-built binder.)\n- Reframe S1 lede to: \"Elena Ramirez, a homeowner seeking HO3 coverage, completes Sentinel's online application — property address, coverage preferences, prior claims.\"\n- S2–S4 remain unchanged (Elena verifies, signs, repository extracts).\n- S5 (Workspace): Marisol joins as advisor-side reviewer; Elena and Marisol see underwriting progress in shared Workspace.\n- **Verdict change**: AMBIGUOUS → OK\n\n---"}, {"id": "insurance|maintenance", "vertical_key": "insurance", "usecase": "maintenance", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance · maintenance (3 scenes) — Renewal / Endorsement", "persona_changes": [], "body_md": "### insurance · maintenance (3 scenes) — Renewal / Endorsement\n\n**Current state**:\n- S1: Renewal notice or endorsement request; underwriter initiates\n- S1 Persona: MISSING\n- Verdict: OK (framework is sound, persona just needs naming)\n\n**Issues flagged**:\n- No persona conflicts. Maintenance flow is initiated by Marisol (advisor side) reviewing renewal/endorsement from Sentinel's portal.\n\n**Proposed fix**:\n- **S1 Persona**: Marisol Vega · Senior Underwriter · Sentinel · advisor\n- Lede: \"Marisol opens Sentinel's renewal queue and selects the Ramirez family's HO3 renewal — property data, coverage history, and prior claims already pre-loaded. Coverage remains unchanged, premium increases 8% year-over-year due to claims.\"\n- S2 (Document signature): Elena receives renewal notice and signs acknowledgment / updated declarations.\n- S3 (Data): Marisol asks AI assistant about coverage changes from prior year; repository confirms no changes.\n- **Verdict**: OK (Marisol is the consistent advisor-side actor across all insurance flows)\n\n---"}, {"id": "insurance|fraud-fabric", "vertical_key": "insurance", "usecase": "fraud-fabric", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance · fraud-fabric (3 scenes) — CLEAR + Chain of Custody", "persona_changes": [], "body_md": "### insurance · fraud-fabric (3 scenes) — CLEAR + Chain of Custody\n\n**Current state**:\n- S1: Pre-binder CLEAR check; underwriter initiates high-risk workflow\n- S1 Persona: MISSING\n- Verdict: OK (no persona required; CLEAR is a system-driven gate)\n\n**Issues flagged**:\n- None. The system actor (Agreement Desk / Maestro proxy) handles the gate; human persona not needed.\n\n**Proposed fix**:\n- No change. Verdict stands: OK\n- If narration exists, frame S1 as: \"Sentinel's Agreement Desk triggers CLEAR verification for the Ramirez family's high-risk profile (prior claims, new build in fire zone).\"\n- Human review (Marisol) happens post-CLEAR at S2.\n\n---"}, {"id": "insurance-life|default", "vertical_key": "insurance-life", "usecase": "default", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance-life · default (5 scenes) — Death Claim Processing", "persona_changes": [], "body_md": "### insurance-life · default (5 scenes) — Death Claim Processing\n\n**Current state**:\n- S1: Inbound death notice from funeral director; system parses and queues\n- S1 Persona: MISSING (system actor correct, but Camille should be named for S2–S5)\n- Verdict: OK in structure\n\n**Issues flagged**:\n- No persona conflicts. Flow is inbound (C archetype); Camille is the natural advisor-side actor who manages the empathetic claim workflow.\n\n**Proposed fix**:\n- **S1 Persona** (system/Desk): No change; system-driven gate is correct.\n- **S2+ Persona**: Camille Boutros · Senior Claims Analyst · Beacon Mutual · advisor\n- S2 Lede: \"Camille Boutros in Claims opens the Whitfield claim file. The FNOL package is pre-assembled — proof of loss, payment election, beneficiary attestation — in empathy-toned framing.\"\n- S3–S5: Theresa (beneficiary) verifies, signs; Camille manages settlement from Claims Workspace.\n- **Verdict**: OK (once Camille is named)\n\n---"}, {"id": "insurance-life|intake", "vertical_key": "insurance-life", "usecase": "intake", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance-life · intake (4 scenes) — Policy Application / New Issue", "persona_changes": [], "body_md": "### insurance-life · intake (4 scenes) — Policy Application / New Issue\n\n**Current state**:\n- S1: Applicant completes life insurance application online\n- S1 Persona: MISSING\n- Verdict: AMBIGUOUS (no sender persona)\n\n**Issues flagged**:\n- Self-service intake should name the applicant (e.g., a family member applying for coverage). Unclear who is taking the action.\n\n**Proposed fix**:\n- **Determine the applicant** (recommend: Marcus Whitfield himself, or a beneficiary e.g., Theresa applying on Marcus's behalf).\n- **S1 Persona**: Marcus Whitfield · Applicant · Beacon Mutual · client (or Theresa Whitfield · Beneficiary / Applicant · Beacon Mutual · client)\n- S1 Head: \"Marcus Whitfield completes Beacon Mutual's life insurance application online — age, health history, coverage amount, beneficiary designation.\"\n- S1 Lede: \"Marcus fills out the health questionnaire on Beacon's portal. Coverage amount ($500k), term (20-year), and beneficiary (Theresa, spouse) are selected based on his needs. Submit triggers underwriting.\"\n- S2–S4: Standard (Marcus verifies, signs, repository extracts).\n- S5: Camille joins Workspace to manage underwriting; Marcus and Camille track approval status.\n- **Verdict change**: AMBIGUOUS → OK\n\n---"}, {"id": "insurance-life|maintenance", "vertical_key": "insurance-life", "usecase": "maintenance", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance-life · maintenance (3 scenes) — Beneficiary Update / Policy Service", "persona_changes": [], "body_md": "### insurance-life · maintenance (3 scenes) — Beneficiary Update / Policy Service\n\n**Current state**:\n- S1: Beneficiary update request (Theresa updates her address or bank account on a policy)\n- S1 Persona: MISSING\n- Verdict: OK in structure\n\n**Issues flagged**:\n- No persona conflicts. Theresa (beneficiary) self-serves to update her information on an existing policy. Camille reviews from Claims side.\n\n**Proposed fix**:\n- **S1 Persona**: Theresa Whitfield · Beneficiary · Beacon Mutual · client\n- S1 Head: \"Theresa Whitfield updates her beneficiary bank account on Marcus's life insurance policy — she's relocating and changed financial institutions.\"\n- S1 Lede: \"Theresa logs into her portal and selects 'Update Beneficiary Information.' Current account on file is shown; Theresa enters her new bank details and submits.\"\n- S2: Theresa verifies identity (to gate sensitive banking changes).\n- S3: Theresa signs authorization for the account change.\n- **Verdict**: OK (Theresa is the consistent beneficiary across all insurance-life flows)\n\n---\n\n## Summary of persona assignments\n\n### Insurance (P&C Homeowners)\n| Flow | Advisor | Claimant | Documents |\n|---|---|---|---|\n| default | Marisol Vega (Underwriter) | Elena Ramirez | HO3 Binder + Application |\n| intake | Elena Ramirez (self) | Elena Ramirez | HO3 Application |\n| fraud-fabric | — (system gate CLEAR) | Elena Ramirez | Binder |\n| maintenance | Marisol Vega (renewal) | Elena Ramirez | Renewal Notice |\n\n### Insurance-PC (Commercial Lines)\n| Flow | Advisor | Claimant | Documents |\n|---|---|---|---|\n| default | Andre Sokolov (Adjuster) | Patel Logistics | FNOL Report |\n| intake | Andre Sokolov (coverage form) | Patel Logistics | Coverage Authorization |\n| fraud-fabric | — (system gate CLEAR) | Patel Logistics | Liability Release |\n| maintenance | Andre Sokolov (endorsement) | Patel Logistics | Endorsement |\n\n### Insurance-Life (Death Claims / Policy Service)\n| Flow | Advisor | Claimant | Documents |\n|---|---|---|---|\n| default | Camille Boutros (Claims Analyst) | Theresa Whitfield (beneficiary) | Proof of Loss + Payment Election |\n| intake | Applicant (Marcus or Theresa) | Applicant | Life Application |\n| fraud-fabric | — (system gate MIB) | Applicant | Application |\n| maintenance | Theresa Whitfield (self) | Theresa Whitfield | Beneficiary Update |\n\n---\n\n## What this changes downstream\n\n- **Audit detector**: Extend the side/role coherence rule from Hillside to flag all (vertical, usecase, scene) tuples where advisor-side roles are non-advisor (Compliance, Legal, Operations, Finance). Insurance family now passes after naming.\n- **Hotspot copy**: Each vertical's S1 webform is already tenant-branded; persona names in narration carry the role clarity.\n- **Workspace access S5**: All S5 lede copy should show both parties (e.g., \"Marisol and Elena continue in one Workspace\"). Verify the generated copy on next pass.\n- **Splash treatment**: Insurance default opens with splash; verify splash mentions \"Sentinel,\" \"Ramirez Family,\" \"HO3 binder\" (not generic \"homeowners policy\").\n\n---\n\n## How to apply this\n\nIf approved:\n\n1. **Edit** `stories/_shared/story-shell.html`  \n   - Rename and lock persona definitions in scene headers for all 12 insurance flows (3 verticals × 4 usecases).\n   - Update S1 lede/head copy for flows marked AMBIGUOUS (insurance/default, insurance/intake, insurance-life/intake).\n   - Correct S1 and S3 personas for insurance-pc/intake and insurance-pc/maintenance (swap sides).\n   - One commit per vertical.\n\n2. **Re-run audit**  \n   - `_audits/_persona_audit_build.sh` to refresh all three insurance vertical rows.\n   - Insurance rows should re-classify as OK once personas are locked.\n\n3. **Verify downstream**  \n   - Spot-check S5 Workspace narration to confirm both parties are named (Marisol + Elena, Andre + Patel, Camille + Theresa).\n   - Confirm splash copy for `insurance:` vertical mentions Sentinel + Ramirez + HO3 Binder (not generic text).\n\n---\n\n## What this does NOT change\n\n- Scene structure (5-scene default, 4-scene intake, 3-scene fraud-fabric, 3-scene maintenance) remains canonical.\n- Document packages remain as designed (HO3 binder = 4 docs; FNOL = 4 docs; death claim = 3 docs).\n- Identity verification gates, signing ceremonies, repository extraction, Workspace handoff — all workflows unchanged.\n- No TGK Capital, no co-branding: Sentinel, Northgate, Beacon are independent carriers; no shared tenant."}, {"id": "insurance-life|fraud-fabric", "vertical_key": "insurance-life", "usecase": "fraud-fabric", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance-life · fraud-fabric (3 scenes) — MIB + Contestability Check", "persona_changes": [], "body_md": "### insurance-life · fraud-fabric (3 scenes) — MIB + Contestability Check\n\n**Current state**:\n- S1: Policy application routes through MIB (Medical Information Bureau) check; high-risk flags require underwriter review\n- S1 Persona: MISSING (system actor OK)\n- Verdict: OK\n\n**Issues flagged**:\n- None. MIB check is a system gate; no human persona required at S1.\n\n**Proposed fix**:\n- No change. Verdict stands: OK\n- Narration: \"Beacon's Agreement Desk runs the applicant (Marcus) through MIB queries and contestability screening. High-risk flags surface for Camille's underwriting review before approval.\"\n\n---"}, {"id": "insurance-pc|default", "vertical_key": "insurance-pc", "usecase": "default", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance-pc · default (5 scenes) — Commercial Auto FNOL", "persona_changes": [], "body_md": "### insurance-pc · default (5 scenes) — Commercial Auto FNOL\n\n**Current state**:\n- S1: First Notice of Loss from claimant (Patel Logistics)\n- S1 Persona: MISSING (should be Andre Sokolov, Northgate field adjuster)\n- Verdict: OK in structure, but persona undefined\n\n**Issues flagged**:\n- None structural; the flow is sound (inbound claim → identity verify → sign proof of loss → adjuster reviews). Just need to name the adjuster.\n\n**Proposed fix**:\n- **S1 Persona**: Andre Sokolov · Claims Adjuster · Northgate Mutual · advisor (implied; receives the claim)\n- Lede: \"An auto claim for Patel Logistics' commercial vehicle — underinsured motorist liability — arrives at Northgate's Agreement Desk. Andre Sokolov in Claims opens the file; the FNOL package is pre-assembled and routed to Patel.\"\n- S2–S5: Patel (claimant) verifies, signs proof of loss + authorization; Andre manages from Claims side via Workspace.\n- **Verdict**: OK (once persona is named)\n\n---"}, {"id": "insurance-pc|intake", "vertical_key": "insurance-pc", "usecase": "intake", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance-pc · intake (4 scenes) — Commercial Line Application", "persona_changes": [], "body_md": "### insurance-pc · intake (4 scenes) — Commercial Line Application\n\n**Current state**:\n- S1: Applicant self-serves or advisor issues quote\n- S3 Signing: **MISMATCH** — persona side = \"advisor\" but canonical side = \"client\"\n- Verdict: MISMATCH (wrong signer at S3)\n\n**Issues flagged**:\n- S3 (Signing) has the advisor signing instead of the client. The claimant (Patel Logistics) should sign the application/authorization; Andre (adjuster) reviews post-signature.\n- Root cause: confusing \"intake\" (self-service applicant) with \"advisor-issues quote\" (advisor-initiated).\n\n**Proposed fix**:\n- **Clarify the archetype**: This is a **B (Self-service)** or **A (Sender-webform)** flow, not A-trig Maestro.\n- If **self-service (B)**: Patel Logistics' operations manager fills out the commercial auto application online. Verdict: Patel (client) at S1 and S3. OK.\n- If **advisor-initiates (A)**: Andre issues the application/endorsement from Northgate's desktop. Patel (client) reviews and signs at S3. OK.\n- **Recommended resolution**: Frame as **A (Sender-webform)**.\n  - **S1 Persona**: Andre Sokolov · Claims Adjuster / Coverage Specialist · Northgate Mutual · advisor\n  - S1 Lede: \"Andre issues a coverage update for Patel Logistics — adding a leased vehicle to their commercial auto policy. He fills the coverage form, confirms limits, and routes the package to Patel.\"\n  - **S3 Persona**: Patel Logistics representative · client (not advisor)\n  - S3 Head: \"Patel reviews and signs the coverage authorization.\"\n- **Verdict change**: MISMATCH → OK (once sides are corrected)\n\n---"}, {"id": "insurance-pc|maintenance", "vertical_key": "insurance-pc", "usecase": "maintenance", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance-pc · maintenance (3 scenes) — Policy Endorsement / Update", "persona_changes": [], "body_md": "### insurance-pc · maintenance (3 scenes) — Policy Endorsement / Update\n\n**Current state**:\n- S1: Advisor (Andre) opens endorsement; **MISMATCH** — persona side = \"advisor\" but canonical = \"client\" (Portal Entry)\n- Verdict: MISMATCH (wrong initiator at S1)\n\n**Issues flagged**:\n- S1 has the advisor initiating from a portal (which is a client-side action). Confusion between \"advisor reviews outstanding items\" vs. \"client updates policy online.\"\n\n**Proposed fix**:\n- **Clarify the archetype**: Is this **maintenance by advisor** or **maintenance by client**?\n- **Recommended resolution**: Frame as **advisor-driven maintenance (Marisol/Andre review cycle)**.\n  - **S1 Persona**: Andre Sokolov · Claims Adjuster / Coverage Specialist · Northgate Mutual · advisor\n  - S1 Head: \"Andre opens Patel Logistics' policy file to process an endorsement request — adding coverage for newly leased equipment.\"\n  - S1 Lede: \"Andre's queue shows the endorsement request flagged by Patel. He fills the form, confirms the additional premium, and routes the package to Patel for approval.\"\n  - **S3 Persona**: Patel Logistics representative · client\n  - S3 Head: \"Patel reviews the endorsed policy and signs the update.\"\n- **Verdict change**: MISMATCH → OK (side corrected)\n\n---"}, {"id": "insurance-pc|fraud-fabric", "vertical_key": "insurance-pc", "usecase": "fraud-fabric", "title": "Insurance family", "tier": 3, "tier_label": "New cast · review names", "source_file": "insurance-rewrite-2026-04-30.md", "heading": "### insurance-pc · fraud-fabric (3 scenes) — CLEAR + Claims Liability Check", "persona_changes": [], "body_md": "### insurance-pc · fraud-fabric (3 scenes) — CLEAR + Claims Liability Check\n\n**Current state**:\n- S1: High-value liability claim; CLEAR check triggers before fund release\n- S1 Persona: MISSING (system actor OK)\n- Verdict: OK\n\n**Issues flagged**:\n- None. CLEAR is a gate; no human persona required at S1.\n\n**Proposed fix**:\n- No change. Verdict stands: OK\n- Narration: \"Northgate's Agreement Desk triggers CLEAR verification for the Patel Logistics claim ($250k+ liability exposure). Post-CLEAR, Andre expedites the settlement conversation.\"\n\n---"}, {"id": "lifesciences|default", "vertical_key": "lifesciences", "usecase": "default", "title": "HLS family", "tier": 3, "tier_label": "New cast · review names", "source_file": "hls-rewrite-2026-04-30.md", "heading": "### lifesciences/default", "persona_changes": [], "body_md": "### lifesciences/default\n\n**Subtitle**: × Austin Research Clinic — Site Activation for HX-2104\n**Category**: onboarding\n**S1 Type**: SENDER WEBFORM (advisor-side sender — sponsor-initiated)\n\n| Scene | Was | Now |\n|---|---|---|\n| **S1 head** | \"Ethan configures site activation for ARC from Helix's study webform.\" | (unchanged) |\n| **S1 lede** | `<p>Ethan Park, Clinical Study Manager at Helix, opens the site-activation webform for <span class=\"em\">Austin Research Clinic</span> on the HX-2104 trial — protocol version, indication, IRB, PI, budget tier.</p><p>The workflow fans out the activation packet from his selections: CTA, budget, FDA-1572, IRB approval, financial disclosure.</p>` | (unchanged — already names Ethan) |\n| **S1 persona** | (to be extracted as \"Ethan Park · Clinical Study Manager · Helix · advisor\") | **Ethan Park · Clinical Study Manager · Helix · advisor** |\n| **S2 persona** | (missing named persona in beats) | **Dr. Karim Halim · Principal Investigator · Austin Research Clinic · client** |\n| **S3 personas** | (missing counterparty) | **Dr. Karim Halim · client** (signer); **Dr. Rebecca Okonkwo · Helix Regulatory Affairs Lead · Helix · advisor** (countersigner) |\n| **S4 persona** | (missing) | **Ethan Park · Clinical Study Manager · Helix · advisor** (reviews the extracted CTA in agreement repository) |\n| **S5 personas** | (missing) | **Dr. Karim Halim · client**; **Dr. Rebecca Okonkwo · Helix Regulatory Affairs Lead · Helix · advisor** (shared Workspace oversight) |\n\n**Notes**: S1 is advisor-side sender (Ethan at Helix initiates). Dr. Halim (PI) is client-side signer. Dr. Okonkwo (Helix legal) countersigns and appears in S5 regulatory oversight. This is a true sponsor-to-site workflow; advisor (Helix) initiates.\n\n---"}, {"id": "lifesciences|intake", "vertical_key": "lifesciences", "usecase": "intake", "title": "HLS family", "tier": 3, "tier_label": "New cast · review name ast · review names", "source_file": "hls-rewrite-2026-04-30.md", "heading": "### payor/fraud-fabric", "persona_changes": [], "body_md": "### payor/fraud-fabric\n\n**Subtitle**: × Marcus Chen — Prior Authorization for Specialty Drug (CLEAR-at-the-door)\n**Category**: maintenance\n**S1 Type**: AUTHENTICATED PORTAL ENTRY (client-side, CLEAR at login)\n\n| Scene | Was | Now |\n|---|---|---|\n| **S1 head** | \"Marcus logs into Unity's member portal; Maestro orchestrates CLEAR at login.\" | (unchanged) |\n| **S1 persona** | (missing) | **Marcus Chen · Member · Unity Health Plan · client** (system: Maestro, CLEAR) |\n| **S2 persona** | (missing) | **Marcus Chen · client** (system: Maestro, Iris) |\n| **S3 persona** | (missing) | **Dr. Mitchell Torres · Network Operations Manager · Unity Health Plan · advisor** (medical director approving prior auth) |\n\n**Notes**: Chain-of-custody flow. Marcus logs in, CLEAR at door. Dr. Torres (medical director) reviews the specialty drug prior auth inline. No intermediary steps; clinical review embedded in the session.\n\n---"}, {"id": "provider|default", "vertical_key": "provider", "usecase": "default", "title": "HLS family", "tier": 3, "tier_label": "New cast · review names", "source_file": "hls-rewrite-2026-04-30.md", "heading": "### provider/default", "persona_changes": [], "body_md": "### provider/default\n\n**Subtitle**: × Jordan Kim — New Patient Onboarding\n**Category**: onboarding\n**S1 Type**: SELF-SERVICE PORTAL (client-side sender)\n\n| Scene | Was | Now |\n|---|---|---|\n| **S1 head** | \"Jordan completes new-patient pre-registration in Riverside's patient portal.\" | (unchanged) |\n| **S1 lede** | `<p><span class=\"em\">Jordan Kim</span> opens Riverside Health's patient portal on a phone the night before their first appointment and completes pre-registration — demographics, insurance card photo, reason for visit, history.</p><p>The submission lands in Riverside's intake queue. The workflow assembles the patient packet; Dan
