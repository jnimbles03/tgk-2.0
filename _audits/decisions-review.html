ntenance", "vertical_key": "provider", "usecase": "maintenance", "title": "HLS family", "tier": 3, "tier_label": "New cast · review names", "source_file": "hls-rewrite-2026-04-30.md", "heading": "### provider/maintenance", "persona_changes": [], "body_md": "### provider/maintenance\n\n**Subtitle**: × Jordan Kim — Account Maintenance · Update Insurance Card after Plan Change\n**Category**: maintenance\n**S1 Type**: AUTHENTICATED PORTAL ENTRY (client-side)\n\n| Scene | Was | Now |\n|---|---|---|\n| **S1 head** | \"Jordan logs into Riverside's patient portal to update insurance after a plan switch.\" | (unchanged) |\n| **S1 persona** | (missing) | **Jordan Kim · Patient · Riverside Health · client** (system: CLEAR) |\n| **S2 persona** | (missing) | **Jordan Kim · client** (system: Iris, Aetna eligibility) |\n| **S3 persona** | (missing) | **Daniela Okafor · Registrar · Riverside Health · advisor** (confirms insurance change) |\n\n**Notes**: Maintenance loop. S1 is client-driven (patient portal). Daniela appears in S3 to confirm the new insurance card and coverage state.\n\n---"}, {"id": "provider|fraud-fabric", "vertical_key": "provider", "usecase": "fraud-fabric", "title": "HLS family", "tier": 3, "tier_label": "New cast · review names", "source_file": "hls-rewrite-2026-04-30.md", "heading": "### provider/fraud-fabric", "persona_changes": [], "body_md": "### provider/fraud-fabric\n\n**Subtitle**: × Jordan Kim — Schedule II Refill (CLEAR-at-the-door)\n**Category**: maintenance\n**S1 Type**: AUTHENTICATED PORTAL ENTRY (client-side, CLEAR at login)\n\n| Scene | Was | Now |\n|---|---|---|\n| **S1 head** | \"Jordan logs into Riverside's patient portal; Maestro orchestrates DEA-grade CLEAR at login.\" | (unchanged) |\n| **S1 persona** | (missing) | **Jordan Kim · Patient · Riverside Health · client** (system: Maestro, CLEAR) |\n| **S2 persona** | (missing) | **Jordan Kim · client** (system: Maestro, Iris) |\n| **S3 persona** | (missing) | **Dr. Sarah Chen · Primary Care Physician · Riverside Health · advisor** (prescriber verifying refill authorization) |\n\n**Notes**: Chain-of-custody flow. Jordan logs in (client), CLEAR establishes DEA-grade proof at session level. Dr. Chen (care team) confirms the refill authorization inline. No intermediary compliance role; clinical team signs off.\n\n---"}, {"id": "provider-roi|default", "vertical_key": "provider-roi", "usecase": "default", "title": "HLS family", "tier": 3, "tier_label": "New cast · review names", "source_file": "hls-rewrite-2026-04-30.md", "heading": "### provider-roi/default", "persona_changes": [], "body_md": "### provider-roi/default\n\n**Subtitle**: × Eric Tan — Records of Information Request Intake\n**Category**: onboarding\n**S1 Type**: SENDER WEBFORM (advisor-side sender — HIM-initiated)\n\n| Scene | Was | Now |\n|---|---|---|\n| **S1 head** | \"Renata kicks off the HIM intake for an inbound records-release request.\" | **Renata López kicks off HIM intake for an inbound records-release request.** |\n| **S1 lede** | (was missing named persona) | `<p>Renata López, Health Information Manager at Catalina Medical Center, receives an inbound records-of-information request and opens the HIM intake webform — requestor type, patient ID, date range, scope of release, destination (provider / patient / third party).</p><p>The workflow assembles the authorization packet; Eric Tan reviews the scope before signature.</p>` |\n| **S1 persona** | (missing) | **Renata López · Health Information Manager · Catalina Medical Center · advisor** |\n| **S2 persona** | (missing) | **Eric Tan · Patient / Records Requestor · client** (system: CLEAR) |\n| **S3 personas** | (missing) | **Eric Tan · client** (signer); **Dr. James Kowalski · Privacy Officer · Catalina Medical Center · advisor** (final compliance review) |\n| **S4 persona** | (missing) | **Renata López · Health Information Manager · Catalina Medical Center · advisor** (extracts the release authorization for records fulfillment) |\n| **S5 personas** | (missing) | **Eric Tan · client**; **Dr. James Kowalski · Privacy Officer · Catalina Medical Center · advisor** (shared Workspace oversight of the release scope) |\n\n**Notes**: Provider-ROI is unique: S1 is advisor-side because the request originates from HIM queue (inbound workflow), not from patient self-service. Renata (HIM) kicks off. Eric Tan (patient/requestor) is client-side signer. Dr. Kowalski (Privacy Officer) can be advisor-side here because the role is workflow-originating, not external policy enforcement. This differs from compliance/legal roles in other verticals.\n\n---"}, {"id": "provider-roi|intake", "vertical_key": "provider-roi", "usecase": "intake", "title": "HLS family", "tier": 3, "tier_label": "New cast · review names", "source_file": "hls-rewrite-2026-04-30.md", "heading": "### provider-roi/intake", "persona_changes": [], "body_md": "### provider-roi/intake\n\n**Subtitle**: × Eric Tan — HIM Intake from Inbound ROI Request\n**Category**: onboarding\n**S1 Type**: SENDER WEBFORM (advisor-side sender)\n\n| Scene | Was | Now |\n|---|---|---|\n| **S1 head** | \"Renata kicks off the HIM intake for an inbound records-release request.\" | (unchanged) |\n| **S1 persona** | (missing) | **Renata López · Health Information Manager · Catalina Medical Center · advisor** |\n| **S2 persona** | (missing) | **Eric Tan · Patient / Records Requestor · client** (system: CLEAR) |\n| **S3 personas** | (missing) | **Eric Tan · client** (signer); **Dr. James Kowalski · Privacy Officer · Catalina Medical Center · advisor** (compliance check) |\n| **S4 persona** | (missing) | **Renata López · Health Information Manager · Catalina Medical Center · advisor** |\n\n**Notes**: Intake spine mirrors default. Renata initiates, Eric signs, Dr. Kowalski reviews compliance.\n\n---"}, {"id": "provider-roi|fraud-fabric", "vertical_key": "provider-roi", "usecase": "fraud-fabric", "title": "HLS family", "tier": 3, "tier_label": "New cast · review names", "source_file": "hls-rewrite-2026-04-30.md", "heading": "### provider-roi/fraud-fabric", "persona_changes": [], "body_md": "### provider-roi/fraud-fabric\n\n**Subtitle**: × Eric Tan — Revoke or Modify Records Release Scope (CLEAR-at-the-door)\n**Category**: maintenance\n**S1 Type**: AUTHENTICATED PORTAL ENTRY (client-side, CLEAR at login)\n\n| Scene | Was | Now |\n|---|---|---|\n| **S1 head** | \"Eric logs into Catalina's patient portal; Maestro orchestrates CLEAR at login.\" | (unchanged) |\n| **S1 persona** | (missing) | **Eric Tan · Patient / Records Requestor · client** (system: Maestro, CLEAR) |\n| **S2 persona** | (missing) | **Eric Tan · client** (system: Maestro, Iris) |\n| **S3 persona** | (missing) | **Dr. James Kowalski · Privacy Officer · Catalina Medical Center · advisor** (HIPAA compliance review for the scope change) |\n\n**Notes**: Chain-of-custody flow. Eric logs in to revoke/modify his records release. CLEAR at door. Dr. Kowalski reviews the scope change inline for HIPAA compliance.\n\n---\n\n## What this changes downstream\n\n- **Persona audit**: All HLS verticals now have named personas locked across all flows (default, intake, fraud-fabric, maintenance). No more missing persona definitions on S1 or S4/5.\n- **Front-office role coherence**: Provider (registrars, PCPs), Payor (Member Services, Network Ops), Life Sciences (Clinical Study Managers, Regulatory Affairs), Provider-ROI (HIM, Privacy Officer) all use domain-appropriate roles. No generic \"Compliance\" on sender side except where workflow-originating (Privacy Officer in ROI context).\n- **Client vs. advisor side clarity**:\n  - **Provider/Payor**: S1 is **client-side self-service** (patient/member portal). Advisor-side staff (Registrar, Member Services) appear in S4/5 review context.\n  - **Life Sciences**: S1 is **advisor-side** (sponsor-initiated webform). Site PI is client-side signer.\n  - **Provider-ROI**: S1 is **advisor-side** (HIM-initiated). Patient is client-side signer/requestor.\n- **Hotspot copy**: Scene narration now references named personas consistently. Sidebar tips for webforms (S1) now tie to the named advisor-side actor (e.g., \"Ethan configures the site activation...\").\n- **Splashes**: No splash override needed for HLS verticals; none reference generic roles.\n\n---\n\n## How to apply this\n\nIf you approve the rewrite, I'll:\n\n1. **Edit `stories/_shared/story-shell.html`** — replace the `provider:`, `payor:`, `lifesciences:` scene heads, ledes, beat heads, beat ledes, and persona definitions with the \"Now\" columns above. Check for `provider-roi` JSON-only structure; if inline, add it. One commit.\n2. **Re-run `_audits/_persona_audit_build.sh`** so the audit refreshes with the new data. All four verticals should re-classify; rows with missing S1 personas should now pass.\n3. **Verify across use cases**: Spot-check intake/fraud-fabric/maintenance flows to confirm the persona references carry through the extended narrations (usecase-narrations-2026-04-27.json). If any beat-level persona is missing, flag it for a follow-up pass.\n\nIf anything in the \"Now\" column reads off — voice, role naming, flow logic — flag it inline and I'll revise before applying.\n\n---\n\n## Naming integrity check\n\nAll fictional names are HLS-appropriate and do not echo real-world figures:\n\n| Name | Vertical | Role | Rationale |\n|---|---|---|---|\n| Jordan Kim | Provider | Patient | Common first name, neutral surname; no echo of real clinician. |\n| Daniela Okafor | Provider | Registrar | West African surname; distinct from any named physician. |\n| Dr. Sarah Chen | Provider | PCP | Common surname; no echo of specific real provider. |\n| Marcus Chen | Payor | Member | Distinct from provider/insurance leadership figures. |\n| Brenda Estevez | Payor | Member Services | Hispanic surname; appropriate for US insurance context. |\n| Dr. Mitchell Torres | Payor | Network Ops | Distinct from member names; no echo of real payer leadership. |\n| Dr. Karim Halim | Life Sciences | PI | Middle Eastern given name + surname; appropriate for clinical research context. |\n| Ethan Park | Life Sciences | Clinical Study Manager | Asian surname; distinct from PI naming pattern. |\n| Dr. Rebecca Okonkwo | Life Sciences | Regulatory Affairs | West African / African diaspora surname; distinct naming from site/sponsor split. |\n| Eric Tan | Provider-ROI | Patient/Requestor | Asian surname; distinct from provider staff naming. |\n| Renata López | Provider-ROI | HIM Manager | Hispanic surname; common in US healthcare HIM roles. |\n| Dr. James Kowalski | Provider-ROI | Privacy Officer | Eastern European surname; appropriate for compliance/legal role. |\n\nAll names pass FICTIONAL + domain-appropriate test."}], "counts": {"total": 38, "tier_1": 9, "tier_2": 2, "tier_3": 27}}</script>
<script>
(function(){
  const DATA = JSON.parse(document.getElementById('audit-data').textContent);
  const STORAGE_KEY = 'tgk.decisions-review.v1';
  let state = {};
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') || {}; } catch(e){}
  let cursor = 0;

  function decisionKey(d){ return d.id; }
  function getDecision(d){ return state[decisionKey(d)] || {}; }
  function setDecision(d, action, edits){
    const k = decisionKey(d);
    state[k] = { action, edits: edits || (state[k]?.edits || ''), at: new Date().toISOString() };
    save();
  }
  function setEdits(d, edits){
    const k = decisionKey(d);
    state[k] = state[k] || {};
    state[k].edits = edits;
    save();
  }
  function save(){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
    renderProgress();
    renderQuickJump();
  }

  function escapeHTML(s){
    return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Minimal markdown renderer (good enough for our proposal docs)
  function renderMarkdown(md){
    let html = escapeHTML(md);
    // Headings
    html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
    // Blockquotes
    html = html.replace(/((?:^&gt;\s+.+\n?)+)/gm, m => {
      const lines = m.split(/\n/).map(l => l.replace(/^&gt;\s?/, '')).filter(Boolean);
      return '<blockquote>' + lines.join('<br>') + '</blockquote>\n';
    });
    // Bold + code
    html = html.replace(/\*\*([^\*]+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/`([^`]+?)`/g, '<code>$1</code>');
    // Lists (simple unordered)
    html = html.replace(/((?:^[-*]\s+.+\n?)+)/gm, m => {
      const items = m.split(/\n/).filter(l => /^[-*]\s/.test(l)).map(l => '<li>' + l.replace(/^[-*]\s+/, '') + '</li>');
      return '<ul>' + items.join('') + '</ul>\n';
    });
    // Tables (very basic — convert pipe-separated rows)
    html = html.replace(/((?:\|[^\n]+\|\n)+)/g, m => {
      const rows = m.trim().split(/\n/).filter(l => l.includes('|'));
      if (rows.length < 2) return m;
      const isSeparator = r => /^\|[\s:-]+\|/.test(r);
      const out = ['<table>'];
      let inHeader = true;
      for (const r of rows) {
        if (isSeparator(r)) { inHeader = false; continue; }
        const cells = r.split('|').slice(1, -1).map(c => c.trim());
        const tag = inHeader ? 'th' : 'td';
        out.push('<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>');
        inHeader = false;
      }
      out.push('</table>');
      return out.join('');
    });
    // Paragraphs
    html = html.split(/\n\n+/).map(p => {
      if (/^<(h[1-6]|ul|ol|table|blockquote)/.test(p.trim())) return p;
      if (!p.trim()) return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');
    return html;
  }

  function renderProgress(){
    const total = DATA.decisions.length;
    let appr=0, edit=0, rej=0, skip=0, unset=0;
    DATA.decisions.forEach(d => {
      const a = (state[decisionKey(d)]||{}).action;
      if (a==='approve') appr++;
      else if (a==='edits') edit++;
      else if (a==='reject') rej++;
      else if (a==='skip') skip++;
      else unset++;
    });
    document.getElementById('progress').innerHTML = `
      <div class="stat">Approved <span class="pill appr">${appr}</span></div>
      <div class="stat">Edits <span class="pill edit">${edit}</span></div>
      <div class="stat">Rejected <span class="pill rej">${rej}</span></div>
      <div class="stat">Skipped <span class="pill skip">${skip}</span></div>
      <div class="stat" style="opacity:0.6">Remaining <span class="pill total">${unset}</span></div>`;
    const done = total - unset;
    document.getElementById('progress-fill').style.width = (done/total*100) + '%';
  }

  function renderQuickJump(){
    const wrap = document.getElementById('quick-jump');
    wrap.innerHTML = '';
    DATA.decisions.forEach((d, i) => {
      const a = (state[decisionKey(d)]||{}).action || 'unset';
      const dot = document.createElement('div');
      dot.className = 'dot ' + a + (i === cursor ? ' current' : '');
      dot.title = `${i+1}. ${d.vertical_key} · ${d.usecase} (${a})`;
      dot.textContent = i+1;
      dot.addEventListener('click', () => { cursor = i; render(); });
      wrap.appendChild(dot);
    });
  }

  function renderCard(d){
    const i = cursor;
    const total = DATA.decisions.length;
    const dec = getDecision(d);
    const action = dec.action || '';
    const edits = dec.edits || '';

    const personaChangesHtml = (d.persona_changes||[]).length ? `
      <div class="changes-strip">
        <h4>Persona side changes proposed</h4>
        <table>
          ${d.persona_changes.map(c => `
            <tr>
              <td class="scene">${escapeHTML(c.scene)}</td>
              <td class="was">${escapeHTML(c.was || '—')}</td>
              <td class="arrow">→</td>
              <td class="now">${escapeHTML(c.now || '—')}</td>
            </tr>
          `).join('')}
        </table>
      </div>` : '';

    const stage = document.getElementById('stage');
    stage.innerHTML = `
      <div class="card">
        <div class="top-strip">
          <span class="index">${i+1} / ${total}</span>
          <span class="tier-badge tier-${d.tier}">${escapeHTML(d.tier_label)}</span>
          <span class="flow-id"><span class="vk">${escapeHTML(d.vertical_key)}</span> <span class="uc">· ${escapeHTML(d.usecase)}</span></span>
          <span class="source">from <code>${escapeHTML(d.source_file)}</code></span>
        </div>
        <div class="body">
          <div class="heading">${escapeHTML(d.heading)}</div>
          ${personaChangesHtml}
          <div class="md">${renderMarkdown(d.body_md)}</div>
        </div>
        <div class="actions">
          <div class="btn-group">
            <button class="approve ${action==='approve'?'on':''}" data-act="approve">Approve <kbd>A</kbd></button>
            <button class="edits ${action==='edits'?'on':''}" data-act="edits">Approve with edits <kbd>E</kbd></button>
            <button class="reject ${action==='reject'?'on':''}" data-act="reject">Reject <kbd>R</kbd></button>
            <button class="skip ${action==='skip'?'on':''}" data-act="skip">Skip <kbd>S</kbd></button>
          </div>
          <div class="nav-group">
            <button data-nav="prev" ${i===0?'disabled':''}>← Prev</button>
            <button data-nav="next">${i===total-1?'Done':'Next →'}</button>
          </div>
        </div>
        <div class="edits-area" style="padding:0 28px 24px; ${action==='edits'?'':'display:none'}" id="edits-area">
          <div class="lbl">Override notes — what to change</div>
          <textarea placeholder="e.g., 'rename Marisol Vega → Maria Reyes' or 'use Dr. Patel for sender role instead'">${escapeHTML(edits)}</textarea>
        </div>
      </div>`;

    // Wire actions
    stage.querySelectorAll('button[data-act]').forEach(b => {
      b.addEventListener('click', () => {
        setDecision(d, b.dataset.act);
        if (b.dataset.act === 'edits') {
          document.getElementById('edits-area').style.display = '';
          stage.querySelector('textarea').focus();
        } else {
          // Auto-advance on approve/reject/skip if there's a next
          if (cursor < DATA.decisions.length - 1) {
            setTimeout(() => { cursor++; render(); }, 200);
          } else {
            render();
          }
        }
      });
    });
    stage.querySelectorAll('button[data-nav]').forEach(b => {
      b.addEventListener('click', () => {
        if (b.dataset.nav === 'prev' && cursor > 0) { cursor--; render(); }
        else if (b.dataset.nav === 'next' && cursor < DATA.decisions.length - 1) { cursor++; render(); }
        else if (b.dataset.nav === 'next' && cursor === DATA.decisions.length - 1) { renderDone(); }
      });
    });
    const ta = stage.querySelector('textarea');
    if (ta) {
      ta.addEventListener('input', e => setEdits(d, e.target.value));
      ta.addEventListener('click', e => e.stopPropagation());
    }
  }

  function renderDone(){
    const total = DATA.decisions.length;
    let appr=0, edit=0, rej=0, skip=0, unset=0;
    DATA.decisions.forEach(d => {
      const a = (state[decisionKey(d)]||{}).action;
      if (a==='approve') appr++;
      else if (a==='edits') edit++;
      else if (a==='reject') rej++;
      else if (a==='skip') skip++;
      else unset++;
    });
    document.getElementById('stage').innerHTML = `
      <div class="done">
        <h2>${unset > 0 ? "You've walked all " + total + " decisions." : "All " + total + " decisions reviewed."}</h2>
        <p style="font-size:14px;">${unset > 0 ? unset + ' still unmarked. You can go back to revisit them, or finish here.' : 'Time to apply the approved ones.'}</p>
        <div class="summary">
          <div class="row"><span>Approved (apply as proposed)</span><span class="pill appr">${appr}</span></div>
          <div class="row"><span>Approved with edits (apply per your notes)</span><span class="pill edit">${edit}</span></div>
          <div class="row"><span>Rejected (skip these flows)</span><span class="pill rej">${rej}</span></div>
          <div class="row"><span>Skipped (decide later)</span><span class="pill skip">${skip}</span></div>
          <div class="row"><span>Unmarked</span><span class="pill total">${unset}</span></div>
        </div>
        <button id="export-btn">Export decisions JSON</button>
        <button class="secondary" id="back-btn">← Go back to review</button>
      </div>`;
    document.getElementById('export-btn').addEventListener('click', exportDecisions);
    document.getElementById('back-btn').addEventListener('click', () => {
      cursor = 0; render();
    });
  }

  function exportDecisions(){
    const out = {
      generated: new Date().toISOString(),
      decisions: DATA.decisions.map(d => {
        const dec = state[decisionKey(d)] || {};
        return {
          id: d.id,
          vertical_key: d.vertical_key,
          usecase: d.usecase,
          tier: d.tier,
          source_file: d.source_file,
          action: dec.action || 'unset',
          edits: dec.edits || '',
          decided_at: dec.at || null,
        };
      }),
    };
    const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'decisions-export.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function render(){
    if (cursor >= DATA.decisions.length) { renderDone(); return; }
    renderCard(DATA.decisions[cursor]);
    renderProgress();
    renderQuickJump();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  // Keyboard shortcuts
  let hintHidden = false;
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    if (cursor >= DATA.decisions.length) return;
    const d = DATA.decisions[cursor];
    if (e.key === 'a' || e.key === 'A') { setDecision(d, 'approve'); if (cursor < DATA.decisions.length - 1) { cursor++; render(); } else render(); }
    else if (e.key === 'e' || e.key === 'E') { setDecision(d, 'edits'); render(); }
    else if (e.key === 'r' || e.key === 'R') { setDecision(d, 'reject'); if (cursor < DATA.decisions.length - 1) { cursor++; render(); } else render(); }
    else if (e.key === 's' || e.key === 'S') { setDecision(d, 'skip'); if (cursor < DATA.decisions.length - 1) { cursor++; render(); } else render(); }
    else if (e.key === 'ArrowLeft' && cursor > 0) { cursor--; render(); }
    else if (e.key === 'ArrowRight' && cursor < DATA.decisions.length - 1) { cursor++; render(); }
    else if (e.key === '?') {
      hintHidden = !hintHidden;
      document.querySelector('.keyboard-hint').style.display = hintHidden ? 'none' : 'block';
    }
  });

  render();
})();
</script>

</body>
</html>
