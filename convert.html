<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP4 → Demo Converter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #13131a;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 48px;
    width: 100%;
    max-width: 560px;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.3px; }
  .subtitle { font-size: 14px; color: #666680; margin-bottom: 36px; }
  .drop-zone {
    border: 2px dashed #2a2a3a;
    border-radius: 12px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #5b5bf0; background: #16162a; }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-icon { font-size: 32px; margin-bottom: 12px; }
  .drop-label { font-size: 15px; color: #888; }
  .drop-label span { color: #5b5bf0; }
  .file-selected { font-size: 13px; color: #5b5bf0; margin-top: 8px; font-weight: 500; }
  .btn {
    display: block;
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: #5b5bf0;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: #4a4adf; }
  .btn:disabled { background: #2a2a4a; color: #555; cursor: not-allowed; }
  .progress-area { display: none; margin-top: 28px; }
  .progress-area.visible { display: block; }
  .stage-label { font-size: 14px; color: #888; margin-bottom: 8px; }
  .stage-label span { color: #e8e8f0; font-weight: 500; }
  .progress-bar-bg { background: #1e1e2e; border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar { background: #5b5bf0; height: 6px; border-radius: 99px; transition: width 0.4s; }
  .elapsed { font-size: 12px; color: #444; margin-top: 8px; }
  .result-area { display: none; margin-top: 28px; text-align: center; }
  .result-area.visible { display: block; }
  .result-area p { font-size: 14px; color: #888; margin-bottom: 16px; }
  .download-btn {
    display: inline-block;
    padding: 12px 28px;
    background: #22c55e;
    color: #fff;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s;
  }
  .download-btn:hover { background: #16a34a; }
  .error-box {
    display: none;
    margin-top: 20px;
    background: #2a1010;
    border: 1px solid #5a2020;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #f87171;
  }
  .error-box.visible { display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>MP4 → Demo</h1>
  <p class="subtitle">Upload a screen recording. Get a clickable animated HTML demo.</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="video/mp4,video/*">
    <div class="drop-icon">🎬</div>
    <div class="drop-label">Drop MP4 here or <span>browse</span></div>
    <div class="file-selected" id="fileLabel"></div>
  </div>

  <button class="btn" id="convertBtn" disabled>Convert to Demo</button>

  <div class="progress-area" id="progressArea">
    <div class="stage-label">Status: <span id="stageText">Starting…</span></div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="elapsed" id="elapsed"></div>
  </div>

  <div class="result-area" id="resultArea">
    <p>Your demo is ready!</p>
    <a class="download-btn" id="downloadLink" href="#" download>Download HTML Demo</a>
  </div>

  <div class="error-box" id="errorBox"></div>
</div>

<script>
const CHUNK_SIZE = 512 * 1024;
let selectedFile = null;
let elapsedTimer = null;
let elapsedSec = 0;

const fileInput    = document.getElementById('fileInput');
const fileLabel    = document.getElementById('fileLabel');
const convertBtn   = document.getElementById('convertBtn');
const progressArea = document.getElementById('progressArea');
const resultArea   = document.getElementById('resultArea');
const stageText    = document.getElementById('stageText');
const progressBar  = document.getElementById('progressBar');
const elapsedEl    = document.getElementById('elapsed');
const errorBox     = document.getElementById('errorBox');
const dropZone     = document.getElementById('dropZone');
const downloadLink = document.getElementById('downloadLink');

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) selectFile(fileInput.files[0]);
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
});

function selectFile(f) {
  selectedFile = f;
  fileLabel.textContent = f.name + ' (' + (f.size / 1024 / 1024).toFixed(1) + ' MB)';
  convertBtn.disabled = false;
}

function setStage(label, pct) {
  stageText.textContent = label;
  progressBar.style.width = pct + '%';
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.classList.add('visible');
  stopTimer();
  convertBtn.disabled = false;
  progressArea.classList.remove('visible');
}

function hideError() { errorBox.classList.remove('visible'); }

function startTimer() {
  elapsedSec = 0;
  elapsedEl.textContent = '';
  elapsedTimer = setInterval(() => {
    elapsedSec++;
    elapsedEl.textContent = elapsedSec + 's elapsed — still working…';
  }, 1000);
}

function stopTimer() {
  if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
}

convertBtn.addEventListener('click', startConvert);

async function startConvert() {
  if (!selectedFile) return;
  convertBtn.disabled = true;
  progressArea.classList.add('visible');
  resultArea.classList.remove('visible');
  hideError();
  startTimer();

  const totalChunks = Math.ceil(selectedFile.size / CHUNK_SIZE);
  let jobId;

  for (let i = 0; i < totalChunks; i++) {
    const start = i * CHUNK_SIZE;
    const end   = Math.min(start + CHUNK_SIZE, selectedFile.size);
    const chunk = selectedFile.slice(start, end);
    const pct   = Math.round(((i + 1) / totalChunks) * 18);
    setStage('Uploading… (' + (i + 1) + '/' + totalChunks + ')', pct);

    const fd = new FormData();
    fd.append('chunk', chunk, 'chunk.bin');
    fd.append('chunkIndex',  String(i));
    fd.append('totalChunks', String(totalChunks));
    fd.append('filename', selectedFile.name);
    if (jobId) fd.append('jobId', jobId);

    let data;
    try {
      const res = await fetch('/api/convert/chunk', { method: 'POST', body: fd });
      const text = await res.text();
      try { data = JSON.parse(text); } catch(_) { throw new Error('Server error: ' + text.slice(0, 200)); }
      if (!res.ok || data.error) throw new Error(data.error || 'Chunk upload failed');
    } catch (e) {
      showError('Upload failed on chunk ' + (i + 1) + ': ' + e.message);
      return;
    }

    if (i === 0) jobId = data.job_id;
  }

  setStage('Extracting frames…', 20);
  pollJob(jobId);
}

const STAGE_LABELS = {
  decode:   ['Extracting frames…',  25],
  triage:   ['Triaging scenes…',    35],
  classify: ['Analysing frames…',   50],
  extract:  ['Extracting UI data…', 65],
  render:   ['Generating HTML demo…', 80],
};
const TIMEOUT_MS = 20 * 60 * 1000;
let pollStart;

function pollJob(jobId) {
  pollStart = Date.now();
  const iv = setInterval(async () => {
    if (Date.now() - pollStart > TIMEOUT_MS) {
      clearInterval(iv);
      showError('Timed out after 20 minutes. Try a shorter video.');
      return;
    }
    try {
      const res = await fetch('/api/convert/' + jobId);
      const job = await res.json();
      const stages = job.stages || {};

      // Find current active or last completed stage
      for (const [s, [label, pct]] of Object.entries(STAGE_LABELS)) {
        if (stages[s]?.status === 'running') { setStage(label, pct); break; }
      }

      if (job.overall === 'completed') {
        clearInterval(iv);
        stopTimer();
        setStage('Done!', 100);
        progressArea.classList.remove('visible');
        resultArea.classList.add('visible');
        downloadLink.href = '/api/convert/' + jobId + '/download';
        downloadLink.download = (job.inputs?.original_filename || 'demo').replace(/\.mp4$/i, '') + '-demo.html';
      } else if (job.overall === 'failed') {
        clearInterval(iv);
        const failedStage = Object.entries(stages).find(([,v]) => v.status === 'failed');
        showError('Pipeline failed at ' + (failedStage?.[0] || 'unknown') + ' stage. Check server logs.');
      }
    } catch(e) { /* ignore transient poll errors */ }
  }, 3000);
}
</script>
</body>
</html>
