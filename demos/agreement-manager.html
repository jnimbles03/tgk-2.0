<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agreement Manager — interactive</title>
<link rel="stylesheet" href="./engine/demo-engine.css">
<link rel="stylesheet" href="./archetypes/app-shell.css">
<link rel="stylesheet" href="./engine/agent-chat.css">
<style>
  .app.has-rail .app-body{padding:0}
  .am-wrap{display:flex;height:100%}
  .am-main{flex:1 1 600px;min-width:0;display:flex;flex-direction:column;padding:24px 28px;overflow:auto}
  .am-agent{width:280px;flex:0 0 auto;border-left:1px solid #ECECF0;display:flex;flex-direction:column;background:#fff;min-height:0}
  .am-th{font-size:10.5px;font-weight:700;letter-spacing:.5px;color:#9a9aa2;text-transform:uppercase;padding:0 12px 10px;border-bottom:1px solid #EDEDF1}
  .am-row{padding:12px;border-bottom:1px solid #F1F1F4;transition:background .2s}
  .am-row.hot{background:var(--tenant-accent-soft)}
  .c-ag{flex:1;display:flex;align-items:center;gap:11px;font-size:13px;font-weight:600;color:#1a1a26}
  .c-ag .fi{width:20px;height:24px;border:1.5px solid #C7C7D2;border-radius:3px;flex:0 0 auto}
  .c-cp{width:150px;flex:0 0 auto;font-size:12.5px;color:#555}
  .c-ai{width:128px;flex:0 0 auto;font-size:12.5px}
  .c-ai .v{display:inline-flex;align-items:center;gap:6px;font-weight:600}
  .c-ai .v.yes{color:#C0392B}.c-ai .v.no{color:#1f9d57}
  .am-aicol{display:inline-flex;align-items:center;gap:5px;color:var(--tenant-accent)}
  .am-ai-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--tenant-accent);background:var(--tenant-accent-soft);padding:2px 8px;border-radius:20px;margin-left:8px}
  .am-summary{margin-top:18px;padding:14px 18px;border:1px solid var(--tenant-accent);background:var(--tenant-accent-soft);border-radius:11px;font-size:13.5px;color:var(--tenant-ink);font-weight:600;display:flex;align-items:center;gap:10px}
  .am-main{flex:1 1 600px;min-width:0;display:flex;flex-direction:column;padding:24px 28px;overflow:auto}
  .am-agent{width:280px;flex:0 0 auto;border-left:1px solid #ECECF0;display:flex;flex-direction:column;background:#fff;min-height:0}
  .am-agent .phd{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid #EFEFF1;font-size:13px;font-weight:700;color:#1a1a26}
  .am-agent .phd .ai{width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,#FFD600,#E0202E 45%,#4B0082);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px}
  .agc-accept{display:inline-flex;align-items:center;gap:6px;margin-top:9px;border:1px solid var(--tenant-accent);color:var(--tenant-accent);background:#fff;border-radius:7px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer}
  .agc-accept.done{background:var(--tenant-accent);color:#fff;cursor:default}
</style>
</head>
<body>
<div id="demo-root"></div>
<script src="./engine/demo-engine.js"></script>
<script src="./engine/agent-chat.js"></script>
<script>
const NAV='<div class="app-nav"><span class="dslogo"><span class="dsmark"></span>Docusign</span>'+
  '<div class="tabs"><span class="tb">Home</span><span class="tb on">Agreement Manager</span><span class="tb">Templates</span><span class="tb">Reports</span><span class="tb">Settings</span></div>'+
  '<div class="right"><span class="hlp">?</span><span class="cobrand"><span class="cm"></span><span id="am-cobrand"></span></span><span class="avatar" id="am-av"></span></div></div>';
const RAIL='<div class="app-rail"><div class="grp">Insights</div><div class="it"><span class="ai">✦</span> Agreements</div>'+
  '<div class="it on"><span class="ai">✦</span> Live analysis</div><div class="it">Renewals <span class="ct">12</span></div>'+
  '<div class="grp">Worksheets</div><div class="it">M&amp;A audit</div><div class="it">Obligations</div><div class="it">+ New worksheet</div></div>';

function row(id,ag,cp,a1,a2){
  return '<div class="am-row" id="'+id+'"><div class="c-ag"><span class="fi"></span>'+ag+'</div>'+
    '<div class="c-cp">'+cp+'</div>'+
    '<div class="c-ai"><span class="v '+a1+'">'+(a1==="yes"?"● Yes":"○ No")+'</span></div>'+
    '<div class="c-ai"><span class="v '+a2+'">'+(a2==="yes"?"● Yes":"○ No")+'</span></div></div>'; }

const SCENES='<section class="de-scene is-active" data-scene="app"><div class="app has-rail">'+NAV+RAIL+
  '<div class="app-body"><div class="am-wrap">'+
    '<div class="am-main">'+
      '<div class="app-head"><h2>Live analysis worksheet</h2><span class="am-ai-badge">✦ AGREEMENT MANAGER</span></div>'+
      '<div class="am-th"><span class="c-ag" style="padding-left:31px">Agreement</span><span class="c-cp">Counterparty</span>'+
        '<span class="c-ai"><span class="am-aicol">✦ <span data-c1></span></span></span>'+
        '<span class="c-ai"><span class="am-aicol">✦ <span data-c2></span></span></span></div>'+
      '<div id="am-rows"></div>'+
      '<div class="am-summary" id="am-summary"><span style="font-size:16px">✦</span><span id="am-sumtext"></span></div>'+
    '</div>'+
    '<div class="am-agent">'+
      '<div class="phd"><span class="ai">✦</span> Ask Agreement Manager</div>'+
      '<div class="agc" style="flex:1;min-height:0"><div class="agc-chat" id="am-chat"></div><div class="agc-chips" id="am-chips"></div>'+
        '<div class="agc-input"><div class="box">Ask one question across the portfolio…</div><div class="go"><svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-7-8-3z"/></svg></div></div></div>'+
    '</div>'+
  '</div></div></div></section>';

DemoEngine.interactive({
  meta:{ title:"Agreement Manager — interactive", productTag:"Agreement Manager · Live", home:"index.html",
    footnote:'<b>This panel is live.</b> Iris has run the worksheet across the whole portfolio — click a question and it types a specific, cited answer from the agreements on screen, then offers the next action. Switch vertical to re-skin the portfolio and the analysis questions. <code>?auto=1</code> self-runs.' },
  defaultPack:"banking", steps:4, scenes:SCENES,
  packs:{
    banking:{ label:"Banking · Tally", theme:{ "--tenant-accent":"#2D55C9","--tenant-accent-soft":"#E7EDFB","--tenant-ink":"#0B1F4D" },
      brand:{ name:"Tally Bank", mark:"T" }, url:"app.docusign.com — Tally Bank", sorBadge:"System of record · nCino",
      persona:{ name:"Dana Whit", role:"Legal Operations", side:"advisor" },
      cobrand:"Tally", c1:"Change of control?", c2:"Auto-renew?", sorNode:"nCino core", sorName:"nCino",
      rows:[ ["am-row1","Master Service Agreement (MSA)","Braun LLC","no","yes"],
        ["am-row2","Vendor NDA","Fontara Inc","no","no"],
        ["am-row3","SaaS Order Form","Atlas Corp","yes","yes"],
        ["am-row4","Master Loan Agreement","TGK Capital","yes","no"],
        ["am-row5","Custody Agreement","Beacon Trust","no","yes"] ],
      summary:"3 of 5 agreements carry a Change-of-Control clause — flagged for the M&A review.",
      hotFlag:"yes",
      say:{ intro:{eyebrow:"Agreement Manager",title:"Ask one question of the whole book",body:"Tally's executed agreements are centralized and AI-extracted. Ask Iris which carry a Change-of-Control clause, what auto-renews, or what to act on — answered across the portfolio at once."},
        acted:{eyebrow:"Insight becomes action",title:"Flagged set routed for review",body:"The three Change-of-Control agreements became an M&A review packet in Workflow Builder — the outcome writes back to nCino."} },
      exchanges:[
        {label:"Which agreements have a Change-of-Control clause?",
         answer:"Three of the five carry a Change-of-Control clause:<br><br>• <b>Atlas Corp</b> — SaaS Order Form<br>• <b>TGK Capital</b> — Master Loan Agreement<br><br>…plus the Atlas order form also auto-renews. The Braun MSA, Fontara NDA and Beacon Trust custody agreement are clean. These are the three I'd put in front of the M&A team."},
        {label:"Which ones auto-renew?",
         answer:"Three auto-renew if no one acts:<br><br>• Braun LLC — MSA<br>• Atlas Corp — SaaS Order Form<br>• Beacon Trust — Custody Agreement<br><br>The Fontara NDA and the TGK Capital loan are fixed-term. <b>Atlas Corp</b> is the one to watch — it both auto-renews <i>and</i> carries a Change-of-Control clause."},
        {label:"What's the riskiest agreement here?",
         answer:"<b>Atlas Corp — SaaS Order Form.</b> It's the only agreement in the book that trips both questions: it carries a Change-of-Control clause and it auto-renews. Left alone it rolls over silently with that clause still live. I'd review it before the next renewal date."},
        {label:"Flag the at-risk set for M&A review", route:true,
         answer:"The three Change-of-Control agreements — <b>Atlas Corp</b>, <b>TGK Capital</b>, and the items surfaced above — are the M&A exposure. Want me to bundle them into a review packet and route it to Legal?",
         card:'<span class="agc-accept" data-route>✦ Route flagged set to M&amp;A review</span>'}
      ] },
    healthcare:{ label:"Healthcare · Riverside", theme:{ "--tenant-accent":"#0E8C7F","--tenant-accent-soft":"#DFF3EF","--tenant-ink":"#08332E" },
      brand:{ name:"Riverside Health", mark:"R" }, url:"app.docusign.com — Riverside Health", sorBadge:"System of record · Epic",
      persona:{ name:"Dana Whit", role:"Contracts Manager", side:"advisor" },
      cobrand:"Riverside", c1:"BAA on file?", c2:"Auto-renew?", sorNode:"Epic chart", sorName:"Epic",
      rows:[ ["am-row1","Payer Contract","Unity Health","yes","yes"],
        ["am-row2","Vendor MSA","Medline","no","no"],
        ["am-row3","Research Agreement","Helix Bio","no","yes"],
        ["am-row4","Staffing Agreement","CareStaff","no","no"],
        ["am-row5","Lab Services Agreement","Quest","yes","yes"] ],
      summary:"2 of 5 vendor agreements are missing a Business Associate Agreement — flagged for compliance.",
      hotFlag:"no",
      say:{ intro:{eyebrow:"Agreement Manager",title:"Ask one question of the whole book",body:"Riverside's executed agreements are centralized and AI-extracted. Ask Iris which vendors are missing a signed BAA, what auto-renews, or what to act on — answered across the portfolio at once."},
        acted:{eyebrow:"Insight becomes action",title:"Flagged set routed for review",body:"The two vendors missing a BAA became a compliance review packet in Workflow Builder — the outcome writes back to Epic."} },
      exchanges:[
        {label:"Which vendors are missing a BAA?",
         answer:"Two of the five have no Business Associate Agreement on file:<br><br>• <b>Medline</b> — Vendor MSA<br>• <b>Helix Bio</b> — Research Agreement<br><br>Both touch PHI, so that's a HIPAA exposure. Unity Health, Quest and CareStaff are covered. These two are the gap to close."},
        {label:"Which agreements auto-renew?",
         answer:"Three auto-renew if no one acts:<br><br>• Unity Health — Payer Contract<br>• Helix Bio — Research Agreement<br>• Quest — Lab Services Agreement<br><br>The Medline MSA and the CareStaff staffing agreement are fixed-term. <b>Helix Bio</b> is the one to watch — it auto-renews <i>and</i> has no BAA on file."},
        {label:"What's the riskiest agreement here?",
         answer:"<b>Helix Bio — Research Agreement.</b> It's the only agreement that trips both questions: no BAA on file and it auto-renews. Left alone it renews while the HIPAA gap is still open. I'd get a BAA signed before the next renewal date."},
        {label:"Flag the at-risk set for compliance review", route:true,
         answer:"The two vendors with no BAA — <b>Medline</b> and <b>Helix Bio</b> — are the compliance exposure. Want me to bundle them into a review packet and route it to the compliance team?",
         card:'<span class="agc-accept" data-route>✦ Route flagged set to compliance review</span>'}
      ] }
  },
  setup(p, root, api){
    const $=s=>root.querySelector(s);
    $("#am-cobrand").textContent=p.cobrand;
    $("#am-av").textContent=p.persona.name.split(/\s+/).slice(0,2).map(x=>x[0]).join("").toUpperCase();
    $("[data-c1]").textContent=p.c1; $("[data-c2]").textContent=p.c2;
    $("#am-sumtext").textContent=p.summary;
    $("#am-rows").innerHTML=p.rows.map(r=>row(r[0],r[1],r[2],r[3],r[4])).join("");

    api.narrate("intro"); api.progress(0); let done=0;
    function bump(){ api.progress(Math.min(++done,4)); if(done>=4) api.done(); }
    function highlightFlagged(){ p.rows.forEach(r=>{ const el=root.querySelector("#"+r[0]); if(el) el.classList.toggle("hot", r[3]===p.hotFlag); }); }
    function startRoute(btn){ if(btn.classList.contains("done"))return; btn.classList.add("done"); btn.textContent="✓ Routed for review";
      highlightFlagged();
      AgentChat.bubble($("#am-chat"),"ai","Done — the flagged agreements are bundled into a Workflow Builder review packet and routed to the team. The outcome writes back to "+p.sorName+".");
      api.narrate("acted"); }
    AgentChat.mount({ chatEl:$("#am-chat"), chipsEl:$("#am-chips"), hint:"Ask Agreement Manager", speed:13,
      intro:"I'm Iris. I've run this worksheet across all five agreements in the portfolio — ask me what's flagged, what auto-renews, or what needs action.",
      exchanges:p.exchanges.map(ex=>({ label:ex.label, user:ex.label, answer:ex.answer, card:ex.card,
        after:()=>{ bump(); if(ex.route){ const b=$("#am-chat").querySelector("[data-route]"); if(b) b.onclick=()=>startRoute(b); } } })) });

    api.autopilot([
      { at:900, selector:'#am-chips .agc-chip' },
      { at:6000, run:()=>{ const chips=$("#am-chips").querySelectorAll('.agc-chip'); chips[chips.length-1]&&chips[chips.length-1].click(); } },
      { at:10500, run:()=>{ const b=$("#am-chat").querySelector('[data-route]'); if(b && !b.classList.contains('done')) b.click(); } }
    ]);
  }
});
</script>
</body>
</html>
