<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docusign for Agentforce — interactive</title>
<link rel="stylesheet" href="./engine/demo-engine.css">
<link rel="stylesheet" href="./archetypes/agent.css">
<link rel="stylesheet" href="./engine/agent-chat.css">
</head>
<body>
<div id="demo-root"></div>
<script src="./engine/demo-engine.js"></script>
<script src="./engine/agent-chat.js"></script>
<script>
const SCENES='<div class="sf">'+
  '<div class="sf-top"><span class="waffle"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span><span class="app">Sales</span>'+
    '<span class="search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 1 0-.7.7l.3.3v.8l5 5 1.5-1.5-5-5zm-6 0a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9z"/></svg>Search Salesforce</span>'+
    '<span class="ic">★ ? ⚙ ▤</span><span class="av"></span></div>'+
  '<div class="sf-tabs"><span class="t">Home</span><span class="t on">Opportunities</span><span class="t">Accounts</span><span class="t">Contacts</span><span class="t">Reports</span></div>'+
  '<div class="sf-body"><div class="sf-main">'+
    '<div class="sf-rec"><div class="eyebrow">Opportunity</div><div class="nm" id="sf-opp"></div>'+
      '<div class="sf-path"><span class="st done">Qualify</span><span class="st done">Meet</span><span class="st cur">Propose</span><span class="st">Negotiate</span><span class="st">Closed Won</span></div>'+
      '<div class="sf-fields"><div class="f"><div class="k">Account</div><div class="v" id="sf-acct"></div></div>'+
        '<div class="f"><div class="k">Amount</div><div class="v" id="sf-amt"></div></div>'+
        '<div class="f"><div class="k">Close date</div><div class="v" id="sf-close"></div></div>'+
        '<div class="f"><div class="k">Owner</div><div class="v" id="sf-owner"></div></div></div></div>'+
    '<div class="sf-act"><div class="hd">Activity</div>'+
      '<div class="item" id="sf-a1"><span class="dot"></span><span>Agentforce generated <b id="sf-doc"></b> with Docusign</span><span class="tm">now</span></div>'+
      '<div class="item" id="sf-a2"><span class="dot"></span><span>Sent for signature — counterparty notified</span><span class="tm">now</span></div>'+
      '<div class="item" id="sf-a3"><span class="dot"></span><span>Logged to Agreement Manager &amp; the opportunity</span><span class="tm">now</span></div></div>'+
  '</div>'+
  '<div class="af"><div class="af-hd"><span class="astro"></span> Agentforce</div>'+
    '<div class="agc"><div class="agc-chat" id="af-chat"></div><div class="agc-chips" id="af-chips"></div>'+
      '<div class="agc-input"><div class="box">Message Agentforce…</div><div class="go"><svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-7-8-3z"/></svg></div></div></div></div>'+
  '</div></div>';

DemoEngine.interactive({
  meta:{ title:"Docusign for Agentforce — interactive", productTag:"Agentforce · Live", home:"index.html",
    footnote:'<b>This panel is live.</b> Click a suggested prompt and watch Agentforce respond — it generates the agreement with Docusign, sends it for signature, and writes the activity back to the opportunity. Switch vertical to re-skin. <code>?auto=1</code> self-runs.' },
  defaultPack:"banking", steps:3, scenes:SCENES,
  packs:{
    banking:{ label:"Banking · Tally", theme:{ "--tenant-accent":"#2D55C9","--tenant-accent-soft":"#E7EDFB","--tenant-ink":"#0B1F4D" },
      brand:{ name:"Tally Bank", mark:"T" }, url:"tally.lightning.force.com — Opportunities", sorBadge:"System of record · Salesforce",
      persona:{ name:"Mary Okonkwo", role:"Account Executive", side:"advisor" },
      opp:"Atlas Corp — Treasury Services", acct:"Atlas Corp", amt:"$128,400", close:"Aug 30, 2026", owner:"Mary Okonkwo", doc:"Master Services Agreement", cardt:"MSA — Atlas Corp.docx", cust:"Atlas Corp",
      say:{ intro:{eyebrow:"Agentforce",title:"Try the assistant",body:"This Agentforce panel is interactive — click a suggestion and watch it work the Atlas opportunity."},
        gen:{eyebrow:"Generated & sent",title:"Agreement created from the CRM",body:"Agentforce pulled the deal data, generated the MSA with Docusign, and sent it for signature — logged back to the opportunity."} },
      exchanges:[
        {label:"Generate an MSA for Atlas Corp", key:"gen", activity:true,
         answer:"Done. I pulled the account and pricing from Salesforce and generated the Master Services Agreement, then sent it for signature via Docusign — Atlas Corp has been notified.",
         card:'<div class="t"><span class="dm"></span>MSA — Atlas Corp.docx</div><div class="s">✓ Sent for signature via Docusign</div>'},
        {label:"Summarize this account",
         answer:"Atlas Corp is a Propose-stage opportunity worth $128,400, closing Aug 30. There are 2 open agreements and the last activity was 4 days ago — the deal looks on track."},
        {label:"What's the renewal risk?",
         answer:"Low risk. The current order form auto-renews on Aug 30 with no price increase. I'd confirm the liability cap is in place before close — want me to draft that redline?"}
      ] },
    healthcare:{ label:"Healthcare · Riverside", theme:{ "--tenant-accent":"#0E8C7F","--tenant-accent-soft":"#DFF3EF","--tenant-ink":"#08332E" },
      brand:{ name:"Riverside Health", mark:"R" }, url:"riverside.lightning.force.com — Opportunities", sorBadge:"System of record · Salesforce",
      persona:{ name:"Mary Okonkwo", role:"Procurement Lead", side:"advisor" },
      opp:"Medline — Supply Agreement Renewal", acct:"Medline", amt:"$84,000", close:"Sep 2, 2026", owner:"Mary Okonkwo", doc:"Vendor Master Agreement", cardt:"Vendor MSA — Medline.docx", cust:"Medline",
      say:{ intro:{eyebrow:"Agentforce",title:"Try the assistant",body:"This Agentforce panel is interactive — click a suggestion and watch it work the Medline renewal."},
        gen:{eyebrow:"Generated & sent",title:"Agreement created from the CRM",body:"Agentforce pulled the deal data, generated the vendor MSA with Docusign, and sent it for signature — logged back to the opportunity."} },
      exchanges:[
        {label:"Generate a vendor MSA for Medline", key:"gen", activity:true,
         answer:"Done. I pulled the account and pricing from Salesforce and generated the Vendor Master Agreement, then sent it for signature via Docusign — Medline has been notified.",
         card:'<div class="t"><span class="dm"></span>Vendor MSA — Medline.docx</div><div class="s">✓ Sent for signature via Docusign</div>'},
        {label:"Summarize this account",
         answer:"Medline is a renewal worth $84,000, closing Sep 2. There are 2 active agreements including the current supply contract — last activity was 3 days ago."},
        {label:"Any compliance flags?",
         answer:"One: the BAA on file expires in 60 days. I can generate a renewal BAA alongside the supply agreement — want me to add it?"}
      ] }
  },
  setup(p, root, api){
    const $=s=>root.querySelector(s);
    $("#sf-opp").textContent=p.opp; $("#sf-acct").textContent=p.acct; $("#sf-amt").textContent=p.amt; $("#sf-close").textContent=p.close; $("#sf-owner").textContent=p.owner;
    $("#sf-doc").textContent="the "+p.doc;
    ["sf-a1","sf-a2","sf-a3"].forEach(id=>$("#"+id).classList.remove("on"));
    api.narrate("intro"); api.progress(0);
    let done=0;
    AgentChat.mount({ chatEl:$("#af-chat"), chipsEl:$("#af-chips"), hint:"Ask Agentforce", speed:15,
      intro:"Hi! I can search records, draft agreements, and send them for signature. What can I help with?",
      exchanges:p.exchanges.map(ex=>({ label:ex.label, user:ex.label, answer:ex.answer, card:ex.card,
        after:()=>{ done++; api.progress(Math.min(done,3));
          if(ex.activity){ setTimeout(()=>$("#sf-a1").classList.add("on"),150); setTimeout(()=>$("#sf-a2").classList.add("on"),650); setTimeout(()=>$("#sf-a3").classList.add("on"),1150); api.narrate("gen"); } } }))
    });
    api.autopilot([
      { at:900, selector:'#af-chips .agc-chip' }
    ]);
  }
});
</script>
</body>
</html>
