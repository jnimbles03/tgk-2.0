<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="./engine/demo-engine.css">

</head>
<body>
<div id="demo-root"></div>
<script src="./engine/demo-engine.js"></script>
<script>
const SCENES='<section class="de-scene is-active" data-scene="sf"><div class="sf">'+

  meta:{ title:"Docusign for Agentforce", productTag:"Agentforce", home:"index.html",

  timeline:{ totalDuration:26,

    cursorTrack:[ {t:1.5,x:700,y:300,action:"move"},
      {t:6,target:"#af-prompt",action:"click",sayKey:"ask"},
      {t:11,x:1140,y:240,action:"move",sayKey:"generate"},
      {t:15,x:1140,y:320,action:"move",sayKey:"sent"},
      {t:20,x:640,y:300,action:"move"} ] },

        generate:{eyebrow:"Docusign",title:"Pulls the deal data, drafts the doc",body:"Agentforce reads account and pricing from Salesforce and generates the MSA with Docusign."},
        sent:{eyebrow:"Sent",title:"Out for signature in seconds",body:"The MSA is generated and sent for signature — the counterparty is notified automatically."},
        handoff:{eyebrow:"Write-back",title:"Logged back to the opportunity",body:"Status and the executed agreement write back to Salesforce and Agreement Manager."} },
      handoff:{h:"Generated and sent from the CRM",p:"Agentforce drafted the MSA with Docusign and sent it for signature — written back to Salesforce."} },
    healthcare:{ label:"Healthcare · Riverside", theme:{ "--tenant-accent":"#0E8C7F","--tenant-accent-soft":"#DFF3EF","--tenant-ink":"#08332E" },

      prompt:"Generate a vendor MSA for Medline", doc:"Vendor Master Agreement", cardt:"Vendor MSA — Medline.docx",
      say:{ open:{eyebrow:"Agentforce",title:"Agreements, generated inside the CRM",body:"Mary is on the Medline renewal. Agentforce can draft and send the contract without leaving Salesforce."},
        ask:{eyebrow:"Ask",title:"One plain-English request",body:"“Generate a vendor MSA for Medline.” No template hunting, no copy-paste from the record."},
        generate:{eyebrow:"Docusign",title:"Pulls the deal data, drafts the doc",body:"Agentforce reads account and pricing from Salesforce and generates the vendor MSA with Docusign."},
        sent:{eyebrow:"Sent",title:"Out for signature in seconds",body:"The agreement is generated and sent for signature — the vendor is notified automatically."},
        handoff:{eyebrow:"Write-back",title:"Logged back to the opportunity",body:"Status and the executed agreement write back to Salesforce and Agreement Manager."} },
      handoff:{h:"Generated and sent from the CRM",p:"Agentforce drafted the vendor MSA with Docusign and sent it for signature — written back to Salesforce."} }
  },
  paintContent(p, root){
    root.querySelector("#sf-opp").textContent=p.opp; root.querySelector("#sf-acct").textContent=p.acct;
    root.querySelector("#sf-amt").textContent=p.amt; root.querySelector("#sf-close").textContent=p.close; root.querySelector("#sf-owner").textContent=p.owner;
    root.querySelector("#af-u1").textContent=p.prompt; root.querySelector("#af-prompt").textContent=p.prompt;
    root.querySelector("#af-done").textContent="Done — I generated the "+p.doc+" and sent it for signature.";
    root.querySelector("#af-cardt").textContent=p.cardt; root.querySelector("#sf-doc").textContent="the "+p.doc;
    root.querySelector("#ho-h").textContent=p.handoff.h; root.querySelector("#ho-p").textContent=p.handoff.p; root.querySelector("#ho-sor").textContent=p.sorNode;
  },
  onTime(time, p, root){
    root.querySelector("#af-prompts").style.opacity = time>=6?0:1;
    root.querySelector("#af-u1").classList.toggle("on", time>=6.3);
    root.querySelector("#af-a1").classList.toggle("on", time>=10);
    root.querySelector("#af-a2").classList.toggle("on", time>=14);
    root.querySelector("#sf-a1").classList.toggle("on", time>=14.5);
    root.querySelector("#sf-a2").classList.toggle("on", time>=15.5);
    root.querySelector("#sf-a3").classList.toggle("on", time>=16.5);
  }
});

</html>
