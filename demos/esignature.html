<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eSignature ceremony — re-skinnable demo</title>
<link rel="stylesheet" href="./engine/demo-engine.css">
<link rel="stylesheet" href="./archetypes/signing.css">
<style>
  .agt{padding:2px 4px}
  .agt .ttl{font-size:17px;font-weight:700;color:#1a1a26;text-align:center;margin:6px 0 16px;font-family:Georgia,serif}
  .agt p{font-size:11px;line-height:1.7;color:#333;margin-bottom:11px}
  .sigblock{margin-top:22px;border-top:1px solid #ddd;padding-top:16px}
  .sigblock .lead{font-size:11px;color:#333;margin-bottom:18px}
  .sigline{display:flex;gap:34px;align-items:flex-end}
  .sigline .f{flex:1}
  .sigline .cap{font-size:10px;color:#666;border-top:1px solid #999;padding-top:3px;margin-top:4px}
  .sigline .slot{height:40px;display:flex;align-items:flex-end}
  .sigtab.placed{border:none;background:transparent;padding:0}
  .printed{font-size:11px;color:#444;margin-top:14px}
</style>
</head>
<body>
<div id="demo-root"></div>
<script src="./engine/demo-engine.js"></script>
<script>
const TOOLS = '<div class="ds-tools">'+
  '<svg viewBox="0 0 24 24"><path d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 1 0-.7.7l.3.3v.8l5 5 1.5-1.5-5-5zm-6 0a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9zM7 9h5v1H7z"/></svg>'+
  '<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>'+
  '<svg viewBox="0 0 24 24"><path d="M19 8h-1V3H6v5H5a3 3 0 0 0-3 3v6h4v4h12v-4h4v-6a3 3 0 0 0-3-3zM8 5h8v3H8V5zm8 14H8v-5h8v5z"/></svg>'+
  '<span class="right"><svg viewBox="0 0 24 24"><path d="M6 2h9l3 3v17H6z" fill="none" stroke="#5b5b5b" stroke-width="1.6"/></svg></span></div>';

const SCENES =
  '<section class="de-scene is-active" data-scene="form"><div class="ds" id="ds">'+
    '<div class="ds-bar"><span class="msg">Please review &amp; act on the documents below.</span>'+
      '<span class="acts"><span class="finish">FINISH</span><span>FINISH LATER</span>'+
      '<span class="oa">OTHER ACTIONS <svg width="9" height="9" viewBox="0 0 10 10" fill="#fff"><path d="M0 2l5 6 5-6z"/></svg></span></span></div>'+TOOLS+
    '<div class="ds-canvas"><div class="ds-start"><span class="pill">SIGN</span><span class="pt"></span></div>'+
      '<div class="doc"><div class="doc-meta">'+
        '<div class="doc-eid">Docusign Envelope ID: 7C21DA40-9F18-4E2C-A7B1-0098C2D5613A</div>'+
        '<div class="doc-demo">DEMONSTRATION DOCUMENT ONLY<br>PROVIDED BY DOCUSIGN ONLINE SIGNING SERVICE<br>www.docusign.com</div></div>'+
        '<div class="doc-logo"><span class="lw" id="es-lw"></span><span class="sub" id="es-sub"></span></div>'+
        '<div class="agt"><div class="ttl" id="es-title"></div>'+
          '<p id="es-p1"></p><p id="es-p2"></p>'+
          '<div class="sigblock"><div class="lead" id="es-lead"></div>'+
            '<div class="sigline"><div class="f"><div class="slot" id="es-sigslot"><span class="sigtab" id="es-sigtab">Sign</span></div><div class="cap">Signature</div></div>'+
              '<div class="f" style="max-width:150px"><div class="slot" id="es-dateslot"></div><div class="cap">Date signed</div></div></div>'+
            '<div class="printed" id="es-printed"></div></div></div></div>'+
      '<div class="doc-foot"><span class="pb">Powered by <b>Docusign</b></span>'+
        '<span class="rt"><span>Change Language - English (US) ▾</span><span>|  Copyright © 2026 Docusign Inc.|  v2R</span></span></div></div>'+
    '<div class="ds-scrollbar"></div></div></section>'+
  '<section class="de-scene" data-scene="handoff"><div class="ho">'+
    '<div class="chk"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>'+
    '<h2 id="ho-h"></h2><p id="ho-p"></p>'+
    '<div class="chain"><div class="node">Signed</div><span class="arr">&rarr;</span>'+
      '<div class="node lead">Sealed &amp; certified</div><span class="arr">&rarr;</span><div class="node" id="ho-sor"></div></div></div></section>';

DemoEngine.init({
  meta:{ title:"eSignature ceremony", productTag:"eSignature", home:"index.html",
    footnote:'<b>Faithful Docusign signing ceremony, re-skinnable content.</b> The signing chrome, SIGN tab, adopt-signature and cursor path are the shared spine. Switching vertical swaps the agreement, signer, accent and narration.' },
  defaultPack:"banking", scenes:SCENES,
  timeline:{ totalDuration:28,
    beats:[ {t:0,key:"open",sceneId:"form"},{t:6,key:"sign",sceneId:"form"},{t:12,key:"date",sceneId:"form"},{t:20,key:"finish",sceneId:"handoff"} ],
    cursorTrack:[ {t:1.5,x:560,y:360,action:"move"},
      {t:6,target:"#es-sigslot",x:470,y:470,action:"click",sayKey:"sign",fill:"sign"},
      {t:11,target:"#es-dateslot",x:760,y:470,action:"click",sayKey:"date",fill:"date"},
      {t:17,target:".ds-bar .finish",x:888,y:17,action:"move",sayKey:"review"},
      {t:19,target:".ds-bar .finish",x:888,y:17,action:"click",sayKey:"finish"} ] },
  packs:{
    banking:{ label:"Banking · Tally",
      theme:{ "--tenant-accent":"#2D55C9","--tenant-accent-soft":"#E7EDFB","--tenant-ink":"#0B1F4D" },
      brand:{ name:"Tally Bank", mark:"T" }, url:"app.docusign.com — Tally Bank", sorBadge:"System of record · nCino",
      persona:{ name:"Sam Smith", role:"Account Holder", side:"client" }, sorNode:"nCino core",
      logo:{lw:"Tally",sub:"Bank"}, title:"Deposit Account Agreement", sig:"Sam Smith", date:"06/08/2026", printed:"Printed name: Sam Smith — Tally Premier Checking",
      p1:"This Deposit Account Agreement governs the account opened by the undersigned with Tally Bank, including terms for deposits, electronic transfers, and applicable fees and disclosures.",
      p2:"By signing, the account holder acknowledges receipt of the Truth-in-Savings disclosure and agrees to the terms incorporated herein by reference.",
      lead:"By signing below, I agree to the terms of this Deposit Account Agreement.",
      say:{ open:{eyebrow:"eSignature",title:"Sam opens the agreement to sign",body:"The deposit agreement is presented with a single, guided SIGN tab — no scrolling to hunt for fields."},
        sign:{eyebrow:"Adopt signature",title:"One tap to sign",body:"Sam taps SIGN and Docusign applies his adopted signature — legally captured with full intent."},
        date:{eyebrow:"Auto-date",title:"Date stamps itself",body:"The signing date is captured automatically and time-stamped to the envelope."},
        review:{eyebrow:"Finish",title:"Everything required is complete",body:"With all tabs satisfied, FINISH lights up."},
        finish:{eyebrow:"Sealed",title:"Signed, sealed, certified",body:"The envelope is sealed with a tamper-evident certificate and written back to nCino."} },
      handoff:{h:"Signed, sealed, certified",p:"A tamper-evident certificate of completion is generated and the executed agreement writes back to the nCino core."} },
    healthcare:{ label:"Healthcare · Riverside",
      theme:{ "--tenant-accent":"#0E8C7F","--tenant-accent-soft":"#DFF3EF","--tenant-ink":"#08332E" },
      brand:{ name:"Riverside Health", mark:"R" }, url:"app.docusign.com — Riverside Health", sorBadge:"System of record · Epic",
      persona:{ name:"Jordan Kim", role:"Patient", side:"client" }, sorNode:"Epic chart",
      logo:{lw:"Riverside",sub:"Health"}, title:"Consent to Treat & HIPAA Authorization", sig:"Jordan Kim", date:"06/08/2026", printed:"Printed name: Jordan Kim — MRN 4471-2208",
      p1:"This form authorizes Riverside Health and its care providers to deliver treatment and to use and disclose protected health information as permitted under HIPAA for the purposes of treatment, payment, and operations.",
      p2:"By signing, the patient acknowledges receipt of the Notice of Privacy Practices and consents to the care described herein.",
      lead:"By signing below, I consent to treatment and authorize the uses described above.",
      say:{ open:{eyebrow:"eSignature",title:"Jordan opens consent to sign",body:"The consent is presented with a single, guided SIGN tab — clear on a phone in the waiting room."},
        sign:{eyebrow:"Adopt signature",title:"One tap to sign",body:"Jordan taps SIGN and Docusign applies the adopted signature — consent captured with full intent."},
        date:{eyebrow:"Auto-date",title:"Date stamps itself",body:"The consent date is captured automatically and time-stamped to the envelope."},
        review:{eyebrow:"Finish",title:"Everything required is complete",body:"With all tabs satisfied, FINISH lights up."},
        finish:{eyebrow:"Sealed",title:"Signed, sealed, certified",body:"The consent is sealed with a tamper-evident certificate and written back to Epic."} },
      handoff:{h:"Signed, sealed, certified",p:"A tamper-evident certificate of completion is generated and the executed consent writes back to the Epic chart."} },
    pubsec:{ label:"Public Sector · Gov",
      theme:{ "--tenant-accent":"#1D4ED8","--tenant-accent-soft":"#E6EDFB","--tenant-ink":"#13294B" },
      brand:{ name:"State Agency", mark:"G" }, url:"app.docusign.com — State Agency", sorBadge:"System of record · Salesforce",
      persona:{ name:"Jordan Rivera", role:"Constituent", side:"client" }, sorNode:"agency system of record",
      logo:{lw:"State",sub:"Agency"}, title:"Application & Attestation", sig:"Jordan Rivera", date:"06/08/2026", printed:"Printed name: Jordan Rivera — Case 2026-44812",
      p1:"This application authorizes the Agency to verify the information provided and to determine eligibility for the requested program or service in accordance with applicable statutes and regulations.",
      p2:"By signing, the applicant attests under penalty of perjury that the information provided is true and complete to the best of their knowledge.",
      lead:"By signing below, I attest that the information in this application is true and complete.",
      say:{ open:{eyebrow:"eSignature",title:"The constituent opens the application to sign",body:"The application is presented with a single, guided SIGN tab — clear on any device."},
        sign:{eyebrow:"Adopt signature",title:"One tap to sign",body:"The applicant taps SIGN and Docusign applies the adopted signature — attestation captured with full intent."},
        date:{eyebrow:"Auto-date",title:"Date stamps itself",body:"The signing date is captured automatically and time-stamped to the envelope."},
        review:{eyebrow:"Finish",title:"Everything required is complete",body:"With all tabs satisfied, FINISH lights up."},
        finish:{eyebrow:"Sealed",title:"Signed, sealed, certified",body:"The application is sealed with a tamper-evident certificate and written back to the agency."} },
      handoff:{h:"Signed, sealed, certified",p:"A tamper-evident certificate of completion is generated and the executed application writes back to the agency's system of record."} }
  },
  paintContent(p, root){
    root.querySelector("#es-lw").textContent=p.logo.lw; root.querySelector("#es-sub").textContent=p.logo.sub;
    root.querySelector("#es-title").textContent=p.title; root.querySelector("#es-p1").textContent=p.p1; root.querySelector("#es-p2").textContent=p.p2;
    root.querySelector("#es-lead").textContent=p.lead; root.querySelector("#es-printed").textContent=p.printed;
    root.querySelector("#ho-h").textContent=p.handoff.h; root.querySelector("#ho-p").textContent=p.handoff.p; root.querySelector("#ho-sor").textContent=p.sorNode;
  },
  onTime(time, p, root){
    const tab=root.querySelector("#es-sigtab"), dateslot=root.querySelector("#es-dateslot");
    if(time>=6){ if(tab.classList.contains("sigtab")){ tab.outerHTML='<span class="sigscript" id="es-sigtab">'+p.sig+'</span>'; } else { tab.textContent=p.sig; } }
    else if(tab.classList.contains("sigscript")){ tab.outerHTML='<span class="sigtab" id="es-sigtab">Sign</span>'; }
    dateslot.innerHTML = time>=12 ? '<span style="font-size:12px;color:#1a1a26">'+p.date+'</span>' : '<span class="sigtab" style="background:#FFF9D6">Date</span>';
  }
});
</script>
</body>
</html>
