<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLM (Contract Lifecycle) — interactive</title>
<link rel="stylesheet" href="./engine/demo-engine.css">
<link rel="stylesheet" href="./archetypes/clm.css">
<link rel="stylesheet" href="./engine/agent-chat.css">
<style>
  /* The CLM lifecycle visual is intact; we add an "Ask about this agreement"
     AI-Extractions assistant as a right-hand column. Modeled on navigator.html
  .clm-doc{flex:1 1 600px;background:#E9E9EC;padding:20px;overflow:hidden}
  .clm-agent{width:280px;flex:0 0 auto;border-left:1px solid #E5E5EA;display:flex;flex-direction:column;background:#fff;min-height:0}
  .clm-agent .phd{display:flex;align-items:center;gap:8px;padding:13px 15px;border-bottom:1px solid #EFEFF1;font-size:12.5px;font-weight:700;color:#1a1a26}
  .clm-agent .phd .ai{width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,#FFD600,#E0202E 45%,#4B0082);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px}
  .clm-doc{flex:1 1 600px;background:#E9E9EC;padding:20px;overflow:hidden}
  .clm-agent{width:280px;flex:0 0 auto;border-left:1px solid #E5E5EA;display:flex;flex-direction:column;background:#fff;min-height:0}
  .agc-accept.done{background:var(--tenant-accent);color:#fff;cursor:default}
</style>
</head>
<body>
<div id="demo-root"></div>
<script src="./engine/demo-engine.js"></script>
<script src="./engine/agent-chat.js"></script>
<script>
const RAILIC={ info:'<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 15h-2v-6h2zm0-8h-2V7h2z"/></svg>',
  attr:'<svg viewBox="0 0 24 24"><path d="M3 5h18v2H3zM3 11h18v2H3zM3 17h12v2H3z"/></svg>',
  ana:'<svg viewBox="0 0 24 24"><path d="M4 20V10h3v10zM10.5 20V4h3v16zM17 20v-7h3v7z"/></svg>',
  task:'<svg viewBox="0 0 24 24"><path d="M9 16.2l-3.5-3.5L4 14.2 9 19l11-11-1.4-1.4z"/></svg>',
  act:'<svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 1 0 8.9 10H19a7 7 0 1 1-6-8V8l5-3-5-3z"/></svg>',
  obl:'<svg viewBox="0 0 24 24"><path d="M5 3h10l4 4v14H5zM14 4v4h4"/></svg>' };
function rail(ic,lbl,on){ return '<div class="r'+(on?' on':'')+'">'+RAILIC[ic]+'<span>'+lbl+'</span></div>'; }
const OPTS=["Unselected","Send for External Review","Send to Outside Counsel","Send to Finance for Approval","Choose Next Approver","Send for Signature","Cancel Contract Review"];

const SCENES='<section class="de-scene is-active" data-scene="clm"><div class="clm">'+
  '<div class="clm-top"><div class="crumb"><b style="color:#111">Docusign</b><span class="sep">›</span>Agreements<span class="sep">›</span><span id="clm-acct"></span><span class="sep">›</span><span class="cur" id="clm-doc"></span><span class="ver">(Version 2 · Current)</span></div>'+
    '<div class="acts"><span class="b">Download</span><span class="b">Edit</span><span class="b pri">Send</span><span class="b">More ▾</span></div></div>'+
  '<div class="clm-body">'+
    '<div class="clm-rail">'+rail("info","Info")+rail("attr","Attributes")+rail("ana","AI")+rail("task","Tasks",1)+rail("act","Activity")+rail("obl","Obligations")+'</div>'+
    '<div class="clm-task"><h3>Please make a choice</h3>'+
      '<div class="lbl">Instructions</div><p>Review the contract and route it with a workflow decision.</p>'+
      '<div class="lbl">Choose one of these options</div>'+
      '<div class="clm-sel" id="clm-sel"><span id="clm-selval">Unselected</span><span class="chev">▾</span>'+
        '<div class="clm-drop" id="clm-drop">'+OPTS.slice(1).map(o=>'<div class="o" data-opt="'+o+'">'+o+'</div>').join("")+'</div></div>'+
      '<div class="clm-extract on" id="clm-extract"><div class="h">✦ AI Extractions</div>'+
        '<div class="row"><span class="k">Total spend</span><span class="v" id="clm-xspend"></span></div>'+
        '<div class="row"><span class="k">Effective</span><span class="v" id="clm-xeff"></span></div>'+
        '<div class="row"><span class="k">Expiration</span><span class="v" id="clm-xexp"></span></div></div>'+
      '<div class="clm-complete" id="clm-complete">Complete</div></div>'+
    '<div class="clm-doc"><div class="clm-docbar"><span>Compare with: Version 1</span><span class="pg">Page 1 / 10</span></div>'+
      '<div class="clm-page"><h2 id="clm-title"></h2>'+
        '<h4>1. Introduction</h4><p id="clm-p1"></p>'+
        '<p>1.1 Total Agreement Spend <span class="clm-x" id="clm-x1"></span>.</p>'+
        '<h4>2. Delivery &amp; Grant of Services</h4>'+
        '<p>2.1 Delivery. Supplier will deliver the products and services to Buyer in accordance with the delivery terms set forth in the Order, if any. Otherwise, Supplier will deliver within ten (10) days of the effective date.</p>'+
        '<p>2.2 Right to Use. Supplier grants and Buyer accepts a perpetual, fully paid-up, irrevocable, nonexclusive, transferable, worldwide right and license to use the products set forth in Schedule A.</p>'+
        '<p>2.3 Authorized Users. The rights and licenses granted under this Agreement extend to Buyer’s affiliates and customers in the course of using Buyer products or services.</p></div></div>'+
    '<div class="clm-agent">'+
      '<div class="phd"><span class="ai">✦</span> Ask about this agreement</div>'+
      '<div class="agc" style="flex:1;min-height:0"><div class="agc-chat" id="clm-chat"></div><div class="agc-chips" id="clm-chips"></div>'+
        '<div class="agc-input"><div class="box">Ask about spend, term, or clauses…</div><div class="go"><svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-7-8-3z"/></svg></div></div></div>'+
    '</div>'+
  '</div></div></section>'+
  '<section class="de-scene" data-scene="handoff"><div class="ho"><div class="chk"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>'+
    '<h2 id="ho-h"></h2><p id="ho-p"></p><div class="chain"><div class="node">CLM workflow</div><span class="arr">&rarr;</span><div class="node lead">Routed for signature</div><span class="arr">&rarr;</span><div class="node" id="ho-sor"></div></div></div></section>';

DemoEngine.interactive({
  meta:{ title:"CLM (Contract Lifecycle) — interactive", productTag:"CLM · Live", home:"index.html",
    footnote:'<b>This panel is live.</b> Iris has read this agreement and its AI Extractions — click a question and it types a specific, cited answer from the contract, then routes it for signature. Switch vertical to re-skin the agreement, parties and terms. <code>?auto=1</code> self-runs.' },
  defaultPack:"banking", steps:4, scenes:SCENES,
  packs:{
    banking:{ label:"Banking · Tally", theme:{ "--tenant-accent":"#2D55C9","--tenant-accent-soft":"#E7EDFB","--tenant-ink":"#0B1F4D" },
      brand:{ name:"Tally Bank", mark:"T" }, url:"atlas.springcm.com — CLM", sorBadge:"System of record · nCino",
      persona:{ name:"Priya Raman", role:"Contract Manager", side:"advisor" }, sorNode:"nCino core", sorName:"nCino",
      acct:"Exterran Corporation", doc:"Purchase Agreement — Exterran Corp", title:"STANDARD PURCHASING AGREEMENT",
      buyer:"Tally Bank", supplier:"Exterran Corporation", docKind:"purchase agreement",
      p1:"This Purchasing Agreement is made between Tally Bank, a Delaware corporation (“Buyer”), and Exterran Corporation (“Supplier”), with the Agreement effective November 30, 2026 and expiration November 29, 2029.",
      spend:"$46,000.00", eff:"Nov 30, 2026", exp:"Nov 29, 2029",
      say:{ intro:{eyebrow:"CLM",title:"Ask about this agreement",body:"The Exterran purchase agreement sits in CLM — version-controlled, with AI Extractions and a workflow task. Ask Iris what it extracted, then route it for signature."},
        routed:{eyebrow:"Closed loop",title:"Routed for signature",body:"The workflow decision became “Send for Signature” — the Exterran agreement advances and the obligations clock starts, written back to nCino."} },
      exchanges:[
        {label:"What did Iris extract from this agreement?",
         answer:"Three terms, read straight from the document — no manual entry:<br><br>• <b>Total spend</b> — $46,000.00<br>• <b>Effective</b> — Nov 30, 2026<br>• <b>Expiration</b> — Nov 29, 2029<br><br>All three are on the AI Extractions card in the Task panel."},
        {label:"What's the term and expiration?",
         answer:"It's a <b>fixed three-year term</b>: effective <b>Nov 30, 2026</b> through <b>Nov 29, 2029</b>. There's no auto-renewal clause — it expires on that date unless a new agreement is signed."},
        {label:"Are there any non-standard clauses?",
         answer:"Two worth a look:<br><br>• <b>§2.2 Right to Use</b> grants a <b>perpetual, irrevocable, transferable</b> license — broader than a standard term license.<br>• <b>§2.3</b> extends the license to Buyer's <b>affiliates and customers</b>.<br><br>Both are favorable to Tally as Buyer; nothing here blocks signature."},
        {label:"Route this for signature", route:true,
         answer:"Review is complete and the terms check out. I can set the workflow decision to <b>Send for Signature</b> and route the Exterran agreement now. Confirm?",
         card:'<span class="agc-accept" data-route>✦ Send for Signature</span>'}
      ],
      handoff:{h:"Routed through the lifecycle",p:"The Exterran agreement moved through CLM review to signature — extracted terms and obligations written back to nCino."} },
    healthcare:{ label:"Healthcare · Riverside", theme:{ "--tenant-accent":"#0E8C7F","--tenant-accent-soft":"#DFF3EF","--tenant-ink":"#08332E" },
      brand:{ name:"Riverside Health", mark:"R" }, url:"medline.springcm.com — CLM", sorBadge:"System of record · Epic",
      persona:{ name:"Priya Raman", role:"Contract Manager", side:"advisor" }, sorNode:"Epic chart", sorName:"Epic",
      acct:"Medline Industries", doc:"Supply Agreement — Medline", title:"MEDICAL SUPPLY AGREEMENT",
      buyer:"Riverside Health", supplier:"Medline Industries", docKind:"supply agreement",
      p1:"This Supply Agreement is made between Riverside Health (“Buyer”) and Medline Industries (“Supplier”), with the Agreement effective November 30, 2026 and expiration November 29, 2029.",
      spend:"$84,000.00", eff:"Nov 30, 2026", exp:"Nov 29, 2029",
      say:{ intro:{eyebrow:"CLM",title:"Ask about this agreement",body:"The Medline supply agreement sits in CLM — version-controlled, with AI Extractions and a workflow task. Ask Iris what it extracted, then route it for signature."},
        routed:{eyebrow:"Closed loop",title:"Routed for signature",body:"The workflow decision became “Send for Signature” — the Medline agreement advances and the obligations clock starts, written back to Epic."} },
      exchanges:[
        {label:"What did Iris extract from this agreement?",
         answer:"Three terms, read straight from the document — no manual entry:<br><br>• <b>Total spend</b> — $84,000.00<br>• <b>Effective</b> — Nov 30, 2026<br>• <b>Expiration</b> — Nov 29, 2029<br><br>All three are on the AI Extractions card in the Task panel."},
        {label:"What's the term and expiration?",
         answer:"It's a <b>fixed three-year term</b>: effective <b>Nov 30, 2026</b> through <b>Nov 29, 2029</b>. There's no auto-renewal clause — it expires on that date unless a new agreement is signed."},
        {label:"Are there any non-standard clauses?",
         answer:"Two worth a look:<br><br>• <b>§2.2 Right to Use</b> grants a <b>perpetual, irrevocable, transferable</b> license — broader than a standard term license.<br>• <b>§2.3</b> extends the license to Buyer's <b>affiliates and customers</b>.<br><br>Both are favorable to Riverside as Buyer; nothing here blocks signature."},
        {label:"Route this for signature", route:true,
         answer:"Review is complete and the terms check out. I can set the workflow decision to <b>Send for Signature</b> and route the Medline agreement now. Confirm?",
         card:'<span class="agc-accept" data-route>✦ Send for Signature</span>'}
      ],
      handoff:{h:"Routed through the lifecycle",p:"The Medline agreement moved through CLM review to signature — extracted terms and obligations written back to Epic."} }
  },
  setup(p, root, api){
    const $=s=>root.querySelector(s);
    // ---- render the CLM lifecycle content (brand/labels/values) ----
    $("#clm-acct").textContent=p.acct; $("#clm-doc").textContent=p.doc;
    $("#clm-title").textContent=p.title; $("#clm-p1").textContent=p.p1;
    $("#clm-x1").textContent=p.spend; $("#clm-xspend").textContent=p.spend;
    $("#clm-xeff").textContent=p.eff; $("#clm-xexp").textContent=p.exp;
    // dropdown with an id on the "Send for Signature" option
    $("#clm-drop").innerHTML = OPTS.slice(1).map(o=>'<div class="o"'+(o==="Send for Signature"?' id="clm-optsign"':'')+' data-opt="'+o+'">'+o+'</div>').join("");
    // reset lifecycle state (Tasks scene active, nothing routed yet)
    root.querySelectorAll(".de-scene").forEach(s=>s.classList.toggle("is-active", s.dataset.scene==="clm"));
    $("#clm-selval").textContent="Unselected";
    $("#clm-complete").classList.remove("on");
    $("#clm-x1").classList.remove("lit");
    // handoff scene content
    $("#ho-h").textContent=p.handoff?p.handoff.h:""; $("#ho-p").textContent=p.handoff?p.handoff.p:""; $("#ho-sor").textContent=p.sorNode;

    api.narrate("intro"); api.progress(0); let done=0;
    function bump(){ api.progress(Math.min(++done,4)); if(done>=4) api.done(); }

    function routeForSignature(btn){ if(btn.classList.contains("done"))return; btn.classList.add("done"); btn.textContent="✓ Routed for signature";
      // drive the CLM lifecycle visual: set the decision, light Complete, briefly flash the extracted spend
      $("#clm-selval").textContent="Send for Signature";
      $("#clm-complete").classList.add("on");
      $("#clm-x1").classList.add("lit");
      AgentChat.bubble($("#clm-chat"),"ai","Done — the workflow decision is set to <b>Send for Signature</b> and the "+p.supplier+" agreement is routed. The obligations clock starts and the extracted terms write back to "+p.sorName+".");
      api.narrate("routed");
      // advance to the closed-loop handoff scene
      api.after(900,()=>{ root.querySelectorAll(".de-scene").forEach(s=>s.classList.toggle("is-active", s.dataset.scene==="handoff")); });
    }

    AgentChat.mount({ chatEl:$("#clm-chat"), chipsEl:$("#clm-chips"), hint:"Ask about this agreement", speed:13,
      intro:"I'm Iris. I've read this "+p.docKind+" and its AI Extractions — ask me about the spend, the term, the clauses, or route it for signature.",
      exchanges:p.exchanges.map(ex=>({ label:ex.label, user:ex.label, answer:ex.answer, card:ex.card,
        after:()=>{ bump(); if(ex.route){ const b=$("#clm-chat").querySelector("[data-route]"); if(b) b.onclick=()=>routeForSignature(b); } } })) });

    api.autopilot([
      { at:900, selector:'#clm-chips .agc-chip' },
      { at:6000, run:()=>{ const chips=$("#clm-chips").querySelectorAll('.agc-chip'); chips[chips.length-1]&&chips[chips.length-1].click(); } },
      { at:10500, run:()=>{ const b=$("#clm-chat").querySelector('[data-route]'); if(b && !b.classList.contains('done')) b.click(); } }
    ]);
  }
});
</script>
</body>
</html>
