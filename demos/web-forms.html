<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Forms intake — re-skinnable demo</title>
<link rel="stylesheet" href="./engine/demo-engine.css">
<link rel="stylesheet" href="./archetypes/signing.css">
</head>
<body>
<div id="demo-root"></div>
<script src="./engine/demo-engine.js"></script>
<script>
/* ---- shared spine: field structure + fill groups ---- */
const FIELD_ORDER = ["fullName","email","phone","ssn","dob","marital","dependents"];
const FILLS = { prefill:["fullName","email","phone","dob","marital"], required:["ssn"], dropdown:["dependents"] };

const SCENES =
  '<section class="de-scene is-active" data-scene="form"><div class="ds" id="ds">'+
    '<div class="ds-bar"><span class="msg">Please review the documents below.</span>'+
      '<span class="acts"><span class="finish">FINISH</span><span>FINISH LATER</span>'+
      '<span class="oa">OTHER ACTIONS <svg width="9" height="9" viewBox="0 0 10 10" fill="#fff"><path d="M0 2l5 6 5-6z"/></svg></span></span></div>'+
    '<div class="ds-tools">'+
      '<svg viewBox="0 0 24 24"><path d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 1 0-.7.7l.3.3v.8l5 5 1.5-1.5-5-5zm-6 0a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9zM7 9h5v1H7z"/></svg>'+
      '<svg viewBox="0 0 24 24"><path d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 1 0-.7.7l.3.3v.8l5 5 1.5-1.5-5-5zm-6 0a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9zM7 9h5v1H7z"/></svg>'+
      '<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>'+
      '<svg viewBox="0 0 24 24"><path d="M19 8h-1V3H6v5H5a3 3 0 0 0-3 3v6h4v4h12v-4h4v-6a3 3 0 0 0-3-3zM8 5h8v3H8V5zm8 14H8v-5h8v5z"/></svg>'+
      '<svg viewBox="0 0 24 24"><path d="M14 4l-1-1H5v18h2v-7h5l1 1h6V5h-5z"/></svg>'+
      '<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 17h-2v-2h2v2zm1.8-7.2l-.9.9c-.7.7-.9 1.1-.9 2.3h-2v-.5c0-1.2.5-1.8 1.2-2.5l1.2-1.2a2 2 0 1 0-3.4-1.4H8a4 4 0 1 1 6.8 2.9z"/></svg>'+
      '<span class="right"><svg viewBox="0 0 24 24"><path d="M6 2h9l3 3v17H6z" fill="none" stroke="#5b5b5b" stroke-width="1.6"/></svg></span></div>'+
    '<div class="ds-canvas"><div class="ds-start"><span class="pill">START</span><span class="pt"></span></div>'+
      '<div class="doc"><div class="doc-meta">'+
        '<div class="doc-eid">Docusign Envelope ID: 4F5BAA69-8285-480E-B6EF-15A3B46297FA</div>'+
        '<div class="doc-demo">DEMONSTRATION DOCUMENT ONLY<br>PROVIDED BY DOCUSIGN ONLINE SIGNING SERVICE<br>999 3rd Ave, Suite 1700 • Seattle • Washington 98104 • (206) 219-0200<br>www.docusign.com</div></div>'+
        '<div class="doc-logo"><span class="lw" id="doc-lw"></span><span class="sub" id="doc-sub"></span></div>'+
        '<div class="doc-radios" id="doc-radios"></div>'+
        '<div class="sec" id="doc-sec"></div><div class="tbl" id="doc-rows"></div></div>'+
      '<div class="doc-foot"><span class="pb">Powered by <b>Docusign</b></span>'+
        '<span class="rt"><span>Change Language - English (US) ▾</span><span>|  Copyright © 2026 Docusign Inc.|  v2R</span></span></div></div>'+
    '<div class="ds-scrollbar"></div></div></section>'+
  '<section class="de-scene" data-scene="handoff"><div class="ho">'+
    '<div class="chk"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>'+
    '<h2 id="ho-h"></h2><p id="ho-p"></p>'+
    '<div class="chain"><div class="node">Web Form</div><span class="arr">&rarr;</span>'+
      '<div class="node lead">eSignature</div><span class="arr">&rarr;</span><div class="node" id="ho-sor"></div></div></div></section>';

DemoEngine.init({
  meta:{ title:"Web Forms intake", productTag:"Web Forms", home:"index.html",
    footnote:'<b>Faithful Docusign chrome, re-skinnable content.</b> The signing UI + cursor path + beats are the shared spine. Switching vertical swaps only <code>content</code> (logo, copy, persona, field labels/values, radios, narration) and <code>theme</code> (accent). Deep-links: <code>?pack=</code>, <code>?t=&lt;seconds&gt;</code>.' },
  defaultPack:"banking",
  scenes:SCENES,
  timeline:{ totalDuration:34,
    beats:[ {t:0,key:"open",sceneId:"form"},{t:7,key:"prefill",sceneId:"form"},{t:14,key:"validate",sceneId:"form"},{t:20,key:"complete",sceneId:"form"},{t:27,key:"submit",sceneId:"handoff"} ],
    cursorTrack:[ {t:1.5,x:470,y:360,action:"move"},
      {t:6,target:".ds-start",x:300,y:103,action:"move"},
      {t:7,target:".ds-start",x:300,y:103,action:"click",sayKey:"prefill",fill:"prefill",start:true},
      {t:13,target:".box[data-field='ssn']",x:760,y:366,action:"move"},
      {t:14,target:".box[data-field='ssn']",x:760,y:366,action:"click",sayKey:"validate",fill:"required"},
      {t:19,target:".box[data-field='dependents']",x:730,y:583,action:"move"},
      {t:20,target:".box[data-field='dependents']",x:730,y:583,action:"click",sayKey:"complete",fill:"dropdown"},
      {t:25,target:".ds-bar .finish",x:888,y:17,action:"move"},
      {t:27,target:".ds-bar .finish",x:888,y:17,action:"click",sayKey:"submit"} ] },
  packs:{
    banking:{ label:"Banking · Tally",
      theme:{ "--tenant-accent":"#2D55C9","--tenant-accent-soft":"#E7EDFB","--tenant-ink":"#0B1F4D" },
      brand:{ name:"Tally Bank", mark:"T", poweredBy:"Powered by Docusign" },
      url:"app.docusign.com — Tally Bank", sorBadge:"System of record · nCino",
      persona:{ name:"Sarah Connelly", role:"Relationship Manager", side:"advisor" },
      logo:{lw:"Tally",sub:"Bank"}, sectionTitle:"Primary Account Holder", sorNode:"nCino core",
      radios:["Individual","Joint Tenants","Tenants in Common","Community Property"],
      fields:{ fullName:{label:"Full Name",val:"Sam Smith",req:true,narrow:true}, email:{label:"Email Address",val:"sam.smith@email.com",req:true},
        phone:{label:"Phone Number",val:"(415) 555-0142",req:true}, ssn:{label:"SSN / TIN#",val:"•••-••-1234",req:true},
        dob:{label:"Date of Birth",val:"11/15/1983"}, marital:{label:"Marital Status",val:"Married"}, dependents:{label:"# of Dependents",val:"1",req:true,dropdown:true} },
      say:{ open:{eyebrow:"Web Forms",title:"Sam opens his application",body:"A Docusign web form, branded for Tally and generated from the bank's account-opening PDF in one click."},
        prefill:{eyebrow:"Docusign Iris",title:"Known fields pre-fill",body:"Sam clicks START and his details flow in from the bank's records. No re-keying, fewer drop-offs."},
        validate:{eyebrow:"Validation",title:"Only the gap is flagged",body:"The required SSN field stays outlined in red until it's complete — Sam fills just that one."},
        complete:{eyebrow:"Guided intake",title:"Smart fields finish the form",body:"Dropdowns and conditional logic keep the rest accurate, then the form validates clean."},
        submit:{eyebrow:"Handoff",title:"FINISH hands off to signing",body:"Clean, validated data flows to eSignature and writes back to nCino."} },
      handoff:{h:"Straight into the agreement",p:"Clean, validated data hands off to eSignature and writes back to the nCino core — no re-keying."} },
    healthcare:{ label:"Healthcare · Riverside",
      theme:{ "--tenant-accent":"#0E8C7F","--tenant-accent-soft":"#DFF3EF","--tenant-ink":"#08332E" },
      brand:{ name:"Riverside Health", mark:"R", poweredBy:"Powered by Docusign" },
      url:"app.docusign.com — Riverside Health", sorBadge:"System of record · Epic",
      persona:{ name:"Jordan Kim", role:"New Patient", side:"client" },
      logo:{lw:"Riverside",sub:"Health"}, sectionTitle:"Patient Information", sorNode:"Epic chart",
      radios:["Self","Spouse","Dependent","Other"],
      fields:{ fullName:{label:"Patient Full Name",val:"Jordan Kim",req:true,narrow:true}, email:{label:"Email Address",val:"jordan.kim@email.com",req:true},
        phone:{label:"Phone Number",val:"(415) 555-0199",req:true}, ssn:{label:"Insurance Member ID",val:"UNH-4471 2208",req:true},
        dob:{label:"Date of Birth",val:"03/22/1991"}, marital:{label:"Primary Care Provider",val:"Dr. A. Reyes"}, dependents:{label:"Reason for Visit",val:"Annual physical",req:true,dropdown:true} },
      say:{ open:{eyebrow:"Web Forms",title:"Jordan opens patient intake",body:"A Docusign web form, branded for Riverside and generated from the clinic's intake PDF in one click."},
        prefill:{eyebrow:"Docusign Iris",title:"Known details pre-fill",body:"Jordan clicks START and returning-patient data flows in. Less typing on a phone in the waiting room."},
        validate:{eyebrow:"Validation",title:"Only the gap is flagged",body:"The required insurance member ID stays outlined in red until complete — Jordan fills just that one."},
        complete:{eyebrow:"Guided intake",title:"Conditional questions adapt",body:"Visit-reason and care fields branch on earlier answers, then the form validates clean."},
        submit:{eyebrow:"Handoff",title:"FINISH hands off to consent",body:"Clean intake flows to eSignature consents and writes back to Epic."} },
      handoff:{h:"Straight into consent & care",p:"Clean, validated intake hands off to eSignature consents and writes back to the Epic chart — no clipboards."} },
    pubsec:{ label:"Public Sector · Gov",
      theme:{ "--tenant-accent":"#1D4ED8","--tenant-accent-soft":"#E6EDFB","--tenant-ink":"#13294B" },
      brand:{ name:"State Agency", mark:"G", poweredBy:"Powered by Docusign" },
      url:"app.docusign.com — State Agency", sorBadge:"System of record · Salesforce",
      persona:{ name:"Jordan Rivera", role:"Applicant", side:"client" },
      logo:{lw:"State",sub:"Agency"}, sectionTitle:"Applicant Information", sorNode:"agency system of record",
      radios:["New applicant","Returning","Household","Business"],
      fields:{ fullName:{label:"Full Legal Name",val:"Jordan Rivera",req:true,narrow:true}, email:{label:"Email Address",val:"jordan.rivera@email.com",req:true},
        phone:{label:"Phone Number",val:"(415) 555-0173",req:true}, ssn:{label:"SSN (last 4)",val:"•••• 6802",req:true},
        dob:{label:"Date of Birth",val:"07/19/1985"}, marital:{label:"Household size",val:"3"}, dependents:{label:"Program / service",val:"Benefits",req:true,dropdown:true} },
      say:{ open:{eyebrow:"Web Forms",title:"A constituent starts an application",body:"A Docusign web form, branded for the agency and generated from an existing PDF form in one click."},
        prefill:{eyebrow:"Docusign Iris",title:"Known details pre-fill",body:"The applicant clicks START and prior-record data flows in — no re-keying on a phone."},
        validate:{eyebrow:"Validation",title:"Only the gap is flagged",body:"The required identity field stays outlined in red until complete — the applicant fills just that one."},
        complete:{eyebrow:"Guided intake",title:"Conditional questions adapt",body:"Program and eligibility fields branch on earlier answers, then the form validates clean."},
        submit:{eyebrow:"Handoff",title:"FINISH hands off to signing",body:"Clean data flows to eSignature and writes back to the agency system of record."} },
      handoff:{h:"Straight into the application",p:"Clean, validated data hands off to eSignature and writes back to the agency's system of record — no paper."} }
  },
  paintContent(p, root){
    root.querySelector("#doc-lw").textContent=p.logo.lw; root.querySelector("#doc-sub").textContent=p.logo.sub;
    root.querySelector("#doc-sec").textContent=p.sectionTitle;
    root.querySelector("#ho-h").textContent=p.handoff.h; root.querySelector("#ho-p").textContent=p.handoff.p; root.querySelector("#ho-sor").textContent=p.sorNode;
    root.querySelector("#doc-radios").innerHTML=p.radios.map(r=>'<div class="r"><span class="rc"></span>'+r+'</div>').join("");
    root.querySelector("#doc-rows").innerHTML=FIELD_ORDER.map(id=>{ const f=p.fields[id];
      const c=(f.req?"req":"")+(f.narrow?" narrow":"");
      return '<div class="trow"><div class="tlab">'+f.label+'</div><div class="tval"><div class="box '+c+'" data-field="'+id+'">'+(f.dropdown?'<span class="ph">-- select --</span><span class="chev">▾</span>':'')+'</div></div></div>'; }).join("");
  },
  onTime(time, p, root){
    const TLfills = this.timeline.cursorTrack;
    root.querySelectorAll(".box").forEach(b=>{ const f=p.fields[b.dataset.field]; if(!f)return;
      b.classList.remove("filled"); if(f.req)b.classList.add("req"); else b.classList.remove("req");
      b.innerHTML=f.dropdown?'<span class="ph">-- select --</span><span class="chev">▾</span>':''; });
    const started=TLfills.some(c=>c.start&&time>=c.t);
    root.querySelector("#ds").classList.toggle("started",started);
    TLfills.forEach(c=>{ if(c.fill&&time>=c.t){ FILLS[c.fill].forEach(id=>{ const el=root.querySelector('.box[data-field="'+id+'"]'); if(!el)return; const f=p.fields[id];
      el.classList.remove("req"); el.classList.add("filled"); el.innerHTML=f.val+(f.dropdown?'<span class="chev">▾</span>':''); }); } });
    root.querySelectorAll(".doc-radios .r").forEach((r,i)=>r.classList.toggle("sel",started&&i===0));
  }
});
</script>
</body>
</html>
