<style>
  /* Authentic Docusign IAM / Agreement Manager chrome — palette + type from the real
     product frames (Vendor Renewals + IAM-for-Sales stage). */
  @font-face{font-family:"DSIndigo";src:url("https://docucdn-a.akamaihd.net/olive/fonts/3.1.0/DSIndigo-Regular.woff2") format("woff2");font-weight:400;font-display:swap}
  @font-face{font-family:"DSIndigo";src:url("https://docucdn-a.akamaihd.net/olive/fonts/3.1.0/DSIndigo-Medium.woff2") format("woff2");font-weight:500;font-display:swap}
  @font-face{font-family:"DSIndigo";src:url("https://docucdn-a.akamaihd.net/olive/fonts/3.1.0/DSIndigo-Semibold.woff2") format("woff2");font-weight:600;font-display:swap}
  .de-canvas{--ds-cobalt:#4C00FF;--ds-ink:#130032;--ds-navy:#1a3d6e;--ds-poppy:#FF5252;--ds-mist:#CBC2FF;--ds-lilac:#f0ecf7}
  .de-canvas .app,.de-canvas .dash{font-family:"DSIndigo","Inter",-apple-system,"Segoe UI",Roboto,sans-serif;color:#130032}
  /* real Docusign loop logomark */
  .dsloop{width:22px;height:22px;flex:0 0 auto;display:inline-block}
  .app-nav .dslogo{font-weight:600;color:#130032;font-size:16px;letter-spacing:-.01em}
  .app-nav .waffle{display:grid;grid-template-columns:repeat(3,3px);grid-auto-rows:3px;gap:2px;margin-right:4px}
  .app-nav .waffle i{width:3px;height:3px;background:#6c5f8c;border-radius:1px}
  .app-nav .tabs .tb{font-size:14px;color:#3e3e3c}
  .app-nav .tabs .tb.on{color:#1a3d6e;font-weight:600}
  .app-nav .tabs .tb.on:after{background:#1a3d6e;height:3px}
  .app-nav .cobrand{color:var(--tenant-accent)}
  /* left rail — real Agreement Manager items */
  .app-rail .startbtn{margin:2px 14px 10px;height:34px;border-radius:6px;background:var(--ds-cobalt);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
  .app-rail .shared{margin:0 14px 12px;height:32px;border-radius:6px;border:1px solid #d4cee2;color:#130032;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:6px}
  .app-rail .it .ai{color:var(--ds-cobalt)}
  .app-rail .it.on{background:var(--ds-lilac);color:#130032;box-shadow:inset -2px 0 0 var(--ds-cobalt)}
  .app-rail .badge{margin-left:auto;font-size:8.5px;font-weight:700;letter-spacing:.4px;color:var(--ds-cobalt);background:var(--ds-mist);padding:1px 5px;border-radius:4px}
  /* AI-extracted pill = Iris purple, never tenant colour */
  .ai-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--ds-cobalt);background:#efe9ff;padding:3px 9px;border-radius:20px;letter-spacing:.3px}
  /* Iris AI diamond marker (real Agreement Manager file glyph) */
  .dia{width:13px;height:13px;flex:0 0 auto;transform:rotate(45deg);border-radius:2px;background:linear-gradient(135deg,#9d50ff 0%,#6e3aff 50%,#4C00FF 100%);box-shadow:0 1px 2px rgba(76,0,255,.25)}
  /* repository table (M&A risk columns) — Agreement Manager nav-table styling */
  .mi-th,.mi-row{display:flex;align-items:center}
  .mi-th{font-size:11px;font-weight:600;color:#130032;padding:0 12px 12px;border-bottom:1px solid #e8e3f5}
  .mi-row{padding:14px 12px;border-bottom:1px solid #f0ecf7;transition:background .2s,box-shadow .2s}
  .mi-row:hover{background:#fafaff}
  .mi-row.hot{background:var(--tenant-accent-soft)}
  .mi-row.risk{background:#FEF6F6;box-shadow:inset 3px 0 0 var(--ds-poppy)}
  .c-ag{flex:1;display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500;color:#130032}
  .c-cp{width:120px;flex:0 0 auto}
  .party{color:#1a3d6e;text-decoration:underline;text-decoration-color:rgba(26,61,110,.35);text-underline-offset:3px;text-decoration-thickness:.5px;font-size:12.5px;background:#f0ecf7;padding:1px 6px;border-radius:3px}
  .c-vl{width:78px;flex:0 0 auto;font-size:13px;font-weight:600}
  .c-as{width:148px;flex:0 0 auto;font-size:12px}
  .c-coc{width:176px;flex:0 0 auto;font-size:12px}
  .c-rk{width:56px;flex:0 0 auto;text-align:right}
  .tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:#eef0f4;color:#54698d}
  .tag.bad{background:#FDECEC;color:#C0392B;font-weight:600}
  .rk{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.3px;padding:2px 8px;border-radius:20px}
  .rk.hi{background:#FDECEC;color:#C0392B}.rk.md{background:#FBF0DD;color:#B07A1E}
  /* dashboard chart + staggered alerts */
  #mi-alerts .alert-row{opacity:0;transform:translateY(4px);transition:opacity .3s,transform .3s}
  #mi-alerts .alert-row.show{opacity:1;transform:none}
  #mi-alerts .alert-row{padding:11px 16px}
  .alert-row .who b{font-weight:600;color:#130032}
  .alert-row .who .sub{display:block;font-weight:400;color:#6e6189;font-size:11px;margin-top:1px}
  .dash-body{background:#faf9fd}
  .kpi .num{color:var(--ds-cobalt)}
  .dash-head .badge{color:var(--ds-cobalt);background:#efe9ff}
  .bars{display:flex;align-items:flex-end;gap:18px;height:96px;padding:6px 4px 0}
  .bars .b{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:6px;height:100%}
  .bars .b i{width:100%;max-width:46px;border-radius:4px 4px 0 0;background:var(--ds-cobalt)}
  .bars .b.risk i{background:var(--ds-poppy)}
  .bars .b span{font-size:10.5px;color:#6e6189;text-align:center;line-height:1.2}
  /* relationships hierarchy + Iris prompt library */
  .mi-rel{display:flex;gap:22px;height:100%}
  .mi-tree{flex:1;min-width:0}
  .tnode{background:#fff;border:1px solid #e8e3f5;border-radius:9px;padding:10px 14px;margin-bottom:8px}
  .tnode .ti{font-size:13px;font-weight:600;color:#130032;display:flex;align-items:center;gap:9px}
  .tnode .tsub{display:block;font-size:11.5px;color:#6e6189;margin-top:2px;padding-left:22px}
  .tnode.root{border-color:var(--ds-cobalt);box-shadow:inset 3px 0 0 var(--ds-cobalt)}
  .tkids{margin:0 0 10px 26px;border-left:1.5px dashed #d4cee2;padding-left:16px}
  .tnode.flag{border-color:#F3C9C9;background:#FEF6F6}
  .mi-prevail{background:#efe9ff;border-radius:9px;padding:11px 14px;margin-top:4px}
  .mi-prevail .pvh{font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--ds-cobalt);text-transform:uppercase;margin-bottom:4px}
  .mi-prevail .pv{font-size:12px;color:#3a3a47;line-height:1.5}
  .mi-prompt{width:352px;flex:0 0 auto;background:linear-gradient(180deg,#fafbff 0%,#f0ecff 100%);border:1px solid #e0dcef;border-radius:11px;padding:14px 15px;display:flex;flex-direction:column}
  .mp-h{font-size:13px;font-weight:600;color:#1a1a3a;display:flex;align-items:center;gap:7px;margin-bottom:11px}
  .mp-h .spark{color:#7c3aed}
  .mp-chip{border:1px solid #c9bdf2;color:var(--ds-cobalt);background:#fff;border-radius:9px;padding:9px 12px;font-size:12px;font-weight:600;line-height:1.4}
  .mp-list{margin-top:9px;display:flex;flex-direction:column;gap:6px}
  .mp-list .q{border:1px solid #e0dcef;border-radius:9px;padding:8px 11px;font-size:11.5px;color:#7a7a92;background:#fff}
  .mp-result{margin-top:12px;background:#fff;border:1px solid #e0dcef;border-radius:9px;padding:11px 13px;font-size:12px;line-height:1.55;color:#252423;opacity:0;transform:translateY(6px);transition:opacity .4s,transform .4s}
  .mp-result.on{opacity:1;transform:none}
  .mp-result .src{display:block;margin-top:7px;font-size:10.5px;color:#7c3aed;font-style:italic}
</style>

      promptChip:"Run: annual pricing analysis across Summit's payer & vendor contracts",
      promptResult:"Across 29 contracts, blended annual uplift is 5.8%. Two payer agreements carry auto-renew with >7% escalators — about $2.1M of avoidable spend if renegotiated pre-close.<span class=\"src\">✦ Sources: Unity OF-2024, Cerner MSA §5, Medline Amendment #1</span>",
      handoff:{ h:"Diligence findings, in Riverside's own stack", p:"Iris extractions — assignment, change-of-control and value at risk — push to Riverside's data lake and BI tools through the API, so the integration team works from structured data, not PDFs.", sor:"Riverside data lake" },
      say:{ open:{eyebrow:"Agreement Intelligence",title:"Summit's contracts, no longer a black box",body:"Riverside just closed Summit Clinics. Every inherited agreement is centralized in Docusign IAM — and Iris has already read and structured them."},
        structure:{eyebrow:"Docusign Iris",title:"Unstructured agreements become a diligence dashboard",body:"Assignment rights, change-of-control and revenue at risk, extracted across 138 agreements. Summit's portfolio totals $31.4M in contract value."},
        prioritize:{eyebrow:"Prioritize",title:"The contracts that threaten the deal",body:"$13M of revenue sits behind unfavorable assignment and change-of-control language — the riskiest agreements rise to the top."},
        relate:{eyebrow:"Relationships",title:"Every amendment, in one hierarchy",body:"Iris rebuilds the Unity Health contract family — MSA, order forms, amendments — so the prevailing terms are unambiguous."},
        analyze:{eyebrow:"Prompt Library",title:"Ask the whole portfolio at once",body:"A configurable Iris prompt runs an annual pricing analysis across every payer and vendor contract — agentic analysis at portfolio scale."},
        integrate:{eyebrow:"Integrate",title:"Findings flow into Riverside's systems",body:"Extracted data lands in Riverside's data lake and BI tools via the API — diligence output becomes integration-ready."} },
    }
  },
  paintContent(p, root){
    root.querySelectorAll(".mi-cobrand").forEach(e=>e.textContent=p.cobrand);
    root.querySelectorAll(".mi-av").forEach(e=>e.textContent=p.persona.name.split(/\s+/).slice(0,2).map(x=>x[0]).join("").toUpperCase());
    root.querySelector("#mi-title").textContent=p.title;
    root.querySelector("#mi-rows").innerHTML=p.rows.map(row).join("");
    root.querySelector("#mi-dashbadge").textContent=p.dashbadge;
    root.querySelector("#mi-k1").textContent=p.kpis.k1; root.querySelector("#mi-k2").textContent=p.kpis.k2;
    root.querySelector("#mi-k3").textContent=p.kpis.k3; root.querySelector("#mi-k4").textContent=p.kpis.k4;
    root.querySelector("#mi-alerts").innerHTML=p.alerts.map(alertRow).join("");
    root.querySelector("#mi-t-root").textContent=p.treeRoot; root.querySelector("#mi-t-rootsub").textContent=p.treeRootSub;
    root.querySelector("#mi-t-c1").textContent=p.tc1; root.querySelector("#mi-t-c2").textContent=p.tc2;
    root.querySelector("#mi-t-c3").textContent=p.tc3; root.querySelector("#mi-t-c4").textContent=p.tc4;
    root.querySelector("#mi-prevail").textContent=p.prevail;
    root.querySelector("#mi-prompt-chip").textContent=p.promptChip;
    root.querySelector("#mi-prompt-result").innerHTML=p.promptResult;
    root.querySelector("#mi-ho-h").textContent=p.handoff.h; root.querySelector("#mi-ho-p").textContent=p.handoff.p;
    root.querySelector("#mi-ho-sor").textContent=p.handoff.sor;
  },
  onTime(time, p, root){
    ["mi-r1","mi-r5"].forEach(id=>{ const el=root.querySelector("#"+id); if(el) el.classList.toggle("risk", time>=3 && time<6); });
    root.querySelectorAll("#mi-alerts .alert-row").forEach((n,i)=>n.classList.toggle("show", time>=13 + i*0.5));
    const pr=root.querySelector("#mi-prompt-result"); if(pr) pr.classList.toggle("on", time>=28);
  }
});
</script>
</body>
</html>
