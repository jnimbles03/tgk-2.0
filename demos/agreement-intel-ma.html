<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agreement Intelligence — M&amp;A Due Diligence · interactive</title>
<link rel="stylesheet" href="./engine/demo-engine.css">
<link rel="stylesheet" href="./archetypes/app-shell.css">
<link rel="stylesheet" href="./archetypes/dashboard.css">
<link rel="stylesheet" href="./engine/agent-chat.css">
<style>
  /* Authentic Docusign IAM / Agreement Manager chrome — palette + type from the real
     product frames (Vendor Renewals + IAM-for-Sales stage). */
  @font-face{font-family:"DSIndigo";src:url("https://docucdn-a.akamaihd.net/olive/fonts/3.1.0/DSIndigo-Regular.woff2") format("woff2");font-weight:400;font-display:swap}
  @font-face{font-family:"DSIndigo";src:url("https://docucdn-a.akamaihd.net/olive/fonts/3.1.0/DSIndigo-Medium.woff2") format("woff2");font-weight:500;font-display:swap}
  @font-face{font-family:"DSIndigo";src:url("https://docucdn-a.akamaihd.net/olive/fonts/3.1.0/DSIndigo-Semibold.woff2") format("woff2");font-weight:600;font-display:swap}
  .de-canvas{--ds-cobalt:#4C00FF;--ds-ink:#130032;--ds-navy:#1a3d6e;--ds-poppy:#FF5252;--ds-mist:#CBC2FF;--ds-lilac:#f0ecf7}
  .de-canvas .app,.de-canvas .dash{font-family:"DSIndigo","Inter",-apple-system,"Segoe UI",Roboto,sans-serif;color:#130032}
  /* real Docusign loop logomark */
  .dsloop{width:22px;height:22px;flex:0 0 auto;display:inline-block}
  .app-nav .dslogo{font-weight:600;color:#130032;font-size:16px;letter-spacing:-.01em}
  .app-nav .waffle{display:grid;grid-template-columns:repeat(3,3px);grid-auto-rows:3px;gap:2px;margin-right:4px}
  .app-nav .waffle i{width:3px;height:3px;background:#6c5f8c;border-radius:1px}
  .app-nav .tabs .tb{font-size:14px;color:#3e3e3c}
  .app-nav .tabs .tb.on{color:#1a3d6e;font-weight:600}
  .app-nav .tabs .tb.on:after{background:#1a3d6e;height:3px}
  .app-nav .cobrand{color:var(--tenant-accent)}
  /* left rail — real Agreement Manager items */
  .app-rail .startbtn{margin:2px 14px 10px;height:34px;border-radius:6px;background:var(--ds-cobalt);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
  .app-rail .shared{margin:0 14px 12px;height:32px;border-radius:6px;border:1px solid #d4cee2;color:#130032;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:6px}
  .app-rail .it .ai{color:var(--ds-cobalt)}
  .app-rail .it.on{background:var(--ds-lilac);color:#130032;box-shadow:inset -2px 0 0 var(--ds-cobalt)}
  .app-rail .badge{margin-left:auto;font-size:8.5px;font-weight:700;letter-spacing:.4px;color:var(--ds-cobalt);background:var(--ds-mist);padding:1px 5px;border-radius:4px}
  /* AI-extracted pill = Iris purple, never tenant colour */
  .ai-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--ds-cobalt);background:#efe9ff;padding:3px 9px;border-radius:20px;letter-spacing:.3px}
  /* Iris AI diamond marker (real Agreement Manager file glyph) */
  .dia{width:13px;height:13px;flex:0 0 auto;transform:rotate(45deg);border-radius:2px;background:linear-gradient(135deg,#9d50ff 0%,#6e3aff 50%,#4C00FF 100%);box-shadow:0 1px 2px rgba(76,0,255,.25)}
  /* repository table (M&A risk columns) — Agreement Manager nav-table styling */
  .mi-th,.mi-row{display:flex;align-items:center}
  .mi-th{font-size:11px;font-weight:600;color:#130032;padding:0 12px 12px;border-bottom:1px solid #e8e3f5}
  .mi-row{padding:14px 12px;border-bottom:1px solid #f0ecf7;transition:background .2s,box-shadow .2s}
  .mi-row:hover{background:#fafaff}
  .mi-row.hot{background:var(--tenant-accent-soft)}
  .mi-row.risk{background:#FEF6F6;box-shadow:inset 3px 0 0 var(--ds-poppy)}
  .c-ag{flex:1;display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500;color:#130032}
  .c-cp{width:120px;flex:0 0 auto}
  .party{color:#1a3d6e;text-decoration:underline;text-decoration-color:rgba(26,61,110,.35);text-underline-offset:3px;text-decoration-thickness:.5px;font-size:12.5px;background:#f0ecf7;padding:1px 6px;border-radius:3px}
  .c-vl{width:78px;flex:0 0 auto;font-size:13px;font-weight:600}
  .c-as{width:148px;flex:0 0 auto;font-size:12px}
  .c-coc{width:176px;flex:0 0 auto;font-size:12px}
  .c-rk{width:56px;flex:0 0 auto;text-align:right}
  .tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:#eef0f4;color:#54698d}
  .tag.bad{background:#FDECEC;color:#C0392B;font-weight:600}
  .rk{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.3px;padding:2px 8px;border-radius:20px}
  .rk.hi{background:#FDECEC;color:#C0392B}.rk.md{background:#FBF0DD;color:#B07A1E}
  /* ---- split layout: repository table + Ask Iris agent panel ---- */
  .app.has-rail .app-body{padding:0}
  .mi-wrap{display:flex;height:100%}
  .mi-main{flex:1;min-width:0;display:flex;flex-direction:column;padding:22px 26px;overflow:auto}
  .mi-agent{width:352px;flex:0 0 auto;border-left:1px solid #e8e3f5;display:flex;flex-direction:column;background:#fff;min-height:0}
  .mi-agent .phd{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid #EFEFF1;font-size:13px;font-weight:600;color:#130032}
  .mi-agent .phd .ai{width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,#9d50ff 0%,#6e3aff 50%,#4C00FF 100%);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px}
  .agc-accept{display:inline-flex;align-items:center;gap:6px;margin-top:9px;border:1px solid var(--ds-cobalt);color:var(--ds-cobalt);background:#fff;border-radius:7px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer}
  .agc-accept.done{background:var(--ds-cobalt);color:#fff;cursor:default}
</style>
</head>
<body>
<div id="demo-root"></div>
<script src="./engine/demo-engine.js"></script>
<script src="./engine/agent-chat.js"></script>
<script>
const LOOP = '<svg class="dsloop" viewBox="0 0 32 32"><rect x="4" y="12" width="13" height="13" rx="3" fill="#4C00FF"/><path d="M15 4a11.5 11.5 0 0 1 0 23 V18.5 a6.5 6.5 0 0 0 0-13Z" fill="#FF5252"/><rect x="11.5" y="11.5" width="6" height="6" rx="1" fill="#130032"/></svg>';
const NAV = '<div class="app-nav"><span class="waffle"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>'+
  '<span class="dslogo">'+LOOP+'Docusign</span>'+
  '<div class="tabs"><span class="tb">Home</span><span class="tb on">Agreements</span><span class="tb">Templates</span><span class="tb">Reports</span><span class="tb">Admin</span></div>'+
  '<div class="right"><span class="hlp">?</span><span class="cobrand"><span class="cm"></span><span class="mi-cobrand"></span></span><span class="avatar mi-av"></span></div></div>';
const RAIL = '<div class="app-rail"><div class="startbtn">Start ▾</div><div class="shared">Shared Access ▾</div>'+
  '<div class="grp">Agreements</div>'+
  '<div class="it">Inbox</div><div class="it">Sent</div>'+
  '<div class="it">Completed <span class="badge">NEW</span></div><div class="it">Action Required</div>'+
  '<div class="grp">Reports</div>'+
  '<div class="it on"><span class="ai">✦</span> M&amp;A Diligence</div>'+
  '<div class="it"><span class="ai">✦</span> Renewals <span class="ct">12</span></div>'+
  '<div class="it">Workflow Builder Workflows <span class="badge">NEW</span></div><div class="it">PowerForms</div></div>';

function row(r){
  return '<div class="mi-row" id="'+r[0]+'"><div class="c-ag"><span class="dia"></span>'+r[1]+'</div>'+
    '<div class="c-cp"><span class="party">'+r[2]+'</span></div><div class="c-vl">'+r[3]+'</div>'+
    '<div class="c-as"><span class="tag'+(r[5]?' bad':'')+'">'+r[4]+'</span></div>'+
    '<div class="c-coc"><span class="tag'+(r[7]?' bad':'')+'">'+r[6]+'</span></div>'+
    '<div class="c-rk">'+(r[8]?'<span class="rk '+r[8]+'">'+(r[8]==='hi'?'HIGH':'MED')+'</span>':'')+'</div></div>';
}

const SCENES =
  '<section class="de-scene is-active" data-scene="repo"><div class="app has-rail">'+NAV+RAIL+
    '<div class="app-body"><div class="mi-wrap">'+
      '<div class="mi-main">'+
        '<div class="app-head"><h2 id="mi-title"></h2><span class="ai-pill">✦ AI-EXTRACTED BY IRIS</span>'+
          '<div class="acts"><span class="add">Custom report</span></div></div>'+
        '<div class="mi-th"><span class="c-ag" style="padding-left:25px">Agreement</span><span class="c-cp">Counterparty</span>'+
          '<span class="c-vl">Value</span><span class="c-as">Assignment</span><span class="c-coc">Change of control</span><span class="c-rk"></span></div>'+
        '<div id="mi-rows"></div>'+
      '</div>'+
      '<div class="mi-agent">'+
        '<div class="phd"><span class="ai">✦</span> Ask Iris</div>'+
        '<div class="agc" style="flex:1;min-height:0"><div class="agc-chat" id="mi-chat"></div><div class="agc-chips" id="mi-chips"></div>'+
          '<div class="agc-input"><div class="box">Ask about assignment, change-of-control, or risk…</div><div class="go"><svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-7-8-3z"/></svg></div></div></div>'+
      '</div>'+
    '</div></div>'+
  '</div></section>';

DemoEngine.interactive({
  meta:{ title:"Agreement Intelligence — M&A Diligence · interactive", productTag:"Agreement Manager · Iris", home:"index.html",
    footnote:'<b>This panel is live.</b> Iris has read every inherited agreement in the acquired portfolio — click a question and it types a specific, cited answer on assignment, change-of-control and revenue at risk, then offers to push the findings to the data lake. Switch vertical to re-skin the acquisition and its contracts.' },
  defaultPack:"amex", steps:4, scenes:SCENES,
  packs:{
    amex:{ label:"AMEX × Center",
      theme:{ "--tenant-accent":"#006FCF","--tenant-accent-soft":"#E4F0FB","--tenant-ink":"#00175A" },
      brand:{ name:"American Express", mark:"A" }, url:"app.docusign.com — American Express", sorBadge:"Docusign Iris · Agreement AI",
      persona:{ name:"Lena Ortiz", role:"M&A Diligence Lead", side:"advisor" },
      cobrand:"Center", title:"Center — inherited agreements", lake:"AMEX data lake",
      rows:[ ["mi-r1","Cloud Infrastructure MSA","Cloudscale","$12.4M","Consent to assign",1,"Terminable on change of control",1,"hi"],
        ["mi-r2","Payment Processing Agreement","NorthPay","$9.8M","Freely assignable",0,"Notice only",0,""],
        ["mi-r3","Banking Partner Agreement","Tandem Bank","$6.2M","Consent to assign",1,"No CoC clause",0,"md"],
        ["mi-r4","Reseller Agreement","Vantage","$3.1M","Silent",0,"Notice only",0,""],
        ["mi-r5","Enterprise Customer MSA","Globex","$4.5M","Anti-assignment",1,"Terminable on change of control",1,"hi"] ],
      say:{ intro:{eyebrow:"Agreement Intelligence",title:"Center's contracts, no longer a black box",body:"American Express just closed Center. Every inherited agreement is centralized in Docusign IAM and Iris has already read and structured all 214 — ask it what threatens the deal."},
        acted:{eyebrow:"Integrate",title:"Findings flow into AMEX's systems",body:"Iris pushed the assignment, change-of-control and revenue-at-risk extractions to the AMEX data lake via the API — diligence output is now integration-ready, not a stack of PDFs."} },
      exchanges:[
        {label:"How many contracts have change-of-control clauses?",
         answer:"<b>38 of 214</b> inherited agreements carry a change-of-control clause that lets the counterparty terminate on the acquisition.<br><br>The two material ones in this view:<br>• <b>Cloudscale — Cloud Infrastructure MSA</b> ($12.4M)<br>• <b>Globex — Enterprise Customer MSA</b> ($4.5M)<br><br>Both are terminable on change of control."},
        {label:"What revenue is at risk on assignment?",
         answer:"<b>$21.4M</b> of the $53.0M portfolio sits behind unfavorable assignment or change-of-control language.<br><br>The biggest single driver is assignment-consent — Cloudscale's $12.4M MSA needs the counterparty's consent to transfer, and Globex's $4.5M MSA has an outright anti-assignment clause."},
        {label:"Which counterparties block assignment?",
         answer:"<b>24 agreements</b> require consent to assign or block it entirely. The three in this view:<br><br>• <b>Globex</b> — anti-assignment clause, blocks transfer outright<br>• <b>Cloudscale</b> — consent to assign required ($12.4M)<br>• <b>Tandem Bank</b> — consent to assign required ($6.2M)<br><br>NorthPay and Vantage transfer freely."},
        {label:"Walk me through the Cloudscale contract family", push:true,
         answer:"Iris rebuilt the <b>Cloudscale</b> hierarchy from four documents:<br><br>• MSA — signed 2023, $12.4M ACV (root)<br>• Order Form 2023 — $12.4M annual commitment<br>• Amendment #2 — +8% pricing uplift, 2024<br>• <b>Amendment #3 — added consent-to-assign language</b> (the flag)<br><br>Prevailing terms: liability capped at 12 months' fees, acquirer consent required to assign, counterparty may terminate on change of control. Want me to push these findings to the data lake?",
         card:'<span class="agc-accept" data-push>✦ Push findings to the AMEX data lake</span>'}
      ] },
    health:{ label:"Healthcare · Riverside",
      theme:{ "--tenant-accent":"#0E8C7F","--tenant-accent-soft":"#DFF3EF","--tenant-ink":"#08332E" },
      brand:{ name:"Riverside Health", mark:"R" }, url:"app.docusign.com — Riverside Health", sorBadge:"Docusign Iris · Agreement AI",
      persona:{ name:"Lena Ortiz", role:"Integration Counsel", side:"advisor" },
      cobrand:"Summit Clinics", title:"Summit Clinics — inherited agreements", lake:"Riverside data lake",
      rows:[ ["mi-r1","Payer Network Agreement","Unity Health","$8.6M","Consent to assign",1,"Terminable on change of control",1,"hi"],
        ["mi-r2","Medical Supply MSA","Medline","$5.4M","Freely assignable",0,"Notice only",0,""],
        ["mi-r3","EHR Platform Agreement","Cerner","$4.9M","Consent to assign",1,"No CoC clause",0,"md"],
        ["mi-r4","Lab Services Agreement","Quest","$2.3M","Silent",0,"Notice only",0,""],
        ["mi-r5","Staffing Agreement","Vitalis","$3.1M","Anti-assignment",1,"Terminable on change of control",1,"hi"] ],
      say:{ intro:{eyebrow:"Agreement Intelligence",title:"Summit's contracts, no longer a black box",body:"Riverside just closed Summit Clinics. Every inherited agreement is centralized in Docusign IAM and Iris has already read and structured all 138 — ask it what threatens the deal."},
        acted:{eyebrow:"Integrate",title:"Findings flow into Riverside's systems",body:"Iris pushed the assignment, change-of-control and revenue-at-risk extractions to the Riverside data lake via the API — diligence output is now integration-ready, not a stack of PDFs."} },
      exchanges:[
        {label:"How many contracts have change-of-control clauses?",
         answer:"<b>21 of 138</b> inherited agreements carry a change-of-control clause that lets the counterparty terminate on the acquisition.<br><br>The two material ones in this view:<br>• <b>Unity Health — Payer Network Agreement</b> ($8.6M)<br>• <b>Vitalis — Staffing Agreement</b> ($3.1M)<br><br>Both are terminable on change of control."},
        {label:"What revenue is at risk on assignment?",
         answer:"<b>$13.0M</b> of the $31.4M portfolio sits behind unfavorable assignment or change-of-control language.<br><br>The biggest single driver is assignment-consent — the Unity Health $8.6M payer agreement needs consent to transfer, and Vitalis's $3.1M staffing MSA has an outright anti-assignment clause."},
        {label:"Which counterparties block assignment?",
         answer:"<b>17 agreements</b> require consent to assign or block it entirely. The three in this view:<br><br>• <b>Vitalis</b> — anti-assignment clause, blocks transfer outright<br>• <b>Unity Health</b> — consent to assign required ($8.6M)<br>• <b>Cerner</b> — consent to assign required ($4.9M)<br><br>Medline and Quest transfer freely."},
        {label:"Walk me through the Unity Health contract family", push:true,
         answer:"Iris rebuilt the <b>Unity Health</b> hierarchy from four documents:<br><br>• MSA — signed 2022, $8.6M ACV (root)<br>• Order Form 2023 — $8.6M annual commitment<br>• Amendment #2 — +6% pricing uplift, 2024<br>• <b>Amendment #3 — added consent-to-assign language</b> (the flag)<br><br>Prevailing terms: liability capped at 12 months' fees, payer consent required to assign, counterparty may terminate on change of control. Want me to push these findings to the data lake?",
         card:'<span class="agc-accept" data-push>✦ Push findings to the Riverside data lake</span>'}
      ] }
  },
  setup(p, root, api){
    const $=s=>root.querySelector(s);
    root.querySelectorAll(".mi-cobrand").forEach(e=>e.textContent=p.cobrand);
    root.querySelectorAll(".mi-av").forEach(e=>e.textContent=p.persona.name.split(/\s+/).slice(0,2).map(x=>x[0]).join("").toUpperCase());
    $("#mi-title").textContent=p.title;
    $("#mi-rows").innerHTML=p.rows.map(row).join("");
    root.querySelectorAll(".mi-row.risk").forEach(r=>r.classList.remove("risk"));
    ["mi-r1","mi-r5"].forEach(id=>{ const el=$("#"+id); if(el) el.classList.add("risk"); });
    api.narrate("intro"); api.progress(0); let done=0;
    function bump(){ api.progress(Math.min(++done,4)); if(done>=4) api.done(); }
    function pushLake(btn){ if(btn.classList.contains("done"))return; btn.classList.add("done"); btn.textContent="✓ Findings pushed to the data lake";
      AgentChat.bubble($("#mi-chat"),"ai","Done — assignment rights, change-of-control flags and the $"+(p.label==='AMEX × Center'?'21.4M':'13.0M')+" at risk are written to the "+p.lake+" via the API. The integration team now works from structured data, not PDFs.");
      api.narrate("acted"); }
    AgentChat.mount({ chatEl:$("#mi-chat"), chipsEl:$("#mi-chips"), hint:"Ask Iris", speed:13,
      intro:"I'm Iris. I've read all "+p.rows.length+" agreements in this view and structured the full "+p.cobrand+" portfolio — ask me about change-of-control, revenue at risk, or who blocks assignment.",
      exchanges:p.exchanges.map(ex=>({ label:ex.label, user:ex.label, answer:ex.answer, card:ex.card,
        after:()=>{ bump(); if(ex.push){ const b=$("#mi-chat").querySelector("[data-push]"); if(b) b.onclick=()=>pushLake(b); } } })) });
    if(api.auto){ api.after(900,()=>{ const c=$("#mi-chips").querySelector(".agc-chip"); c&&c.click(); });
      api.after(6500,()=>{ const chips=$("#mi-chips").querySelectorAll(".agc-chip"); chips[chips.length-1]&&chips[chips.length-1].click(); });
      api.after(11500,()=>{ const b=$("#mi-chat").querySelector("[data-push]"); if(b && !b.classList.contains("done")) b.click(); }); }
  }
});
</script>
</body>
</html>
