<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agreement Manager Agent (Search) — interactive</title>
<link rel="stylesheet" href="./engine/demo-engine.css">
<link rel="stylesheet" href="./engine/agent-chat.css">
<style>
  /* Clean single-pane frame (matches navigator.html's .nvx): the DemoEngine
     narration rail is the left "sidebar"; this stage drops the Docusign
     top-nav/product-rail chrome entirely. Search's artifact IS the AI-search
     experience, so the pane is a centered, comfortable column holding a header,
     the search box, the transcript, and the suggested-question chips. */
  .nvx{position:absolute;inset:0;display:flex;flex-direction:column;background:#EEF1F6;font-family:'Inter',-apple-system,'Segoe UI',Arial,sans-serif}
  .nvx-head{display:flex;align-items:center;gap:12px;padding:20px 30px 12px}
  .nvx-mark{width:30px;height:30px;border-radius:7px;background:var(--tenant-accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex:0 0 auto}
  .nvx-h{display:flex;flex-direction:column;line-height:1.15}
  .nvx-co{font-size:10.5px;font-weight:700;color:var(--tenant-accent);letter-spacing:.08em;text-transform:uppercase}
  .nvx-head h2{font-size:19px;font-weight:600;color:#16121f;letter-spacing:-.01em;margin:0}
  .nvx-head .ai-pill{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--tenant-accent);background:var(--tenant-accent-soft);padding:3px 9px;border-radius:20px}
  /* centered search surface */
  .nv-search{flex:1;min-height:0;width:100%;max-width:680px;margin:0 auto;padding:4px 30px 26px;display:flex;flex-direction:column}
  .nv-card{flex:1;min-height:0;display:flex;flex-direction:column;background:#fff;border:1px solid #E7E7EC;border-radius:14px;box-shadow:0 10px 30px rgba(20,12,50,.05);overflow:hidden}
  .nv-search .agc-input{border-top:none;border-bottom:1px solid #EFEFF1}
  #nv-chat{flex:1;min-height:0}
  /* suggested-question chips as horizontal wrapped pills (like navigator's #nv-chips) */
  #nv-chips{display:flex;flex-direction:row;flex-wrap:wrap;gap:7px;padding:11px 14px;border-top:1px solid #EFEFF1}
  #nv-chips .hint{display:none}
  #nv-chips .agc-chip{padding:6px 12px;font-size:11.5px}
</style>
</head>
<body>
<div id="demo-root"></div>
<script src="./engine/demo-engine.js"></script>
<script src="./engine/agent-chat.js"></script>
<script>
const SCENES=
  '<section class="de-scene is-active" data-scene="app"><div class="nvx">'+
    '<div class="nvx-head"><span class="nvx-mark">✦</span><div class="nvx-h"><span class="nvx-co" id="nv-cobrand"></span><h2>Ask your agreements anything</h2></div><span class="ai-pill">✦ AGREEMENT MANAGER AGENT</span></div>'+
    '<div class="nv-search"><div class="nv-card">'+
      '<div class="agc-input"><div class="box">Ask about your agreements…</div><div class="go"><svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-7-8-3z"/></svg></div></div>'+
      '<div class="agc-chat" id="nv-chat"></div>'+
      '<div class="agc-chips" id="nv-chips"></div>'+
    '</div></div>'+
  '</div></section>';

function cites(arr){ return '<div style="font-size:10.5px;font-weight:700;letter-spacing:.3px;color:#9a9aa2;text-transform:uppercase;margin-bottom:6px">Cited agreements</div>'+arr.map(c=>'<span class="chip">📄 '+c+'</span>').join(""); }

DemoEngine.interactive({
  meta:{ title:"Agreement Manager Agent (Search) — interactive", productTag:"Agreement Manager Agent · Live", home:"index.html",
    footnote:'<b>This is live.</b> Click a question (or imagine typing your own) and Agreement Manager types out a specific, cited answer drawn from the agreement portfolio. Switch vertical to re-skin. <code>?auto=1</code> self-runs.' },
  defaultPack:"banking", steps:3, attract:true, scenes:SCENES,
  packs:{
    banking:{ label:"Banking · Tally", theme:{ "--tenant-accent":"#2D55C9","--tenant-accent-soft":"#E7EDFB","--tenant-ink":"#0B1F4D" },
      brand:{ name:"Tally Bank", mark:"T" }, url:"app.docusign.com — Tally Bank", sorBadge:"System of record · nCino",
      persona:{ name:"Dana Whit", role:"Legal Operations", side:"advisor" }, cobrand:"Tally",
      say:{ intro:{eyebrow:"Agreement Manager Agent",title:"Ask your agreements",body:"No filters, no query language — pick a question and Agreement Manager answers from the actual contracts, with citations."} },
      exchanges:[
        {label:"Which vendor agreements auto-renew in 90 days over $100k?",
         answer:"Three agreements auto-renew in the next 90 days above $100k: the Atlas SaaS Order Form ($128k, Aug 30), the TGK Master Loan Agreement ($2.5M, Dec 1), and the Beacon Custody Agreement ($210k, Sep 12). Two have no opt-out window — I'd review before Aug 15.",
         card:cites(["Atlas — SaaS Order Form","TGK — Master Loan Agreement","Beacon — Custody Agreement"])},
        {label:"Which contracts reference GDPR?",
         answer:"Four agreements reference GDPR, all in your EU vendor set. The Fontara MSA and the Northwind DPA carry the strictest data-transfer obligations — both renew in Q4.",
         card:cites(["Fontara — Vendor MSA","Northwind — DPA","Atlas — SaaS Order Form","Beacon — Custody Agreement"])},
        {label:"Summarize the Atlas relationship",
         answer:"Atlas Corp has 3 active agreements totaling about $156k/yr: a SaaS order form, an NDA, and a support addendum. The order form is the nearest renewal (Aug 30) and the only one with an auto-renew clause."}
      ] },
    healthcare:{ label:"Healthcare · Riverside", theme:{ "--tenant-accent":"#0E8C7F","--tenant-accent-soft":"#DFF3EF","--tenant-ink":"#08332E" },
      brand:{ name:"Riverside Health", mark:"R" }, url:"app.docusign.com — Riverside Health", sorBadge:"System of record · Epic",
      persona:{ name:"Dana Whit", role:"Contracts Manager", side:"advisor" }, cobrand:"Riverside",
      say:{ intro:{eyebrow:"Agreement Manager Agent",title:"Ask your agreements",body:"No filters, no query language — pick a question and Agreement Manager answers from the actual contracts, with citations."} },
      exchanges:[
        {label:"Which vendor agreements are missing a signed BAA?",
         answer:"Two vendor agreements lack a signed BAA: the Medline Vendor MSA and the CareStaff Staffing Agreement. Both handle PHI, so the gap is a HIPAA exposure — I'd issue BAAs before the next audit window.",
         card:cites(["Medline — Vendor MSA","CareStaff — Staffing Agreement","Quest — Lab Services"])},
        {label:"Which payer contracts renew this quarter?",
         answer:"Two payer contracts renew this quarter: Unity Health ($1.2M, Aug 30) and Aetna Regional ($940k, Sep 18). Unity auto-renews with a 3% escalator — worth reviewing before it locks.",
         card:cites(["Unity Health — Payer Contract","Aetna — Regional Agreement"])},
        {label:"Summarize the Medline relationship",
         answer:"Medline has 2 active agreements: a vendor MSA ($84k/yr) and a lab-supply addendum. The MSA renews Sep 2 and is currently missing a BAA — flagged for compliance."}
      ] }
  },
  setup(p, root, api){
    const $=s=>root.querySelector(s);
    $("#nv-cobrand").textContent=p.cobrand;
    api.narrate("intro"); api.progress(0); let done=0;
    AgentChat.mount({ chatEl:$("#nv-chat"), chipsEl:$("#nv-chips"), hint:"Ask a question", speed:13,
      intro:"Ask me anything about your agreements — I read the actual documents and cite my sources.",
      exchanges:p.exchanges.map(ex=>({ label:ex.label, user:ex.label, answer:ex.answer, card:ex.card, after:()=>{ done++; api.progress(Math.min(done,3)); } })) });
    if(api.auto){ // self-run: walk every suggested question in turn (api.after → cancelable, attract-mode safe)
      const sel='#nv-chips .agc-chip', n=root.querySelectorAll(sel).length;
      for(let i=0;i<n;i++){ api.after(900+i*6800, ()=>{ const c=root.querySelector(sel); c&&c.click(); }); }
    }
  }
});
</script>
</body>
</html>
