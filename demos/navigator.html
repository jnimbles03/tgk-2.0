<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agreement Manager — interactive</title>
<link rel="stylesheet" href="./engine/demo-engine.css">
<link rel="stylesheet" href="./engine/agent-chat.css">
<style>
  /* Web-Forms-style frame: the DemoEngine narration rail is the left "sidebar".
     This stage is ONE demo pane (matching Web Forms' single right pane) — the
     agreements table with an "Ask" chat strip folded in BENEATH it, not a
     separate full-height agent column. */
  .nvx{position:absolute;inset:0;display:flex;flex-direction:column;background:#EEF1F6;font-family:'Inter',-apple-system,'Segoe UI',Arial,sans-serif}
  .nvx-head{display:flex;align-items:center;gap:12px;padding:20px 30px 12px}
  .nvx-head .ai-pill{margin-left:auto}
  .nvx-mark{width:30px;height:30px;border-radius:7px;background:var(--tenant-accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:0 0 auto}
  .nvx-h{display:flex;flex-direction:column;line-height:1.15}
  .nvx-co{font-size:10.5px;font-weight:700;color:var(--tenant-accent);letter-spacing:.08em;text-transform:uppercase}
  .nvx-head h2{font-size:19px;font-weight:600;color:#16121f;letter-spacing:-.01em;margin:0}
  .nvx-table{flex:1;min-height:0;overflow:auto;margin:0 30px 14px;padding:16px 22px;background:#fff;border:1px solid #E7E7EC;border-radius:14px;box-shadow:0 10px 30px rgba(20,12,50,.05)}
  /* the Ask strip — full-width band beneath the table */
  .nv-ask{flex:0 0 auto;height:248px;margin:0 30px 26px;background:#fff;border:1px solid #E7E7EC;border-radius:14px;box-shadow:0 10px 30px rgba(20,12,50,.05);display:flex;flex-direction:column;overflow:hidden}
  .nv-ask-top{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:13px 18px 11px;border-bottom:1px solid #EFEFF1}
  .nv-ask .phd{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#1a1a26;flex:0 0 auto;margin-right:6px}
  .nv-ask .phd .ai{width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,#FFD600,#E0202E 45%,#4B0082);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px}
  #nv-chips{display:flex;flex-direction:row;flex-wrap:wrap;gap:7px;padding:0;border-top:none}
  #nv-chips .hint{display:none}
  #nv-chips .agc-chip{padding:6px 12px;font-size:11.5px}
  #nv-chat{flex:1;min-height:0}
  .nv-row.lit{box-shadow:inset 3px 0 0 var(--tenant-accent),0 2px 12px rgba(20,12,50,.08);background:var(--tenant-accent-soft)}
  .nv-th,.nv-row{display:flex;align-items:center}
  .nv-th{font-size:10.5px;font-weight:700;letter-spacing:.5px;color:#9a9aa2;text-transform:uppercase;padding:0 12px 10px;border-bottom:1px solid #EDEDF1}
  .nv-row{padding:13px 12px;border-bottom:1px solid #F1F1F4;transition:background .2s,box-shadow .25s}
  .nv-row.hot{background:var(--tenant-accent-soft)}
  .c-doc{flex:1;display:flex;align-items:center;gap:11px;font-size:13px;font-weight:600;color:#1a1a26}
  .c-doc .fi{width:22px;height:26px;border:1.5px solid #C7C7D2;border-radius:3px;flex:0 0 auto;position:relative}
  .c-doc .fi:after{content:"";position:absolute;left:4px;right:4px;top:6px;height:2px;background:#C7C7D2;box-shadow:0 4px #C7C7D2,0 8px #C7C7D2}
  .c-party{width:140px;flex:0 0 auto;font-size:12.5px;color:#555}
  .c-val{width:104px;flex:0 0 auto;font-size:12.5px;color:#1a1a26;font-weight:600}
  .c-ren{width:130px;flex:0 0 auto;font-size:12px}
  .c-ren .tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:#EFEFF3;color:#555}
  .c-ren .tag.soon{background:#FDECEC;color:#C0392B;font-weight:600}
  .c-exp{width:112px;flex:0 0 auto;font-size:12.5px;color:#555}
  .ai-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--tenant-accent);background:var(--tenant-accent-soft);padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle}
  .agc-accept{display:inline-flex;align-items:center;gap:6px;margin-top:9px;border:1px solid var(--tenant-accent);color:var(--tenant-accent);background:#fff;border-radius:7px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer}
  .agc-accept.done{background:var(--tenant-accent);color:#fff;cursor:default}
</style>
</head>
<body>
<div id="demo-root"></div>
<script src="./engine/demo-engine.js"></script>
<script src="./engine/agent-chat.js"></script>
<script>
function row(id,doc,party,val,ren,rensoon,exp){
  return '<div class="nv-row" id="'+id+'"><div class="c-doc"><span class="fi"></span>'+doc+'</div>'+
    '<div class="c-party">'+party+'</div><div class="c-val">'+val+'</div>'+
    '<div class="c-ren"><span class="tag'+(rensoon?' soon':'')+'">'+ren+'</span></div>'+
    '<div class="c-exp">'+exp+'</div></div>'; }

const SCENES =
  '<section class="de-scene is-active" data-scene="app"><div class="nvx">'+
    '<div class="nvx-head"><span class="nvx-mark" id="nv-av"></span><div class="nvx-h"><span class="nvx-co" id="nv-cobrand"></span><h2 id="nv-title"></h2></div><span class="ai-pill">✦ AI-EXTRACTED</span></div>'+
    '<div class="nvx-table">'+
      '<div class="nv-th"><span class="c-doc" style="padding-left:33px">Agreement</span><span class="c-party">Counterparty</span><span class="c-val">Value</span><span class="c-ren">Renewal type</span><span class="c-exp">Expiration</span></div>'+
      '<div id="nv-rows"></div>'+
    '</div>'+
    '<div class="nv-ask">'+
      '<div class="nv-ask-top"><span class="phd"><span class="ai">✦</span> Ask Agreement Manager</span><div id="nv-chips"></div></div>'+
      '<div class="agc-chat" id="nv-chat"></div>'+
    '</div>'+
  '</div></section>';

DemoEngine.interactive({
  meta:{ title:"Agreement Manager — interactive", productTag:"Agreement Manager · Live", home:"index.html",
    footnote:'<b>This panel is live.</b> Iris has read every agreement in the repository — click a question and it types a specific, cited answer from the portfolio, then offers the next action. Switch vertical to re-skin the agreements and counterparties. <code>?auto=1</code> self-runs.' },
  defaultPack:"banking", steps:4, scenes:SCENES,
  packs:{
    banking:{ label:"Banking · Tally",
      theme:{ "--tenant-accent":"#2D55C9","--tenant-accent-soft":"#E7EDFB","--tenant-ink":"#0B1F4D" },
      brand:{ name:"Tally Bank", mark:"T" }, url:"app.docusign.com — Tally Bank", sorBadge:"System of record · nCino",
      persona:{ name:"Dana Whit", role:"Legal Operations", side:"advisor" },
      cobrand:"Tally", title:"All agreements", sorNode:"nCino core",
      rows:[ ["nv-row1","Master Service Agreement (MSA).docx","Braun LLC","$30,000","Evergreen",0,"Jul 18, 2026"],
        ["nv-r2","Tally — Vendor NDA.docx","Fontara Inc","—","Option to renew",0,"Sep 2, 2026"],
        ["nv-soon","Tally — SaaS Order Form.docx","Atlas Corp","$128,400","Renews in 30d",1,"Aug 30, 2026"],
        ["nv-r4","Tally — Master Loan Agreement.pdf","TGK Capital","$2,500,000","Fixed term",0,"Dec 1, 2026"] ],
      say:{ intro:{eyebrow:"Agreement Manager",title:"Ask the portfolio",body:"Tally's executed agreements are centralized and AI-extracted. Ask Iris what's renewing, what's at risk, or what to act on."},
        acted:{eyebrow:"Insight becomes action",title:"Renewal request drafted",body:"The Atlas order-form flag became a Workflow Builder renewal request — the outcome writes back to nCino."} },
      renewParty:"Atlas Corp", sorName:"nCino",
      exchanges:[
        {label:"What's renewing in the next 30 days?",
         answer:"One agreement is inside the 30-day window:<br><br>• <b>Atlas Corp — SaaS Order Form</b> ($128,400), auto-renews <b>Aug 30, 2026</b>.<br><br>It's flagged before it silently rolls over. Nothing else renews until December."},
        {label:"Which agreements auto-renew?",
         answer:"Two renew automatically:<br><br>• Braun LLC — MSA (Evergreen, no end date)<br>• Atlas Corp — SaaS Order Form (renews in 30 days)<br><br>The Fontara NDA is option-to-renew; the TGK Capital loan is fixed-term through Dec 1, 2026."},
        {label:"What's the total value tracked here?",
         answer:"$2,658,400 across the four agreements. The largest is the <b>TGK Capital Master Loan Agreement</b> at $2,500,000 (fixed term). Every value was read straight from the documents by Iris — nothing keyed in by hand."},
        {label:"Anything I should act on?", renew:true,
         answer:"Yes — the <b>Atlas Corp SaaS Order Form</b> renews in 30 days. Left alone it auto-renews at the current rate. Want me to open a renewal request?",
         card:'<span class="agc-accept" data-renew>✦ Start a Workflow Builder renewal request</span>'}
      ] },
    healthcare:{ label:"Healthcare · Riverside",
      theme:{ "--tenant-accent":"#0E8C7F","--tenant-accent-soft":"#DFF3EF","--tenant-ink":"#08332E" },
      brand:{ name:"Riverside Health", mark:"R" }, url:"app.docusign.com — Riverside Health", sorBadge:"System of record · Epic",
      persona:{ name:"Dana Whit", role:"Contracts Manager", side:"advisor" },
      cobrand:"Riverside", title:"All agreements", sorNode:"Epic chart",
      rows:[ ["nv-row1","Business Associate Agreement (BAA).docx","Kno2","—","Auto-renew",0,"Jul 18, 2026"],
        ["nv-r2","Riverside — Vendor MSA.docx","Medline","$84,000","Evergreen",0,"Sep 2, 2026"],
        ["nv-soon","Riverside — Payer Contract.pdf","Unity Health","$1,200,000","Renews in 30d",1,"Aug 30, 2026"],
        ["nv-r4","Riverside — Research Agreement.pdf","Helix Bio","$450,000","Fixed term",0,"Dec 1, 2026"] ],
      say:{ intro:{eyebrow:"Agreement Manager",title:"Ask the portfolio",body:"Riverside's executed agreements are centralized and AI-extracted. Ask Iris what's renewing, what's at risk, or what to act on."},
        acted:{eyebrow:"Insight becomes action",title:"Renewal request drafted",body:"The Unity Health flag became a Workflow Builder renewal request — the outcome writes back to Epic."} },
      renewParty:"Unity Health", sorName:"Epic",
      exchanges:[
        {label:"What's renewing in the next 30 days?",
         answer:"One agreement is inside the 30-day window:<br><br>• <b>Unity Health — Payer Contract</b> ($1,200,000), renews <b>Aug 30, 2026</b>.<br><br>It's flagged before it rolls over. Nothing else renews until December."},
        {label:"Which agreements auto-renew?",
         answer:"Two renew automatically:<br><br>• Kno2 — Business Associate Agreement (auto-renew)<br>• Unity Health — Payer Contract (renews in 30 days)<br><br>The Medline MSA is evergreen; the Helix Bio research agreement is fixed-term through Dec 1, 2026."},
        {label:"What's the total value tracked here?",
         answer:"$1,734,000 across the four agreements. The largest is the <b>Unity Health Payer Contract</b> at $1,200,000. Every value was read straight from the documents by Iris — nothing keyed in by hand."},
        {label:"Anything I should act on?", renew:true,
         answer:"Yes — the <b>Unity Health Payer Contract</b> renews in 30 days. Left alone it auto-renews at the current rate. Want me to open a renewal request?",
         card:'<span class="agc-accept" data-renew>✦ Start a Workflow Builder renewal request</span>'}
      ] },
    pubsec:{ label:"Public Sector · Gov",
      theme:{ "--tenant-accent":"#1D4ED8","--tenant-accent-soft":"#E6EDFB","--tenant-ink":"#13294B" },
      brand:{ name:"State Agency", mark:"G" }, url:"app.docusign.com — State Agency", sorBadge:"System of record · Salesforce",
      persona:{ name:"Dana Whit", role:"Records Manager", side:"advisor" },
      cobrand:"State", title:"All agreements", sorNode:"agency system of record",
      rows:[ ["nv-row1","Vendor Master Agreement.docx","Apex Services","$240,000","Auto-renew",0,"Jul 18, 2026"],
        ["nv-r2","Grant Agreement — Safe Streets.pdf","Harbor Foundation","$1,800,000","Fixed term",0,"Sep 2, 2026"],
        ["nv-soon","IT Services Contract.pdf","Northwind Systems","$960,000","Renews in 30d",1,"Aug 30, 2026"],
        ["nv-r4","Facilities Lease.pdf","Civic Properties","$310,000","Option to renew",0,"Dec 1, 2026"] ],
      say:{ intro:{eyebrow:"Agreement Manager",title:"Ask the portfolio",body:"The agency's executed contracts and grants are centralized and AI-extracted. Ask Iris what's renewing, what's at risk, or what to act on."},
        acted:{eyebrow:"Insight becomes action",title:"Renewal request drafted",body:"The Northwind flag became a Workflow Builder renewal request — the outcome writes back to the agency system."} },
      renewParty:"Northwind Systems", sorName:"the agency system",
      exchanges:[
        {label:"What's renewing in the next 30 days?",
         answer:"One agreement is inside the 30-day window:<br><br>• <b>Northwind Systems — IT Services Contract</b> ($960,000), renews <b>Aug 30, 2026</b>.<br><br>It's flagged before it auto-renews without a re-bid. Nothing else renews until December."},
        {label:"Which agreements auto-renew?",
         answer:"Two renew automatically:<br><br>• Apex Services — Vendor Master Agreement (auto-renew)<br>• Northwind Systems — IT Services Contract (renews in 30 days)<br><br>The Civic Properties lease is option-to-renew; the Harbor Foundation grant is fixed-term."},
        {label:"What's the total value tracked here?",
         answer:"$3,310,000 across the four agreements. The largest is the <b>Safe Streets Grant Agreement</b> at $1,800,000. Every figure was read straight from the documents by Iris — nothing keyed in by hand."},
        {label:"Anything I should act on?", renew:true,
         answer:"Yes — the <b>Northwind IT Services Contract</b> renews in 30 days. Left alone it auto-renews without re-bid. Want me to open a renewal request?",
         card:'<span class="agc-accept" data-renew>✦ Start a Workflow Builder renewal request</span>'}
      ] }
  },
  setup(p, root, api){
    const $=s=>root.querySelector(s);
    $("#nv-cobrand").textContent=p.cobrand; $("#nv-title").textContent=p.title;
    $("#nv-av").textContent=p.persona.name.split(/\s+/).slice(0,2).map(x=>x[0]).join("").toUpperCase();
    $("#nv-rows").innerHTML=p.rows.map(r=>row(r[0],r[1],r[2],r[3],r[4],r[5],r[6])).join("");
    const soon=$("#nv-soon"); if(soon) soon.classList.add("hot");
    const ren=root.querySelector("#nv-renewals"); if(ren) ren.classList.add("on");
    api.narrate("intro"); api.progress(0); let done=0;
    function bump(){ api.progress(Math.min(++done,4)); if(done>=4) api.done(); }
    function startRenewal(btn){ if(btn.classList.contains("done"))return; btn.classList.add("done"); btn.textContent="✓ Renewal request started";
      AgentChat.bubble($("#nv-chat"),"ai","Done — a Workflow Builder renewal request is drafted for the "+p.renewParty+" agreement and routed to Legal. The outcome writes back to "+p.sorName+".");
      api.narrate("acted"); }
    /* light up the agreement row(s) an answer is about — the table is the evidence */
    function highlight(ids){
      root.querySelectorAll(".nv-row.lit").forEach(r=>r.classList.remove("lit"));
      (ids||[]).forEach(id=>{ const el=root.querySelector("#"+id); if(el) el.classList.add("lit"); });
      const first = ids && ids[0] && root.querySelector("#"+ids[0]);
      if(first && first.scrollIntoView) first.scrollIntoView({block:"nearest"});
    }
    function hiFor(ex,i){ if(ex.hi) return ex.hi; if(ex.renew||i===0) return ["nv-soon"]; if(i===1) return ["nv-row1","nv-soon"]; return []; }
    AgentChat.mount({ chatEl:$("#nv-chat"), chipsEl:$("#nv-chips"), speed:13,
      intro:"I'm Iris. I've read all four agreements in this view — ask me about renewals, total value, or what needs action.",
      exchanges:p.exchanges.map((ex,i)=>({ label:ex.label, user:ex.label, answer:ex.answer, card:ex.card,
        after:()=>{ bump(); highlight(hiFor(ex,i)); if(ex.renew){ const b=$("#nv-chat").querySelector("[data-renew]"); if(b) b.onclick=()=>startRenewal(b); } } })) });
    api.autopilot([
      { at:900, selector:'#nv-chips .agc-chip' },
      { at:6000, run:()=>{ const chips=$("#nv-chips").querySelectorAll('.agc-chip'); chips[chips.length-1]&&chips[chips.length-1].click(); } },
      { at:10500, run:()=>{ const b=$("#nv-chat").querySelector('[data-renew]'); if(b && !b.classList.contains('done')) b.click(); } }
    ]);
  }
});
</script>
</body>
</html>
