<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Verification (ID.me) — re-skinnable demo</title>
<link rel="stylesheet" href="./engine/demo-engine.css">
<link rel="stylesheet" href="./archetypes/idv.css">
<style>
  .idme-co{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;font-size:18px}
  .idme-co .idme{font-weight:800;color:#1a1a26;letter-spacing:-.5px}
  .idme-co .idme em{color:#1F8A4C;font-style:normal}
  .idme-co .plus{color:#aaa}
  .idme-co .ds{display:flex;align-items:center;gap:6px;font-weight:600;color:#130032;font-size:15px;font-family:"DSIndigo","Inter",-apple-system,sans-serif}
  .idme-co .ds .m{width:16px;height:16px;background:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20x='4'%20y='12'%20width='13'%20height='13'%20rx='3'%20fill='%234C00FF'/%3E%3Cpath%20d='M15%204a11.5%2011.5%200%200%201%200%2023V18.5a6.5%206.5%200%200%200%200-13Z'%20fill='%23FF5252'/%3E%3Crect%20x='11.5'%20y='11.5'%20width='6'%20height='6'%20rx='1'%20fill='%23130032'/%3E%3C/svg%3E")center/contain no-repeat}
  .idme-eyebrow{text-align:center;font-size:12px;font-weight:700;letter-spacing:1px;color:#555;margin-bottom:14px}
  .idme-steps{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:18px}
  .idme-steps .s{width:24px;height:24px;border-radius:50%;border:1.5px solid #d5d5dd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#999}
  .idme-steps .s.on{background:var(--tenant-accent);border-color:var(--tenant-accent);color:#fff;font-weight:700}
  .idme-steps .ln{width:26px;height:1.5px;background:#e0e0e6}
  .idme-h{text-align:center;font-size:19px;font-weight:600;color:#1a1a26;margin-bottom:16px}
  .idme-methods{display:flex;gap:11px;margin-bottom:16px}
  .idme-m{flex:1;border:1.5px solid #d5d5dd;border-radius:9px;padding:16px 8px;text-align:center;position:relative}
  .idme-m.sel{border-color:var(--tenant-accent)}
  .idme-m.sel:after{content:"✓";position:absolute;right:0;bottom:0;width:22px;height:22px;background:var(--tenant-accent);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:9px 0 8px 0}
  .idme-m svg{width:26px;height:26px;fill:#444;margin-bottom:7px}
  .idme-m .l{font-size:12.5px;color:#333;font-weight:500}
  .idme-note{font-size:12px;color:#666;text-align:center;margin-bottom:8px}
  .idme-num{border:1.5px solid var(--tenant-accent);border-radius:9px;height:46px;display:flex;align-items:center;gap:9px;padding:0 13px;font-size:14px;color:#1a1a26;margin-bottom:18px}
  .idme-num .dot{width:11px;height:11px;border-radius:50%;background:#1F9D57;flex:0 0 auto}
  .idme-foot{position:absolute;left:0;right:0;bottom:58px;height:30px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:10.5px;color:#777;border-top:1px solid #f0f0f0}
  .idme-foot a{color:var(--tenant-accent)}
</style>
</head>
<body>
<div id="demo-root"></div>
<script src="./engine/demo-engine.js"></script>
<script>
const IOS='<div class="ios"><div class="time">09:19<small>◂ ID.me</small></div><div class="island"></div><div class="right">▮▮▮ ⌃ <span class="batt">87</span></div></div>';
const COBRAND='<div class="idme-co"><span class="idme">ID<em>.me</em></span><span class="plus">+</span><span class="ds"><span class="m"></span>docusign</span></div>';
const STEPS=n=>'<div class="idme-steps"><div class="s'+(n>=1?' on':'')+'">1</div><div class="ln"></div><div class="s'+(n>=2?' on':'')+'">2</div><div class="ln"></div><div class="s'+(n>=3?' on':'')+'">3</div></div>';
const MBAR='<div class="mbar"><div class="url"><svg viewBox="0 0 24 24"><path d="M4 4h16v14H4z" fill="none" stroke="#888" stroke-width="2"/></svg>api.id.me ⟳</div></div><div class="homebar"></div>';
const FOOT='<div class="idme-foot"><a>What is ID.me?</a> | <a>Terms of Service</a> | <a>Privacy</a></div>';

const SCENES='<section class="de-scene is-active" data-scene="device"><div class="idv"><div class="phone">'+IOS+
  '<div class="scr screen" data-screen="signin">'+COBRAND+'<div class="idme-eyebrow">COMPLETE YOUR SIGN IN</div>'+STEPS(1)+
    '<div class="idme-h">Verify your identity with ID.me</div>'+
    '<p style="text-align:center">Docusign uses ID.me to confirm it is really you before you continue. Your information is encrypted end to end.</p>'+
    '<div style="height:14px"></div><div class="btn-primary" data-cta="signin">Continue</div><div class="btn-ghost">Cancel</div>'+FOOT+'</div>'+
  '<div class="scr screen" data-screen="method" style="display:none">'+COBRAND+'<div class="idme-eyebrow">COMPLETE YOUR SIGN IN</div>'+STEPS(2)+
    '<div class="idme-h">Receive a code by phone</div>'+
    '<div class="idme-methods"><div class="idme-m sel"><svg viewBox="0 0 24 24"><path d="M7 2h10v20H7zM9 4v14h6V4z"/><circle cx="12" cy="20" r="1"/></svg><div class="l">Text me</div></div>'+
      '<div class="idme-m"><svg viewBox="0 0 24 24"><path d="M6 2a2 2 0 0 0-2 2c0 9 7 16 16 16a2 2 0 0 0 2-2v-3l-4-1-2 2a12 12 0 0 1-5-5l2-2-1-4z"/></svg><div class="l">Call me</div></div></div>'+
    '<div class="idme-note">You will receive a code at the following number</div>'+
    '<div class="idme-num"><span class="dot"></span><span id="idme-num"></span></div>'+
    '<div class="btn-primary" data-cta="method">Continue</div>'+FOOT+'</div>'+
  '<div class="scr screen" data-screen="otp" style="display:none">'+COBRAND+'<div class="idme-eyebrow">COMPLETE YOUR SIGN IN</div>'+STEPS(3)+
    '<div class="idme-h">Enter your code</div><p style="text-align:center">We texted a code to <b id="idme-mask"></b>.</p>'+
    '<div class="otp" id="idme-otp"><i></i><i></i><i></i><i></i><i></i><i></i></div>'+
    '<div class="btn-primary" data-cta="otp">Verify</div>'+FOOT+'</div>'+
  '<div class="scr screen" data-screen="verified" style="display:none">'+COBRAND+
    '<div class="verified"><div class="big"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>'+
      '<h2 style="font-size:22px" id="idme-vname"></h2><p>Your identity is confirmed to a high-assurance standard.</p><span class="ial">IAL2 VERIFIED</span></div>'+FOOT+'</div>'+
  MBAR+'</div></div></section>'+
  '<section class="de-scene" data-scene="handoff"><div class="ho"><div class="chk"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>'+
    '<h2 id="ho-h"></h2><p id="ho-p"></p><div class="chain"><div class="node">ID.me IAL2</div><span class="arr">&rarr;</span><div class="node lead">Verified identity</div><span class="arr">&rarr;</span><div class="node" id="ho-sor"></div></div></div></section>';

DemoEngine.init({
  meta:{ title:"ID Verification — ID.me (IAL2)", productTag:"Identity · ID.me", home:"index.html",
    footnote:'<b>Faithful ID.me member authentication, re-skinnable context.</b> The ID.me co-brand, step flow and MFA screens are the shared spine. Switching vertical swaps the verifying person, data, accent and narration. Built on the same IDV archetype as CLEAR.' },
  defaultPack:"banking", scenes:SCENES,
  timeline:{ totalDuration:30,
    beats:[ {t:0,key:"signin",sceneId:"device"},{t:7,key:"method",sceneId:"device"},{t:13,key:"otp",sceneId:"device"},{t:19,key:"verified",sceneId:"device"},{t:25,key:"handoff",sceneId:"handoff"} ],
    cursorTrack:[ {t:1.5,x:640,y:300,action:"move"},
      {t:6,target:"[data-cta='signin']",x:640,y:520,action:"click",sayKey:"signin"},
      {t:10,x:570,y:360,action:"move",sayKey:"method"},
      {t:13,target:"[data-cta='method']",x:640,y:560,action:"click",sayKey:"method2"},
      {t:14,target:"#idme-otp",x:640,y:360,action:"move",sayKey:"otp"},
      {t:19,target:"[data-cta='otp']",x:640,y:470,action:"click",sayKey:"verified"},
      {t:25,x:640,y:300,action:"move"} ] },
  packs:{
    banking:{ label:"Banking · Tally", theme:{ "--tenant-accent":"#1F6BBA","--tenant-accent-soft":"#E4EFFA","--tenant-ink":"#0B1F4D" },
      brand:{ name:"Tally Bank", mark:"T" }, url:"app.docusign.com — Tally Bank", sorBadge:"System of record · nCino",
      persona:{ name:"Sam Smith", role:"Applicant", side:"client" },
      data:{ num:"(***) ***-*142", mask:"•••-•••-0142", first:"Sam" }, sorNode:"nCino core",
      say:{ signin:{eyebrow:"ID.me",title:"Sam signs in with ID.me",body:"Docusign hands off to ID.me — a trusted partner Sam may already have an account with."},
        method:{eyebrow:"MFA",title:"Pick how to get the code",body:"ID.me confirms the device with multi-factor auth. Sam chooses a text."},
        method2:{eyebrow:"MFA",title:"Code on the way",body:"ID.me sends a one-time code to Sam's verified number."},
        otp:{eyebrow:"One-time code",title:"Confirm the device",body:"Entering the texted code binds the verification to Sam's own phone."},
        verified:{eyebrow:"IAL2",title:"Identity verified to IAL2",body:"A high-assurance result — reusable across services that trust ID.me."},
        handoff:{eyebrow:"Handoff",title:"Verified identity flows on",body:"The IAL2 result attaches to the envelope and writes back to nCino."} },
      handoff:{h:"Verified — straight into signing",p:"The ID.me IAL2 result attaches to the agreement and writes back to the nCino core."} },
    healthcare:{ label:"Healthcare · Riverside", theme:{ "--tenant-accent":"#0E8C7F","--tenant-accent-soft":"#DFF3EF","--tenant-ink":"#08332E" },
      brand:{ name:"Riverside Health", mark:"R" }, url:"app.docusign.com — Riverside Health", sorBadge:"System of record · Epic",
      persona:{ name:"Jordan Kim", role:"New Patient", side:"client" },
      data:{ num:"(***) ***-*199", mask:"•••-•••-0199", first:"Jordan" }, sorNode:"Epic chart",
      say:{ signin:{eyebrow:"ID.me",title:"Jordan signs in with ID.me",body:"Docusign hands off to ID.me — a trusted partner Jordan may already have an account with."},
        method:{eyebrow:"MFA",title:"Pick how to get the code",body:"ID.me confirms the device with multi-factor auth. Jordan chooses a text."},
        method2:{eyebrow:"MFA",title:"Code on the way",body:"ID.me sends a one-time code to Jordan's verified number."},
        otp:{eyebrow:"One-time code",title:"Confirm the device",body:"Entering the texted code binds the verification to Jordan's own phone."},
        verified:{eyebrow:"IAL2",title:"Identity verified to IAL2",body:"High-assurance identity — supporting HIPAA-grade access without friction."},
        handoff:{eyebrow:"Handoff",title:"Verified identity flows on",body:"The IAL2 result attaches to the consent and writes back to Epic."} },
      handoff:{h:"Verified — straight into consent",p:"The ID.me IAL2 result attaches to the consent and writes back to the Epic chart."} }
  },
  paintContent(p, root){
    root.querySelector("#idme-num").textContent=p.data.num; root.querySelector("#idme-mask").textContent=p.data.mask;
    root.querySelector("#idme-vname").textContent="You're verified, "+p.data.first;
    root.querySelector("#ho-h").textContent=p.handoff.h; root.querySelector("#ho-p").textContent=p.handoff.p; root.querySelector("#ho-sor").textContent=p.sorNode;
  },
  onTime(time, p, root){
    let k="signin"; this.timeline.beats.forEach(b=>{ if(b.sceneId==="device"&&b.t<=time+0.02)k=b.key; });
    root.querySelectorAll(".screen").forEach(s=>s.style.display=(s.dataset.screen===k?"block":"none"));
    const otps=root.querySelectorAll("#idme-otp i"); const code="704communication".replace(/\D/g,"").slice(0,6).split(""); // -> 704
    const c=["7","0","4","2","9","1"]; const prog=Math.max(0,Math.min(6,Math.floor((time-14)/0.7)));
    otps.forEach((el,i)=>{ if(k==="otp"&&i<prog){ el.textContent=c[i]; el.classList.add("on"); } else { el.textContent=""; el.classList.remove("on"); } });
  }
});
</script>
</body>
</html>
