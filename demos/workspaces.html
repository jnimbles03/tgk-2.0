      {t:10,target:"#ws-role",action:"move",sayKey:"access"},
      {t:13,target:"#ws-role",action:"click"},
      {t:15,target:"#ws-msbtn",action:"click",sayKey:"shared"},
      {t:18,target:".app-row[data-row='1'] .remind",action:"move",sayKey:"remind"},
      {t:20,target:".app-row[data-row='1'] .remind",action:"click"},
      {t:26,x:640,y:300,action:"move",sayKey:"handoff"} ] },
  packs:{
    banking:{ label:"Banking · Tally",
      theme:{ "--tenant-accent":"#2D55C9","--tenant-accent-soft":"#E7EDFB","--tenant-ink":"#0B1F4D" },
      brand:{ name:"Tally Bank", mark:"T" }, url:"app.docusign.com — Tally Bank", sorBadge:"System of record · nCino",
      persona:{ name:"Sarah Connelly", role:"Relationship Manager", side:"advisor" },
      cobrand:"Tally", title:"Client Onboarding — Sam Smith", search:"Tally", sorNode:"nCino core",
      owner:"Sarah Connelly (Owner)", oem:"SarahConnelly.Demo@gmail.com",
      rows:[ {n:"Pay Statement",s:"Upload Request",st:"bar",stt:"Waiting for upload",due:"3/31/2026",act:"view",ck:0},
        {n:"Complete with Docusign: Tally — Privacy Policy Acknowledgement",s:"Envelope",st:"done",stt:"0/2 done · Waiting for others",due:"4/2/2026",act:"remind",ck:1},
        {n:"Complete with Docusign: Tally — Investment Advisory Agreement",s:"Envelope",st:"done",stt:"0/2 done · Waiting for others",due:"4/2/2026",act:"remind",ck:1} ],
      say:{ open:{eyebrow:"Workspaces",title:"One space for the whole relationship",body:"Every agreement and upload for Sam's onboarding lives in a single Tally-branded workspace."},
        share:{eyebrow:"Share",title:"Bring the right people in",body:"Sarah opens Manage access to add the parties — each with a precise role."},
        access:{eyebrow:"Roles",title:"Manage vs. participate",body:"Co-signers get Participate; the banker keeps Manage. Access is explicit, not email forwarding."},
        shared:{eyebrow:"Shared",title:"Everyone lands in the same place",body:"Invited parties see exactly their items — nothing else."},
        remind:{eyebrow:"Nudge",title:"Chase only what's outstanding",body:"One click reminds the parties on the agreements still waiting for signature."},
        handoff:{eyebrow:"Audit",title:"One trail across every party",body:"Every action, upload and signature is captured in one auditable workspace."} },
      handoff:{h:"Every party, one audit trail",p:"Documents, uploads and signatures stay in one Tally workspace — the full trail writes back to nCino."} },
    healthcare:{ label:"Healthcare · Riverside",
      theme:{ "--tenant-accent":"#0E8C7F","--tenant-accent-soft":"#DFF3EF","--tenant-ink":"#08332E" },
      brand:{ name:"Riverside Health", mark:"R" }, url:"app.docusign.com — Riverside Health", sorBadge:"System of record · Epic",
      persona:{ name:"Maria Lopez", role:"Care Coordinator", side:"advisor" },
      cobrand:"Riverside", title:"Patient Onboarding — Jordan Kim", search:"Riverside", sorNode:"Epic chart",
      owner:"Maria Lopez (Owner)", oem:"MariaLopez.Demo@gmail.com",
      rows:[ {n:"Insurance Card",s:"Upload Request",st:"bar",stt:"Waiting for upload",due:"3/31/2026",act:"view",ck:0},
        {n:"Complete with Docusign: Riverside — Consent to Treat",s:"Envelope",st:"done",stt:"0/2 done · Waiting for others",due:"4/2/2026",act:"remind",ck:1},
        {n:"Complete with Docusign: Riverside — HIPAA Authorization",s:"Envelope",st:"done",stt:"0/2 done · Waiting for others",due:"4/2/2026",act:"remind",ck:1} ],
      say:{ open:{eyebrow:"Workspaces",title:"One space for the whole intake",body:"Every consent and upload for Jordan's intake lives in a single Riverside-branded workspace."},
        share:{eyebrow:"Share",title:"Bring the right people in",body:"Maria opens Manage access to add the patient and provider — each with a precise role."},
        access:{eyebrow:"Roles",title:"Manage vs. participate",body:"The patient gets Participate; the coordinator keeps Manage. Access is explicit, HIPAA-minded."},
        shared:{eyebrow:"Shared",title:"Everyone lands in the same place",body:"Invited parties see exactly their forms — nothing else."},
        remind:{eyebrow:"Nudge",title:"Chase only what's outstanding",body:"One click reminds the parties on the consents still waiting for signature."},
        handoff:{eyebrow:"Audit",title:"One trail across every party",body:"Every action, upload and signature is captured in one auditable workspace."} },
      handoff:{h:"Every party, one audit trail",p:"Consents, uploads and signatures stay in one Riverside workspace — the full trail writes back to Epic."} },
    pubsec:{ label:"Public Sector · Gov",
      theme:{ "--tenant-accent":"#1D4ED8","--tenant-accent-soft":"#E6EDFB","--tenant-ink":"#13294B" },
      brand:{ name:"State Agency", mark:"G" }, url:"app.docusign.com — State Agency", sorBadge:"System of record · Salesforce",

      cobrand:"State", title:"Application — Jordan Rivera", search:"State", sorNode:"agency system of record",
      owner:"Maria Lopez (Owner)", oem:"MariaLopez.Demo@gov.gov",
      rows:[ {n:"Proof of Income",s:"Upload Request",st:"bar",stt:"Waiting for upload",due:"3/31/2026",act:"view",ck:0},
        {n:"Complete with Docusign: State — Application & Attestation",s:"Envelope",st:"done",stt:"0/2 done · Waiting for others",due:"4/2/2026",act:"remind",ck:1},
        {n:"Complete with Docusign: State — Eligibility Authorization",s:"Envelope",st:"done",stt:"0/2 done · Waiting for others",due:"4/2/2026",act:"remind",ck:1} ],
      say:{ open:{eyebrow:"Workspaces",title:"One space for the whole case",body:"Every form and upload for Jordan's application lives in a single agency-branded workspace."},
        share:{eyebrow:"Share",title:"Bring the right people in",body:"Maria opens Manage access to add the applicant and reviewer — each with a precise role."},
        access:{eyebrow:"Roles",title:"Manage vs. participate",body:"The applicant gets Participate; the case manager keeps Manage. Access is explicit and auditable."},
        shared:{eyebrow:"Shared",title:"Everyone lands in the same place",body:"Invited parties see exactly their items — nothing else."},

  paintContent(p, root){
    root.querySelector("#ws-cobrand").textContent=p.cobrand; root.querySelector("#ws-title").textContent=p.title;
    root.querySelector("#ws-srch").textContent=p.search; root.querySelector("#ws-mtitle").textContent="Share "+p.title;
    root.querySelector("#ws-av").textContent=p.persona.name.split(/\s+/).slice(0,2).map(x=>x[0]).join("").toUpperCase();
    root.querySelector("#ws-oav").textContent=p.persona.name.split(/\s+/).slice(0,2).map(x=>x[0]).join("").toUpperCase();
    root.querySelector("#ws-owner").textContent=p.owner; root.querySelector("#ws-oem").textContent=p.oem;
    root.querySelector("#ho-h").textContent=p.handoff.h; root.querySelector("#ho-p").textContent=p.handoff.p; root.querySelector("#ho-sor").textContent=p.sorNode;
    root.querySelector("#ws-rows").innerHTML=p.rows.map((r,i)=>{
      const status = r.st==="bar"
        ? '<div class="bar"><i style="--p:55%"></i></div><div class="st">'+r.stt+'</div>'
        : '<div class="done">'+r.stt.split(' · ')[0]+'</div><div class="st">'+r.stt.split(' · ')[1]+'</div>';
      const act = r.act==="view" ? '<span class="view">View</span>' : '<span class="remind">Remind</span>';
      return '<div class="app-row" data-row="'+i+'"><span class="col-name"><span class="ck'+(r.ck?' on':'')+'"></span>'+
        '<span><span class="nt">'+r.n+'</span><br><span class="nsub">'+r.s+'</span></span></span>'+
        '<span class="col-status">'+status+'</span><span class="col-due">'+r.due+'</span><span class="col-act">'+act+'</span></div>'; }).join("");
  },
  onTime(time, p, root){
    const open = time>=7 && time<15.4;
    root.querySelector("#ws-modal").classList.toggle("on",open);
    const rows=root.querySelectorAll(".app-row");
    rows.forEach((r,i)=>r.classList.toggle("hot", time>=18 && time<24 && i===1));
  }
});
</script>
</body>
</html>
