<style>
  /* Two-column interactive layout (mirrors navigator.html's nv-* spine). */
  .app.has-rail .app-body{padding:0}
  .ws-wrap{display:flex;height:100%}
  .ws-main{flex:1;min-width:0;display:flex;flex-direction:column;padding:18px 22px;overflow:auto}
  .ws-agent{width:352px;flex:0 0 auto;border-left:1px solid #ECECF0;display:flex;flex-direction:column;background:#fff;min-height:0}
  .ws-agent .phd{display:flex;align-items:center;gap:8px;padding:13px 15px;border-bottom:1px solid #EFEFF1;font-size:13px;font-weight:700;color:#1a1a26}
  .ws-agent .phd .ai{width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,#FFD600,#E0202E 45%,#4B0082);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;flex:0 0 auto}
  .ws-agent .phd .sub{font-size:11px;font-weight:500;color:#8a8a93;margin-left:auto;max-width:150px;text-align:right;line-height:1.3}
  /* Rows become clickable documents; the focused one tints with the accent. */
  .app-row{cursor:pointer}
  .app-row.focus{background:var(--tenant-accent-soft);box-shadow:inset 3px 0 0 var(--tenant-accent)}
  .app-row .nt{transition:color .15s}
  .app-row:hover .nt{color:var(--tenant-accent)}
  .ws-askhint{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--tenant-accent);background:var(--tenant-accent-soft);padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle;opacity:0;transition:opacity .15s}
  .app-row:hover .ws-askhint,.app-row.focus .ws-askhint{opacity:1}
  /* "New task" affordance + inline create/assign form (mirrors in-story Workspaces). */
  .ws-tasksbar{display:flex;align-items:center;justify-content:space-between;margin:14px 0 4px}
  .ws-tasksbar .lbl{font-size:11px;font-weight:700;letter-spacing:.5px;color:#9a9aa2;text-transform:uppercase}
  .ws-newtask-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border:1px dashed var(--tenant-accent);border-radius:7px;background:var(--tenant-accent-soft);color:var(--tenant-accent);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
  .ws-newtask-btn:hover{background:#fff}
  .ws-newtask-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.4;fill:none}
  .ws-ntform{border:1px solid var(--tenant-accent);background:linear-gradient(180deg,var(--tenant-accent-soft),#fff);border-radius:9px;padding:14px 16px;margin:4px 0 8px}
  .ws-ntform[hidden]{display:none}
  .ws-ntform .nt-head{font-size:12.5px;font-weight:700;color:#1a1a26;margin-bottom:11px;display:flex;align-items:center;gap:8px}
  .ws-ntform .nt-head .mk{width:18px;height:18px;border-radius:5px;background:var(--tenant-accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
  .ws-ntform .nt-head .mk svg{width:11px;height:11px;stroke:#fff;stroke-width:2.4;fill:none}
  .nt-grid{display:grid;grid-template-columns:1fr 190px 150px;gap:10px;align-items:end}
  .nt-field{display:flex;flex-direction:column;gap:5px;min-width:0}
  .nt-field label{font-size:10px;font-weight:700;color:#9a9aa2;text-transform:uppercase;letter-spacing:.04em}
  .nt-field input,.nt-field select{font-family:inherit;font-size:12.5px;color:#1a1a26;background:#fff;border:1px solid #D8D8E0;border-radius:6px;padding:8px 10px;width:100%}
  .nt-field input:focus,.nt-field select:focus{outline:none;border-color:var(--tenant-accent);box-shadow:0 0 0 2px var(--tenant-accent-soft)}
  .nt-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
  .nt-cancel{padding:7px 14px;border:1px solid #D8D8E0;border-radius:6px;background:#fff;font-size:12px;font-weight:500;color:#555;cursor:pointer;font-family:inherit}
  .nt-create{padding:7px 16px;border:none;border-radius:6px;background:var(--tenant-accent);font-size:12px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit}
  .nt-create:disabled{opacity:.45;cursor:not-allowed}
  /* A freshly created task row: highlight, assignee line + status chip. */
  .app-row.row-new{animation:wsNewIn .45s cubic-bezier(.2,.8,.2,1)}
  @keyframes wsNewIn{from{opacity:0;transform:translateY(-6px);background:var(--tenant-accent-soft)}to{opacity:1;transform:translateY(0)}}
  .ws-assignee{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:#777;margin-top:3px}
  .ws-assignee .av{width:16px;height:16px;border-radius:50%;background:var(--tenant-accent-soft);color:var(--tenant-accent);font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
  .ws-chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle}
  .ws-chip.s-wait{background:#FFF4E0;color:#B57A12}
  .ws-chip.s-prog{background:#E7EDFB;color:#2D55C9}
  .ws-chip.s-ready{background:#E3F4EC;color:#1a7a44}
  /* ── Mobile Workspace/Ask toggle (hidden on desktop) ── */
  .ws-mtabs{display:none;gap:6px;padding:9px 12px;border-bottom:1px solid #ECECF0;background:#fff;position:sticky;top:0;z-index:6}
  .ws-mtabs button{flex:1;font-family:inherit;font-size:13px;font-weight:600;padding:10px;border-radius:8px;border:1px solid #E1E1E8;background:#fff;color:#555;cursor:pointer}
  .ws-mtabs button.on{background:var(--tenant-accent);color:#fff;border-color:var(--tenant-accent)}
  /* ── iPhone reflow: stop shrinking the fixed 1280 canvas; lay out native + stacked ── */
  @media (max-width:700px){
    .de-side,.de-foot,.de-stagebar{display:none!important}
    .de-shell{grid-template-columns:1fr;gap:0}
    .de-stageframe{padding:0;border:none;border-radius:0;background:#fff}
    .de-stage{aspect-ratio:auto;height:auto;min-height:560px;border-radius:0;overflow:visible;background:#fff}
    .de-canvas{position:static!important;width:100%!important;height:auto!important;transform:none!important}
    .de-scene{position:static;opacity:1;transition:none}
    .de-scene:not(.is-active){display:none}
    .app,.app.has-rail{position:static;height:auto;inset:auto}
    .app-body,.app.has-rail .app-body{position:static;inset:auto;left:0;top:0;right:0;bottom:0;height:auto;padding:0}
    .app-nav{height:50px;padding:0 14px;gap:10px}
    .app-nav .tabs,.app-nav .right .hlp{display:none}
    .ws-mtabs{display:flex}
    .ws-wrap{flex-direction:column;height:auto}
    .ws-main,.ws-agent{width:100%;border-left:none;min-height:0}
    .ws-main{padding:14px 14px 28px}
    .ws-agent{display:none;border-top:1px solid #ECECF0}
    .ws-wrap.m-ask .ws-main{display:none}
    .ws-wrap.m-ask .ws-agent{display:flex}
    .ws-agent .phd{padding:14px 16px;font-size:14px}
    .ws-agent .agc-chat{min-height:52vh}
    .ws-agent .agc-chip{padding:11px 14px;font-size:13px}
    .app-row{padding:15px 10px}
    .app-row .nt{font-size:14px}
    .app-row .col-due,.app-filter{display:none}
    .nt-grid{grid-template-columns:1fr;gap:12px}
    .ws-newtask-btn{font-size:13px;padding:9px 14px}
  }
</style>

          ask:[
            {label:"Why is this requested?",
             answer:"<b>Proof of Income</b> is an upload request so the agency can confirm Jordan's income against the program threshold — <b>no signature</b> needed. Until Jordan uploads it, this stays at <em>Waiting for upload</em>, due 3/31/2026.",
             src:["Proof of Income","Application — Jordan Rivera"]},
            {label:"What does it unblock?",
             answer:"It supports the means test the reviewer runs on the <b>Eligibility Authorization</b>. It's informational, so it carries no open signing task once received and writes back to the agency system of record.",
             src:["Proof of Income","Eligibility Authorization"]}
          ]},
        { match:"Application & Attestation", file:"state_application_attestation.pdf", meta:"Envelope · 0/2 done · 4 pages", stat:"Waiting for others",
          ask:[
            {label:"Who still has to sign this?",
             answer:"The <b>Application &amp; Attestation</b> shows <em>0/2 done</em> — both Jordan Rivera and the reviewer still need to sign. One reminder nudges only the parties on this envelope; nothing else in the workspace is touched.",
             src:["Application & Attestation","Application — Jordan Rivera"]},
            {label:"What does Jordan attest to?",
             answer:"Jordan attests the application is true and complete under penalty of perjury, consents to verification, and acknowledges program obligations. It's paired with the <b>Eligibility Authorization</b> in the case file.",
             src:["Application & Attestation","Eligibility Authorization"]},
            {label:"When is it due?",
             answer:"Due <b>4/2/2026</b>. It's a 2-signer envelope; once Jordan and the reviewer sign, the case manager countersigns automatically and the item closes.",
             src:["Application & Attestation"]}
          ]},
        { match:"Eligibility Authorization", file:"state_eligibility_authorization.pdf", meta:"Envelope · 0/2 done · 3 pages", stat:"Waiting for others",
          ask:[
            {label:"What does this authorize?",
             answer:"The <b>Eligibility Authorization</b> lets the agency verify Jordan's income, identity and household against third-party sources for the determination, with the scope and duration named. It relies on the income proof Jordan uploads.",
             src:["Eligibility Authorization","Proof of Income"]},
            {label:"What's blocking completion?",
             answer:"It's at <em>0/2 done · Waiting for others</em> — neither Jordan nor the reviewer has signed yet. Access is explicit and auditable; due <b>4/2/2026</b>. One reminder nudges only these two parties.",
             src:["Eligibility Authorization","Application — Jordan Rivera"]},
            {label:"What happens after Jordan signs?",
             answer:"On Jordan's signature the authorization goes effective, the determination can proceed, and the full trail writes back to the agency system of record — nothing keyed in by hand.",
             src:["Eligibility Authorization"]}
          ]}
      ],
      say:{ open:{eyebrow:"Workspaces",title:"One space for the whole case",body:"Every form and upload for Jordan's application lives in a single agency-branded workspace. Click any document to ask about it, or create a task and assign it to a party."},
        doc:{eyebrow:"Document",title:"Open a form, ask anything",body:"The AI assistant has read this file — ask what it authorizes, who still has to sign, or what happens next, and it answers with citations."},
        task:{eyebrow:"Tasks",title:"Assign work to a real party",body:"New tasks go to the people already in the workspace — Jordan, the reviewer, or the Records Office — each with a role and a status."} },
      handoff:{h:"Every party, one audit trail",p:"Forms, uploads and signatures stay in one agency workspace — the full trail writes back to the system of record."} }
  },
  setup(p, root, api){
    const $=s=>root.querySelector(s);
    const initials=n=>(n||"·").split(/\s+/).slice(0,2).map(x=>x[0]||"").join("").toUpperCase()||"·";
    // Active-pack holder + step counter live on the root so the ONE-TIME static
    // control handlers (new-task form) always read the current pack after a re-skin,
    // instead of closing over the pack from the first setup() call.
    const S = root.__ws || (root.__ws = {});
    S.p = p; S.done = 0;
    function bump(){ S.done=Math.min(S.done+1,4); api.progress(S.done); if(S.done>=4) api.done(); }
    function statusClass(s){ return s==="Ready to send"?"s-ready":(s==="In progress"?"s-prog":"s-wait"); }

    // ---- brand / header ----
    $("#ws-cobrand").textContent=p.cobrand; $("#ws-title").textContent=p.title; $("#ws-srch").textContent=p.search;
    $("#ws-av").textContent=initials(p.persona.name);
    $("#ws-asklabel").textContent="Ask about this workspace"; $("#ws-askdoc").textContent="";
    $("#ws-askbox").textContent="Click a document, then ask about it…";

    // ---- mobile Workspace/Ask toggle (only visible ≤700px via CSS) ----
    const _wrap=root.querySelector(".ws-wrap"), _mtWs=$("#ws-mt-ws"), _mtAsk=$("#ws-mt-ask");
    function mView(v){ const ask=v==="ask"; if(_wrap)_wrap.classList.toggle("m-ask",ask); if(_mtWs)_mtWs.classList.toggle("on",!ask); if(_mtAsk)_mtAsk.classList.toggle("on",ask); }
    S.mView=mView; mView("ws");

    // ---- workspace rows (the documents) ----
    function rowHTML(r,i){
      const status = r.st==="bar"
        ? '<div class="bar"><i style="--p:55%"></i></div><div class="st">'+r.stt+'</div>'
        : '<div class="done">'+r.stt.split(' · ')[0]+'</div><div class="st">'+r.stt.split(' · ')[1]+'</div>';
      const act = r.act==="view" ? '<span class="view">View</span>' : '<span class="remind">Remind</span>';
      return '<div class="app-row" data-row="'+i+'"><span class="col-name"><span class="ck'+(r.ck?' on':'')+'"></span>'+
        '<span><span class="nt">'+r.n+'</span> <span class="ws-askhint">✦ ASK</span><br><span class="nsub">'+r.s+'</span></span></span>'+
        '<span class="col-status">'+status+'</span><span class="col-due">'+r.due+'</span><span class="col-act">'+act+'</span></div>';
    }
    // Re-rendering #ws-rows drops every prior row (incl. any created task rows) and
    // their listeners, so the row click-handlers below are safe to re-bind per skin.
    $("#ws-rows").innerHTML=p.rows.map((r,i)=>rowHTML(r,i)).join("");

    // ---- map a row to its document Q&A pack by matching the row name ----
    function docForRow(r){
      const name=(r.n||"").toLowerCase();
      return p.docs.find(d=>name.indexOf((d.match||"").toLowerCase())!==-1);
    }

    // ---- the Ask panel: a workspace-level chat, swappable to a focused document ----
    function workspaceExchanges(){
      return [
        {label:"What's still outstanding?",
         answer:"Across this workspace, the upload request is at <em>Waiting for upload</em> and both signing envelopes are at <em>0/2 done · Waiting for others</em>. Everything is in one place — invited parties see only their own items.",
         after:bump},
        {label:"How do reminders work here?",
         answer:"A reminder nudges only the parties on a specific envelope that's still waiting — not everyone in the workspace. Click a signing document to ask who's left, then remind just them.",
         after:bump}
      ];
    }
    // Sources render as a reveal CARD (AgentChat appends ex.card after the
    // typewriter finishes) — not concatenated into the typed answer string.
    function srcCard(src){
      if(!src||!src.length) return undefined;
      return 'Sources: '+src.map(s=>'<span class="chip">'+s+'</span>').join('');
    }
    function docExchanges(d){
      return d.ask.map(x=>({ label:x.label, user:x.label, answer:x.answer, card:srcCard(x.src), after:bump }));
    }
    function mountWorkspace(){
      $("#ws-asklabel").textContent="Ask about this workspace";
      $("#ws-askdoc").textContent=""; $("#ws-askbox").textContent="Click a document, then ask about it…";
      AgentChat.mount({ chatEl:$("#ws-chat"), chipsEl:$("#ws-chips"), hint:"Ask the AI assistant", speed:13,
        intro:"I'm the AI assistant for this workspace. Click any document to ask about that file — or ask me what's outstanding across the whole space.",
        exchanges:workspaceExchanges() });
    }
    function focusRow(i){
      const r=p.rows[i]; if(!r) return; const d=docForRow(r); if(!d) return;
      root.querySelectorAll(".app-row").forEach(el=>el.classList.toggle("focus", +el.dataset.row===i));
      $("#ws-asklabel").textContent="Ask about this document";
      $("#ws-askdoc").textContent=d.file; $("#ws-askbox").textContent="Ask about "+d.file+"…";
      api.narrate("doc");
      // Re-mount AgentChat with this document's exchanges (re-callable on each row click).
      AgentChat.mount({ chatEl:$("#ws-chat"), chipsEl:$("#ws-chips"), hint:"Ask about this document", speed:13,
        intro:"Opened <b>"+r.n.replace(/^Complete with Docusign:\s*/,'')+"</b> — "+(d.meta||d.stat||"")+". Ask me about this file.",
        exchanges:docExchanges(d) });
      bump();
      mView("ask");   // on a phone, flip to the answer pane so the reply is visible
    }
    S.focusRow=focusRow;
    root.querySelectorAll(".app-row").forEach(el=>{
      el.addEventListener("click",e=>{ if(e.target.closest(".view,.remind")) return; focusRow(+el.dataset.row); });
    });

    // ---- New task: re-populate the assignee list for THIS pack, reset the form ----
    const sel=$("#ws-nt-assignee");
    sel.innerHTML=p.roles.map((r,i)=>{
      const showRole = r.role && r.role.toLowerCase()!==(r.person||"").toLowerCase();
      return '<option value="'+i+'">'+r.person+(showRole?' — '+r.role:'')+'</option>';
    }).join("");
    const ntForm=$("#ws-ntform"), ntName=$("#ws-nt-name"), ntCreate=$("#ws-nt-create");
    ntForm.hidden=true; ntName.value=""; ntCreate.disabled=true;
    S.syncCreate=()=>{ ntCreate.disabled=!ntName.value.trim(); };

    // ---- Wire the persistent static controls EXACTLY ONCE (they survive re-skins).
    //      Handlers read the live pack via S.p so the assignee is always current. ----
    if(!root.__wsWired){
      root.__wsWired=true;
      const mtWs=$("#ws-mt-ws"), mtAsk=$("#ws-mt-ask");
      if(mtWs) mtWs.addEventListener("click",()=>S.mView&&S.mView("ws"));
      if(mtAsk) mtAsk.addEventListener("click",()=>S.mView&&S.mView("ask"));
      $("#ws-newtask-open").addEventListener("click",()=>{ ntForm.hidden=false; ntName.focus(); });
      $("#ws-nt-cancel").addEventListener("click",()=>{ ntForm.hidden=true; ntName.value=""; S.syncCreate(); });
      ntName.addEventListener("input",()=>S.syncCreate());
      ntName.addEventListener("keydown",e=>{ if(e.key==="Enter" && !ntCreate.disabled) ntCreate.click(); });
      ntCreate.addEventListener("click",()=>{
        const cur=S.p; const taskName=ntName.value.trim(); if(!taskName) return;
        const r=cur.roles[+sel.value]||cur.roles[0]||{};
        const status=$("#ws-nt-status").value||"Waiting";
        const av=r.initials||initials(r.person);
        const roleSuffix=(r.role && r.role.toLowerCase()!==(r.person||"").toLowerCase())?' · '+r.role:'';
        const div=document.createElement("div");
        div.className="app-row row-new";
        div.innerHTML='<span class="col-name"><span class="ck"></span>'+
          '<span><span class="nt">'+taskName+'</span> <span class="ws-chip '+statusClass(status)+'">'+status+'</span><br>'+
          '<span class="ws-assignee"><span class="av">'+av+'</span>Assigned to '+(r.person||'a workspace member')+roleSuffix+'</span></span></span>'+
          '<span class="col-status"><div class="st">'+status+'</div></span><span class="col-due">—</span><span class="col-act"><span class="view">Open</span></span>';
        $("#ws-rows").appendChild(div);
        div.scrollIntoView({behavior:"smooth",block:"nearest"});
        api.narrate("task"); bump();
        ntForm.hidden=true; ntName.value=""; S.syncCreate();
      });
    }
    S.syncCreate();

    // ---- progress + initial chat ----
    api.narrate("open"); api.progress(0);
    mountWorkspace();

    // ---- auto / attract: open the first document, ask its first question, then create a task ----
    if(api.auto){
      api.after(900,()=>{ focusRow(0); });
      api.after(2200,()=>{ const c=$("#ws-chips").querySelector(".agc-chip"); c&&c.click(); });
      api.after(7000,()=>{ $("#ws-newtask-open").click(); ntName.value="Upload signed W-9"; S.syncCreate(); });
      api.after(9000,()=>{ if(!ntCreate.disabled) ntCreate.click(); });
    }
  }
});
</script>
</body>
</html>
