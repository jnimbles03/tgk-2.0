<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agreement Intelligence in Salesforce — re-skinnable demo</title>
<link rel="stylesheet" href="./engine/demo-engine.css">
<link rel="stylesheet" href="./archetypes/agent.css">
<style>
  /* Docusign Iris (embedded in Salesforce) — palette + components from the real
     IAM-for-Sales stage: lilac side panel, purple source citations, Iris input. */
  @font-face{font-family:"DSIndigo";src:url("https://docucdn-a.akamaihd.net/olive/fonts/3.1.0/DSIndigo-Regular.woff2") format("woff2");font-weight:400;font-display:swap}
  @font-face{font-family:"DSIndigo";src:url("https://docucdn-a.akamaihd.net/olive/fonts/3.1.0/DSIndigo-Semibold.woff2") format("woff2");font-weight:600;font-display:swap}
  /* related-agreements hierarchy on the account record (Navigator data) */
  .ra{background:#fff;border:1px solid #e5e5ea;border-radius:8px;padding:13px 16px}
  .ra .hd{font-size:13px;font-weight:700;color:#080707;margin-bottom:4px;display:flex;align-items:center;gap:7px}
  .ra .hd .dia{width:13px;height:13px;flex:0 0 auto;transform:rotate(45deg);border-radius:2px;background:linear-gradient(135deg,#9d50ff,#6e3aff 50%,#4C00FF)}
  .ra .hd .ct{margin-left:auto;font-size:11px;color:#706e6b;font-weight:600}
  .ra-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid #f0f0f3;font-size:12.5px;color:#16325c;transition:background .2s}
  .ra-row:first-of-type{border-top:none}
  .ra-row .fi{width:15px;height:18px;border:1.4px solid #b9c2d0;border-radius:2px;flex:0 0 auto}
  .ra-row.child{padding-left:20px}
  .ra-row.child .fi{border-color:#cdd4df}
  .ra-row .pv{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.2px;color:#4C00FF;background:#efe9ff;padding:2px 7px;border-radius:20px}
  .ra-row.hot{background:#f3f0fc;border-radius:6px;padding-left:6px;padding-right:6px}
  .ra-more{font-size:11.5px;color:#706e6b;padding:8px 0 0}
  /* assistant panel → Docusign Iris (lilac gradient, real product) */
  .af{background:linear-gradient(180deg,#fafbff 0%,#f0ecff 100%);border-left:1px solid #e0dcef;font-family:"DSIndigo","Inter",-apple-system,sans-serif}
  .af-hd{background:transparent;border-bottom:1px solid #e2dff3;color:#1a1a3a;font-weight:600;gap:9px}
  .af-hd .iris-mark{width:26px;height:26px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;color:#fff;font-size:13px;background:radial-gradient(circle at 35% 30%,#b9a8ff,#7c3aed 60%,#4C00FF)}
  .af-hd .sub{font-size:10.5px;font-weight:500;color:#7a7a92;margin-top:1px}
  .af-chat{overflow-y:auto}
  .af-chat::-webkit-scrollbar{width:6px}.af-chat::-webkit-scrollbar-thumb{background:#d8d8e0;border-radius:4px}
  /* reveal messages by occupying space only when shown (clean auto-scroll) */
  #di-chat .af-msg{display:none}
  #di-chat .af-msg.on{display:block;animation:di-in .25s ease}
  @keyframes di-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .af-msg.ai{background:#fff;border:1px solid #ece7fa;border-radius:12px 12px 12px 3px;color:#252423}
  .af-msg.user{background:#0070d2;border-radius:12px 12px 3px 12px}
  /* key-terms summary card */
  .kt{margin-top:9px;border:1px solid #e5e5ea;border-radius:8px;overflow:hidden;background:#fff}
  .kt .ktt{background:#f6f4fc;font-weight:700;font-size:10px;letter-spacing:.3px;color:#54506b;text-transform:uppercase;padding:6px 11px}
  .ktr{display:flex;justify-content:space-between;gap:10px;padding:7px 11px;border-top:1px solid #f0f0f3;font-size:11.5px}
  .ktr .k{color:#54698d}
  .ktr .v{font-weight:700;color:#16325c;text-align:right;white-space:nowrap}
  .ktr .v .src{display:block;color:#7c3aed;font-weight:400;font-style:italic;font-size:9.5px;margin-top:1px}
  .kc{padding:7px 11px;border-top:1px solid #f0f0f3;font-size:11px;color:#3a3a47;line-height:1.5}
  .kc b{color:#1a7a44}
  /* generated-MSA card */
  .af-card .dm{background:none}
  .af-card .dmloop{width:18px;height:18px;flex:0 0 auto}
  .af-card .bul{margin-top:6px;font-size:11px;color:#3a3a47;line-height:1.6}
  .af-card .dis{margin-top:7px;font-size:10px;color:#9a7b1e;background:#FBF6E7;border-radius:6px;padding:6px 8px;line-height:1.4}
  /* Iris source-citation line inside answers */
  .iris-src{display:block;color:#7c3aed;font-style:italic;font-size:10.5px;margin-top:6px}
  /* prompt chips + Iris input */
  .af-prompt{border-color:#c9bdf2;color:#4C00FF}
  .af-prompt.sel{background:#efe9ff;border-color:#4C00FF}
  .af-prompt.gen{display:none}
  .af-prompt.gen.show{display:block}
  .af-input .go{background:linear-gradient(135deg,#cbc2ff,#a397ff)}
  .af-input .go svg{fill:#26065D}
  .iris-dis{font-size:10px;color:#7a7a92;padding:0 14px 10px;line-height:1.3}
</style>
</head>
<body>
<div id="demo-root"></div>
<script src="./engine/demo-engine.js"></script>

        '<div class="af-prompt gen" id="di-gen">Draft a new MSA from the best terms</div></div>'+

  '</div></div></section>'+

      racount:"16", chatsub:"Chat with 16 agreements · Acme × Fontana Inc.",
      related:[ ["Master Services Agreement — Fontana Inc.",0,1,"di-ra-msa"],

      intro:"I can see 16 related agreements for Acme Corporation — the MSA with Fontana, order forms, an SOW and four amendments. Ask me anything, or pick a prompt.",

      keyterms:[ ["Liability cap","$2M","MSA §8.1"],["Payment terms","Net 30","Order Form 2024"],

      a2:"Yes — the <b>AI Data Processing Addendum</b> (Amendment #4, executed Mar 2024) governs model training, data residency and audit rights. It prevails over the base DPA.<span class=\"iris-src\">✦ Source: Amendment #4 — AI Data Processing</span>",

      genbul:"• Liability cap $2M &nbsp;• Net 30 &nbsp;• 20% volume discount<br>• 99.9% SLA &nbsp;• AI Data Processing addendum",
      handoff:{ h:"From 16 agreements to a drafted contract", p:"Without leaving Salesforce, the account team moved from reading the hierarchy to a new MSA built on the most favorable terms — ready to review and send.", sor:"Review & send" },
      say:{ open:{eyebrow:"Docusign Iris",title:"16 agreements, one conversation",body:"Mary is on the Acme Corporation account in Salesforce. Iris reads every related agreement — MSA, order forms, SOW and amendments — right inside the record."},
        summarize:{eyebrow:"Summarize",title:"Prevailing terms, rolled up with citations",body:"One prompt rolls the whole hierarchy into the terms in force — liability cap, payment terms, volume discount, annual minimum — each citing its source document."},
        interrogate:{eyebrow:"Ask",title:"Follow-ups, grounded in the contracts",body:"“Do we have an AI addendum?” and “any special pricing?” — answered from the documents, with the governing amendment and order form cited."},
        generate:{eyebrow:"Generate",title:"Draft the next agreement, agentically",body:"Mary asks for a new MSA built from the most favorable terms on the current template — Iris drafts it on the spot, ready for review."},
        handoff:{eyebrow:"In the flow of work",title:"Retrieval becomes a drafted contract",body:"Reading, interrogating and drafting — all inside the CRM record, without a single context switch."} },
    },

        ["Order Form — 2024",1,0,""],["Statement of Work #1",1,0,""],

  paintContent(p, root){
    root.querySelector(".av").textContent="";
    root.querySelector("#di-acct").textContent=p.acct;
    root.querySelector("#di-f1").textContent=p.f1; root.querySelector("#di-f2").textContent=p.f2;
    root.querySelector("#di-f3").textContent=p.f3; root.querySelector("#di-f4").textContent=p.f4;
    root.querySelector("#di-racount").textContent="("+p.racount+")";
    root.querySelector("#di-ra").innerHTML=p.related.map(raRow).join("");
    root.querySelector("#di-ramore").innerHTML=p.ramore;
    root.querySelector("#di-chatsub").textContent=p.chatsub;
    root.querySelector("#di-intro").textContent=p.intro;
    root.querySelector("#di-a1t").textContent=p.a1t;
    root.querySelector("#di-kt").innerHTML=p.keyterms.map(ktRow).join("");
    root.querySelector("#di-kc").innerHTML=p.keychanges;
    root.querySelector("#di-a2").innerHTML=p.a2; root.querySelector("#di-a3").innerHTML=p.a3;

  onTime(time, p, root){
    const on=(id,t)=>{ const el=root.querySelector(id); if(el) el.classList.toggle("on", time>=t); };
    root.querySelector("#di-p1").style.opacity = time>=6 ? 0 : 1;
    root.querySelector("#di-gen").classList.toggle("show", time>=18 && time<31);
    on("#di-u1",6.3); on("#di-a1",8);
    on("#di-u2",14); on("#di-a2",15.5); on("#di-u3",19); on("#di-a3",20.5);
    on("#di-u4",24.3); on("#di-a4",27);
    const msa=root.querySelector("#di-ra-msa"), ai=root.querySelector("#di-ra-aidpa");
    if(msa) msa.classList.toggle("hot", time>=8 && time<14);
    if(ai)  ai.classList.toggle("hot", time>=15.5 && time<19);
    const chat=root.querySelector("#di-chat"); if(chat && time>=6) chat.scrollTop=chat.scrollHeight;
  }
